<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0a0f1c 0%, #0d1425 100%); color: #eef2ff; min-height: 100vh; }
        
        .glass-card { background: rgba(15, 25, 45, 0.8); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; margin-bottom: 20px; }
        .glass-card:hover { border-color: rgba(43, 110, 240, 0.5); transform: translateY(-2px); }
        
        .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #3b82f6; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.98); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; border-right: 1px solid rgba(43,110,240,0.3); }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(13, 20, 37, 0.9); backdrop-filter: blur(10px); border-radius: 60px; margin-bottom: 25px; border: 1px solid rgba(43,110,240,0.2); }
        
        .platform-icons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; max-height: 140px; overflow-y: auto; padding: 5px; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.8); border-radius: 50px; padding: 10px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .platform-icon-item:hover { transform: translateY(-3px); background: rgba(43, 110, 240, 0.3); }
        .platform-icon-item.active { background: #2b6ef0; border-color: white; }
        .platform-icon-item i { font-size: 18px; }
        
        .category-section { background: rgba(30, 41, 59, 0.3); border-radius: 20px; padding: 15px; margin: 15px 0; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .category-btn { background: #1e293b; padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-size: 13px; }
        .category-btn:hover, .category-btn.active { background: #2b6ef0; transform: translateY(-2px); }
        
        .service-detail-box { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 18px; margin: 15px 0; }
        .order-summary { background: rgba(16, 185, 129, 0.1); border-radius: 20px; padding: 18px; margin: 20px 0; border: 1px solid rgba(16, 185, 129, 0.3); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { background: rgba(13, 20, 37, 0.9); border-radius: 20px; border: 1px solid rgba(43,110,240,0.2); padding: 18px; cursor: pointer; transition: all 0.2s; }
        .service-card:hover { border-color: #2b6ef0; transform: translateY(-3px); }
        
        .currency-btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 10px 18px; border-radius: 40px; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .currency-btn:hover { background: #2b6ef0; transform: translateY(-2px); }
        .currency-btn.active { background: #2b6ef0; border-color: white; }
        .currency-flag { font-size: 22px; }
        
        .order-table { overflow-x: auto; }
        .order-table table { width: 100%; border-collapse: collapse; }
        .order-table th, .order-table td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        .order-table th { background: rgba(43,110,240,0.2); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 24px; border-radius: 40px; z-index: 2000; border-left: 4px solid #10b981; font-size: 14px; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0d1425; border-radius: 28px; padding: 30px; width: 90%; max-width: 500px; z-index: 1100; display: none; border: 1px solid #2b6ef0; max-height: 80vh; overflow-y: auto; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .form-row > * { flex: 1; }
        .required:after { content: " *"; color: #ef4444; }
        
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .platform-icon-item { padding: 6px 12px; font-size: 12px; }
            .form-row { flex-direction: column; }
            .currency-btn { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div style="display: flex; flex-direction: column; gap: 12px;">
        <a href="#" data-page="home" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-user-edit"></i> Profile</a>
        <a href="#" data-page="joinus" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-user-plus"></i> Join Us</a>
        <a href="#" data-page="help" style="color:white; text-decoration:none; padding:10px; border-radius:12px;"><i class="fas fa-question-circle"></i> Help</a>
        
        <div style="margin-top: 20px;">
            <label style="display: block; margin-bottom: 10px; font-size: 13px;"><i class="fas fa-exchange-alt"></i> Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR"><span class="currency-flag">🇵🇰</span> PKR</button>
                <button class="currency-btn" data-curr="USD"><span class="currency-flag">🇺🇸</span> USD</button>
                <button class="currency-btn" data-curr="AED"><span class="currency-flag">🇦🇪</span> AED</button>
                <button class="currency-btn" data-curr="SAR"><span class="currency-flag">🇸🇦</span> SAR</button>
                <button class="currency-btn" data-curr="INR"><span class="currency-flag">🇮🇳</span> INR</button>
                <button class="currency-btn" data-curr="EUR"><span class="currency-flag">🇪🇺</span> EUR</button>
                <button class="currency-btn" data-curr="GBP"><span class="currency-flag">🇬🇧</span> GBP</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px; padding:12px; border-radius:40px;">Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars fa-lg"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div><i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer; margin-right:10px;"></i> <span id="userNameDisplay">Guest</span></div>
    </div>
    <div id="pageContent"><div style="text-align:center;padding:50px;"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
</div>

<div id="orderSuccessModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size:60px; color:#10b981;"></i>
        <h2>Order Placed Successfully!</h2>
        <div id="orderDetails" style="text-align:left; margin-top:20px; padding:15px; background:rgba(0,0,0,0.3); border-radius:16px;"></div>
        <button onclick="closeOrderModal()" class="btn" style="margin-top:20px;">OK</button>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let rates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.30, EUR:0.0033, GBP:0.0028 };
    let symbols = { PKR:"Rs", USD:"$", AED:"د.إ", SAR:"﷼", INR:"₹", EUR:"€", GBP:"£" };
    let allServices = [];
    let selectedService = null;
    let selectedCategory = "All";
    
    const countries = ["USA", "UK", "Canada", "Australia", "India", "Pakistan", "UAE", "Saudi Arabia", "Germany", "France", "Italy", "Spain", "Brazil", "Mexico", "Japan", "South Korea", "Singapore", "Malaysia", "Indonesia", "Turkey", "Egypt"];
    
    const platformCategories = {
        "Instagram": ["Likes", "Views", "Followers", "Comments", "Saves", "Shares"],
        "TikTok": ["Likes", "Views", "Followers", "Comments", "Shares"],
        "Facebook": ["Likes", "Views", "Followers", "Comments", "Shares"],
        "YouTube": ["Likes", "Views", "Subscribers", "Watchtime", "Comments"],
        "Twitter": ["Likes", "Retweets", "Followers", "Views"],
        "WhatsApp": ["Traffic", "Views", "Members"],
        "Snapchat": ["Views", "Followers"],
        "Telegram": ["Members", "Views"],
        "LinkedIn": ["Likes", "Followers", "Views"],
        "Pinterest": ["Repins", "Likes", "Followers"],
        "Discord": ["Members"],
        "Twitch": ["Followers", "Views"],
        "Spotify": ["Followers", "Plays"],
        "Google": ["Traffic", "Views"],
        "Threads": ["Likes", "Followers", "Views"],
        "Netflix": ["Views"],
        "Canva": ["Designs", "Templates"],
        "CapCut": ["Edits", "Templates"],
        "ChatGPT": ["Prompts"],
        "Gemini": ["Prompts"],
        "Website Traffic": ["Traffic", "Views"],
        "PUBG UC": ["UC", "Points"]
    };
    
    const platforms = [
        { name:"Instagram", icon:"fab fa-instagram", color:"#E4405F" },
        { name:"TikTok", icon:"fab fa-tiktok", color:"#000000" },
        { name:"Facebook", icon:"fab fa-facebook", color:"#1877F2" },
        { name:"YouTube", icon:"fab fa-youtube", color:"#FF0000" },
        { name:"Twitter", icon:"fab fa-twitter", color:"#1DA1F2" },
        { name:"WhatsApp", icon:"fab fa-whatsapp", color:"#25D366" },
        { name:"Snapchat", icon:"fab fa-snapchat", color:"#FFFC00" },
        { name:"Telegram", icon:"fab fa-telegram", color:"#26A5E4" },
        { name:"LinkedIn", icon:"fab fa-linkedin", color:"#0A66C2" },
        { name:"Pinterest", icon:"fab fa-pinterest", color:"#BD081C" },
        { name:"Discord", icon:"fab fa-discord", color:"#5865F2" },
        { name:"Twitch", icon:"fab fa-twitch", color:"#9146FF" },
        { name:"Spotify", icon:"fab fa-spotify", color:"#1DB954" },
        { name:"Google", icon:"fab fa-google", color:"#4285F4" },
        { name:"Threads", icon:"fab fa-threads", color:"#000000" },
        { name:"Netflix", icon:"fas fa-film", color:"#E50914" },
        { name:"Canva", icon:"fas fa-palette", color:"#00C4CC" },
        { name:"CapCut", icon:"fas fa-cut", color:"#00D4FF" },
        { name:"ChatGPT", icon:"fas fa-comment-dots", color:"#10A37F" },
        { name:"Gemini", icon:"fas fa-brain", color:"#4285F4" },
        { name:"Website Traffic", icon:"fas fa-globe", color:"#3b82f6" },
        { name:"PUBG UC", icon:"fas fa-gamepad", color:"#FFA500" }
    ];
    
    function showToast(msg, isErr=false) {
        let t=document.createElement('div');
        t.className='toast';
        t.style.borderLeftColor=isErr?'#dc2626':'#10b981';
        t.innerHTML=msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    }
    
    function closeOrderModal() { document.getElementById('orderSuccessModal').style.display='none'; if(currentUser) navigate("home"); }
    
    function formatPrice(pkr) {
        let converted = pkr * rates[activeCurrency];
        let sym = symbols[activeCurrency];
        let flag = {PKR:"🇵🇰",USD:"🇺🇸",AED:"🇦🇪",SAR:"🇸🇦",INR:"🇮🇳",EUR:"🇪🇺",GBP:"🇬🇧"}[activeCurrency] || "";
        return `${flag} ${sym} ${converted.toFixed(2)}`;
    }
    
    async function apiCall(action, data={}) {
        let payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        let formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            let res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            return await res.json();
        } catch(e) { 
            return { success: false, error: e.message };
        }
    }
    
    async function loadServices() { 
        let r = await apiCall("getServices"); 
        if(r.success && r.services) allServices = r.services; 
    }
    
    async function checkAuth() {
        let token = localStorage.getItem("mts_token");
        if(!token){ showAuthScreen(); return false; }
        let r = await apiCall("verifySession", { token });
        if(r.success && r.user){
            currentUser = r.user;
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username;
            return true;
        }else{
            localStorage.removeItem("mts_token");
            showAuthScreen();
            return false;
        }
    }
    
    function showAuthScreen() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:420px;margin:80px auto;">
                <h2 style="text-align:center;">Welcome</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" class="btn" style="width:100%">Login</button>
                    <button id="showSignupBtn" class="btn btn-secondary" style="width:100%; margin-top:12px;">Create Account</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <div class="form-row"><input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username"></div>
                    <div class="form-row"><input id="gmail" placeholder="Email"><input id="phoneNum" placeholder="Phone"></div>
                    <select id="userType"><option>Commission Based</option><option>Salary Based</option></select>
                    <div class="form-row"><input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm"></div>
                    <button id="doSignup" class="btn" style="width:100%">Register</button>
                    <button id="backLogin" class="btn btn-secondary" style="width:100%; margin-top:12px;">Back</button>
                </div>
            </div>
        `;
        
        document.getElementById("doLogin")?.addEventListener("click", async () => {
            let r = await apiCall("login", { email: document.getElementById("loginEmail").value, pass: document.getElementById("loginPass").value });
            if(r.success){ localStorage.setItem("mts_token", r.token); location.reload(); }
            else showToast(r.error, true);
        });
        document.getElementById("showSignupBtn")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        });
        document.getElementById("backLogin")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("signupForm").style.display = "none";
        });
        document.getElementById("doSignup")?.addEventListener("click", async () => {
            let p = document.getElementById("pass").value, c = document.getElementById("confirmPass").value;
            if(p !== c){ showToast("Passwords don't match", true); return; }
            let r = await apiCall("signup", {
                fullName: document.getElementById("fullName").value,
                username: document.getElementById("username").value,
                gmail: document.getElementById("gmail").value,
                phone: document.getElementById("phoneNum").value,
                userType: document.getElementById("userType").value,
                password: p
            });
            if(r.success){ showToast("Account created! Please login."); document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; }
            else showToast(r.error, true);
        });
    }
    
    async function renderProfile() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h2><i class="fas fa-user-edit"></i> Profile Settings</h2>
                <div class="form-row"><input id="pFullName" placeholder="Full Name" value="${currentUser.fullName || ''}"></div>
                <div class="form-row"><input id="pUsername" placeholder="Username" value="${currentUser.username || ''}"></div>
                <div class="form-row"><input id="pEmail" placeholder="Email" value="${currentUser.gmail || ''}"></div>
                <div class="form-row"><input id="pPhone" placeholder="Phone" value="${currentUser.phone || ''}"></div>
                <div class="form-row"><input type="password" id="pNewPass" placeholder="New Password (optional)"></div>
                <button id="updateProfileBtn" class="btn btn-success">Update Profile</button>
            </div>
        `;
        document.getElementById("updateProfileBtn").onclick = async () => {
            let res = await apiCall("updateProfile", {
                fullName: document.getElementById("pFullName").value,
                username: document.getElementById("pUsername").value,
                email: document.getElementById("pEmail").value,
                phone: document.getElementById("pPhone").value,
                newPassword: document.getElementById("pNewPass").value
            });
            showToast(res.message);
            if(res.success) location.reload();
        };
    }
    
    // ========== HOME PAGE WITH COMPLETE ORDER FORM ==========
    async function renderHome() {
        await loadServices();
        
        let platformIconsHtml = platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}" style="border-color:${p.color}20"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('');
        
        let html = `
            <div class="glass-card"><h3><i class="fas fa-coins"></i> Wallet Balance: ${formatPrice(currentUser.wallet)}</h3></div>
            <div class="glass-card">
                <h2><i class="fas fa-shopping-cart"></i> Place Order</h2>
                <div class="platform-icons" id="homePlatforms">${platformIconsHtml}</div>
                <label class="required">Select Platform</label>
                <select id="platformSelect"><option value="">-- Select Platform --</option>${platforms.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select>
                
                <div id="categoryDiv" style="display:none;" class="category-section">
                    <label>Filter by Category:</label>
                    <div class="category-buttons" id="categoryBtns"></div>
                </div>
                
                <label class="required">Select Service</label>
                <select id="serviceSelect"><option value="">-- Select Service --</option></select>
                
                <div id="serviceDescriptionBox" style="display:none;"></div>
                
                <label class="required">Quantity</label>
                <input type="number" id="quantity" placeholder="Enter Quantity" min="1">
                <div id="quantityWarning" style="color:#f59e0b; font-size:12px; display:none;"></div>
                
                <div id="conditionalFields"></div>
                
                <div id="orderSummary" style="display:none;" class="order-summary">
                    <h4>Order Summary</h4>
                    <p><strong>Price per unit:</strong> <span id="pricePerUnit">0</span></p>
                    <p><strong>Total Amount:</strong> <span id="totalAmount">0</span></p>
                    <p><strong>Delivery Time:</strong> <span id="deliveryTime">-</span></p>
                </div>
                
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button id="orderBtn" class="btn btn-success"><i class="fas fa-shopping-cart"></i> Place Order</button>
                    <button id="clearBtn" class="btn btn-secondary"><i class="fas fa-eraser"></i> Clear Form</button>
                </div>
            </div>
        `;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#homePlatforms .platform-icon-item').forEach(el => el.addEventListener('click', () => {
            document.getElementById('platformSelect').value = el.dataset.platform;
            updatePlatform();
        }));
        document.getElementById("platformSelect").addEventListener("change", updatePlatform);
        document.getElementById("serviceSelect").addEventListener("change", showServiceDetails);
        document.getElementById("quantity").addEventListener("input", calculateTotal);
        document.getElementById("orderBtn").addEventListener("click", placeOrder);
        document.getElementById("clearBtn").addEventListener("click", clearForm);
        
        updatePlatform();
    }
    
    function updatePlatform() {
        let platform = document.getElementById("platformSelect").value;
        let categoryDiv = document.getElementById("categoryDiv");
        let catBtns = document.getElementById("categoryBtns");
        
        if(platform && platformCategories[platform]) {
            categoryDiv.style.display = "block";
            let platformCats = ["All", ...platformCategories[platform]];
            catBtns.innerHTML = platformCats.map(c => 
                `<div class="category-btn ${selectedCategory === c ? 'active' : ''}" data-cat="${c}">${c}</div>`
            ).join('');
            
            document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCategory = btn.dataset.cat;
                updateServiceDropdown();
            }));
            selectedCategory = "All";
        } else {
            categoryDiv.style.display = "none";
            selectedCategory = "All";
        }
        updateServiceDropdown();
    }
    
    function updateServiceDropdown() {
        let platform = document.getElementById("platformSelect").value;
        let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
        
        if(selectedCategory !== "All") {
            filtered = filtered.filter(s => s.Name && s.Name.toLowerCase().includes(selectedCategory.toLowerCase()));
        }
        
        let select = document.getElementById("serviceSelect");
        select.innerHTML = '<option value="">-- Select Service --</option>';
        filtered.forEach(s => {
            select.innerHTML += `<option value="${s.ServiceId}">${s.Name}</option>`;
        });
        selectedService = null;
        document.getElementById("serviceDescriptionBox").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
        document.getElementById("conditionalFields").innerHTML = "";
    }
    
    function showServiceDetails() {
    let serviceId = document.getElementById("serviceSelect").value;

    if (!serviceId) return;

    selectedService = allServices.find(s => s.ServiceId === serviceId);

    if (!selectedService) return;

    let rateText = '';

    if (selectedService.Per1k === true || selectedService.Per1k === "TRUE") {

        let unitPrice = Number(selectedService.Rate) / 1000;

        rateText = `
            <strong>Rate:</strong>
            ${formatPrice(selectedService.Rate)} / 1000
            <br>
            <strong>Per Unit:</strong>
            ${formatPrice(unitPrice)}
        `;

    } else {

        rateText = `
            <strong>Per Unit:</strong>
            ${formatPrice(selectedService.Rate)}
        `;

    }

    document.getElementById("serviceInfo").innerHTML = `
        <div class="service-detail-box">
            <h3>${selectedService.Name}</h3>

            <p>${selectedService.Description || 'No description available'}</p>

            <hr style="margin:10px 0">

            <p>${rateText}</p>

            <p>
                Min Qty:
                ${selectedService.MinQty}
                |
                Max Qty:
                ${selectedService.MaxQty}
            </p>

            <p>
                Delivery:
                ${selectedService.DeliveryTime || 'Instant'}
            </p>
        </div>
    `;

    document.getElementById("serviceInfo").style.display = "block";

    let extraHtml = '';

    if (selectedService.EmailRequired) {

        extraHtml += `
            <label>Email Address *</label>
            <input
                type="email"
                id="emailField"
                placeholder="Enter Email">
        `;
    }

    if (selectedService.RequireLink) {

        extraHtml += `
            <label>Profile/Page Link *</label>
            <input
                type="url"
                id="linkField"
                placeholder="https://">
        `;
    }

    if (selectedService.TargetCountry) {

        extraHtml += `
            <label>Target Country *</label>

            <select id="countryField">
                <option value="">Select Country</option>
                <option>Pakistan</option>
                <option>India</option>
                <option>Bangladesh</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>Canada</option>
                <option>Germany</option>
                <option>France</option>
                <option>Saudi Arabia</option>
                <option>UAE</option>
            </select>
        `;
    }

    if (selectedService.CustomComments) {

        extraHtml += `
            <label>Custom Comments *</label>

            <textarea
                id="commentsField"
                rows="4"
                placeholder="Enter comments separated by comma"></textarea>
        `;
    }

    document.getElementById("extraFields").innerHTML = extraHtml;

    calculateTotal();
}    
    function calculateTotal() {

    if (!selectedService) return;

    let qty =
        parseInt(
            document.getElementById("quantity").value
        ) || 0;

    let min =
        Number(selectedService.MinQty);

    let max =
        Number(selectedService.MaxQty);

    if (qty < min) {

        document.getElementById("qtyWarning").innerHTML =
            `Minimum quantity is ${min}`;

        document.getElementById("qtyWarning").style.display =
            "block";

        document.getElementById("orderSummary").style.display =
            "none";

        return;
    }

    if (qty > max) {

        document.getElementById("qtyWarning").innerHTML =
            `Maximum quantity is ${max}`;

        document.getElementById("qtyWarning").style.display =
            "block";

        document.getElementById("orderSummary").style.display =
            "none";

        return;
    }

    document.getElementById("qtyWarning").style.display =
        "none";

    let total = 0;
    let unitPrice = 0;

    if (selectedService.Per1k) {

        unitPrice =
            Number(selectedService.Rate) / 1000;

        total =
            unitPrice * qty;

    } else {

        unitPrice =
            Number(selectedService.Rate);

        total =
            unitPrice * qty;
    }

    selectedService.calcTotal = total;

    document.getElementById("unitPrice").innerHTML =
        formatPrice(unitPrice);

    document.getElementById("totalPrice").innerHTML =
        formatPrice(total);

    document.getElementById("deliveryTime").innerHTML =
        selectedService.DeliveryTime || "Instant";

    document.getElementById("orderSummary").style.display =
        "block";
}

}

if (selectedService.RequireLink &&

        document.getElementById("platformSelect").value = "";
        document.getElementById("serviceSelect").innerHTML = '<option value="">-- Select Service --</option>';
        document.getElementById("quantity").value = "";
        document.getElementById("serviceDescriptionBox").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
        document.getElementById("conditionalFields").innerHTML = "";
        document.getElementById("categoryDiv").style.display = "none";
        document.getElementById("quantityWarning").style.display = "none";
        selectedService = null;
        selectedCategory = "All";
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        showToast("Form cleared");
    }
    
    // ========== SERVICES PAGE ==========
    async function renderServices() {
        await loadServices();
        let platformIconsHtml = `<div class="platform-icon-item active" data-platform="all"><i class="fas fa-th-large"></i><span>All</span></div>` + 
            platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}" style="border-color:${p.color}20"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('');
        
        let html = `<div class="glass-card"><div class="platform-icons" id="servicePlatforms">${platformIconsHtml}</div><input id="searchSvc" placeholder="🔍 Search services..."></div><div id="svcGrid" class="cards-grid"></div>`;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#servicePlatforms .platform-icon-item').forEach(el => el.addEventListener('click', () => {
            document.querySelectorAll('#servicePlatforms .platform-icon-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            filterServiceGrid();
        }));
        document.getElementById("searchSvc").addEventListener("input", filterServiceGrid);
        filterServiceGrid();
    }
    
    function filterServiceGrid() {
        let platform = document.querySelector('#servicePlatforms .platform-icon-item.active')?.dataset.platform || 'all';
        let search = document.getElementById("searchSvc")?.value.toLowerCase() || "";
        let filtered = allServices.filter(s => (platform === 'all' || s.Platform === platform) && (s.Name.toLowerCase().includes(search) || s.ServiceId.includes(search)));
        
        document.getElementById("svcGrid").innerHTML = filtered.map(s => {
            let price = s.Per1k ? formatPrice(s.Rate/1000) : formatPrice(s.Rate);
            let platformIcon = platforms.find(p => p.name === s.Platform) || {icon: "fab fa-globe", color: "#fff"};
            return `<div class="service-card" onclick="navigateTo('home');setTimeout(()=>selectServiceByPlatform('${s.Platform}','${s.ServiceId}'),100)">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
                    <i class="${platformIcon.icon}" style="font-size:28px; color:${platformIcon.color}"></i>
                    <strong style="font-size:16px;">${s.Name}</strong>
                </div>
                <hr style="margin:10px 0; border-color:#1e293b;">
                <p><i class="fas fa-tag"></i> Price: ${price} ${s.Per1k ? '/1000' : '/unit'}</p>
                <p><i class="fas fa-chart-line"></i> Min: ${s.MinQty} | Max: ${s.MaxQty}</p>
                <button class="btn" style="margin-top:12px; width:100%;" onclick="event.stopPropagation();navigateTo('home');setTimeout(()=>selectServiceByPlatform('${s.Platform}','${s.ServiceId}'),100)">Order Now</button>
            </div>`;
        }).join('');
    }
    
    function selectServiceByPlatform(platform, serviceId) {
        let ps = document.getElementById("platformSelect");
        if(ps) {
            ps.value = platform;
            updatePlatform();
            setTimeout(() => {
                document.getElementById("serviceSelect").value = serviceId;
                showServiceDetails();
            }, 100);
        }
    }

            if(!file) { showToast("Upload screenshot", true); return; }
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", {

    // ========== JOIN US PAGE ==========
    async function renderJoinUs() {
        let res = await apiCall("getMyJoinStatus");
        let status = res.application?.status || 'none';
        let html = `<div class="glass-card"><h2>Join Us & Earn</h2>`;
        
        if(status === 'none') {
            html += `<div><h3>Application Form</h3><div class="form-row"><input id="appName" placeholder="Full Name" value="${currentUser?.fullName||''}"><input id="appUser" placeholder="Username" value="${currentUser?.username||''}"></div>
            <div class="form-row"><input id="appPhone" placeholder="Phone"><input id="appWhats" placeholder="WhatsApp"></div>
            <div class="form-row"><input id="appEmail" placeholder="Email" value="${currentUser?.gmail||''}"><select id="appType"><option>Commission</option><option>Salary</option></select></div>
            <div class="form-row"><select id="appHours"><option>4h</option><option>5h</option><option>6h</option></select><select id="appShift"><option>Day</option><option>Night</option></select></div>
            <textarea id="appAbout" placeholder="About you" rows="3"></textarea><input type="file" id="appPhoto"><button id="submitApp" class="btn btn-success">Submit</button></div>`;
        } else if(status === 'pending') {
            html += `<div class="info-note">⏳ Application Pending Review</div>`;
        } else if(status === 'approved') {
            html += `<div class="success-note">✅ Application Approved! Salary: ${formatPrice(res.application.salary||0)}/month</div>`;
        } else {
            html += `<div class="info-note">❌ Application Rejected</div>`;
        }
        html += `</div>`;
        document.getElementById("pageContent").innerHTML = html;
        
        if(document.getElementById("submitApp")) {
            document.getElementById("submitApp").onclick = async () => {
                let file = document.getElementById("appPhoto").files[0];
                let reader = new FileReader();
                reader.onload = async () => {
                    let r = await apiCall("submitJoinRequest", {
                        name: document.getElementById("appName").value,
                        username: document.getElementById("appUser").value,
                        phone: document.getElementById("appPhone").value,
                        whatsapp: document.getElementById("appWhats").value,
                        email: document.getElementById("appEmail").value,
                        salaryType: document.getElementById("appType").value,
                        hours: document.getElementById("appHours").value,
                        shift: document.getElementById("appShift").value,
                        about: document.getElementById("appAbout").value,
                        photo: reader.result
                    });
                    showToast(r.message);
                    if(r.success) setTimeout(() => renderJoinUs(), 1500);
                };
                if(file) reader.readAsDataURL(file);
                else showToast("Upload photo", true);
            };
        }
    }

    function navigate(page) {
        if(page === "home") renderHome();
        else if(page === "dashboard") renderDashboard();
        else if(page === "services") renderServices();
        else if(page === "addfunds") renderAddFunds();
        else if(page === "profile") renderProfile();
        else if(page === "joinus") renderJoinUs();
        else if(page === "help") renderHelp();
    }
    
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => {
        e.preventDefault();
        navigate(el.getAttribute("data-page"));
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    }));
    
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate("home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => {
        if(e.target.dataset.curr) {
            activeCurrency = e.target.dataset.curr;
            document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.dataset.curr === activeCurrency));
            if(currentUser) navigate("home");
        }
    });
    
    window.navigateTo = navigate;
    window.selectServiceByPlatform = selectServiceByPlatform;
    
    (async function init() { if(await checkAuth()) { await loadServices(); navigate("home"); } })();
