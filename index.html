<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; transition: all 0.2s ease; margin-bottom: 16px; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.4); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:hover, .btn:hover { transform: scale(1.02); opacity: 0.92; }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 16px; color: white; width: 100%; outline: none; margin: 6px 0; font-size: 14px; font-family: 'Inter', sans-serif; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; background: rgba(0,0,0,0.55); }
        select option { background: #1e293b; color: white; }
        textarea { resize: vertical; }
        label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 2px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.97); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none; padding: 10px 14px; border-radius: 12px; transition: 0.2s; }
        .sidebar-menu a:hover { background: rgba(43,110,240,0.2); color: white; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.35); border-radius: 60px; margin-bottom: 20px; }
        .currency-btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 7px 14px; border-radius: 30px; cursor: pointer; transition: all 0.2s; color: #94a3b8; font-size: 13px; }
        .currency-btn.active { background: #2b6ef0; border-color: #60a5fa; color: white; }

        .platform-icons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; margin-bottom: 12px; padding: 4px 0; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.7); border-radius: 50px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 7px; border: 1px solid transparent; font-size: 13px; }
        .platform-icon-item:hover { background: rgba(43,110,240,0.3); border-color: #3b82f6; }
        .platform-icon-item.active { background: #2b6ef0; border-color: #60a5fa; }

        .step-block { margin: 14px 0; animation: fadeSlide 0.25s ease; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .step-num { background: linear-gradient(135deg, #2b6ef0, #1a4fc1); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .step-title { font-size: 13px; font-weight: 700; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.6px; }

        .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-chip { background: rgba(30,41,59,0.9); border: 1px solid #334155; padding: 7px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; color: #cbd5e1; }
        .cat-chip:hover { border-color: #3b82f6; color: white; }
        .cat-chip.active { background: #2b6ef0; border-color: #60a5fa; color: white; }

        .svc-desc { background: rgba(43,110,240,0.07); border: 1px solid rgba(43,110,240,0.3); border-radius: 18px; padding: 16px 18px; margin: 4px 0 10px; }
        .svc-desc-name { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
        .svc-desc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .svc-desc-item .lbl { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .svc-desc-item .val { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-top: 1px; }
        .price-chip { display: inline-flex; align-items: center; gap: 5px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); border-radius: 30px; padding: 4px 12px; font-size: 13px; font-weight: 700; color: #34d399; }

        .order-summary { background: linear-gradient(135deg, rgba(0,200,100,0.07), rgba(43,110,240,0.07)); border: 1px solid rgba(52,211,153,0.3); border-radius: 20px; padding: 18px 20px; margin-top: 14px; }
        .order-summary h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 12px; }
        .sum-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; gap: 10px; }
        .sum-row:last-child { border-bottom: none; padding-top: 10px; font-size: 16px; font-weight: 700; }
        .sum-row .k { color: #64748b; white-space: nowrap; }
        .sum-row .v { color: #e2e8f0; text-align: right; word-break: break-all; }
        .sum-row:last-child .v { color: #34d399; }

        .pm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 10px 0; }
        .pm-card { background: rgba(30,41,59,0.7); border: 2px solid #2d3a5e; border-radius: 18px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .pm-card.selected { border-color: #2b6ef0; background: rgba(43,110,240,0.18); }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,18,40,0.97); backdrop-filter: blur(24px); border-radius: 28px; padding: 28px; width: 92%; max-width: 500px; z-index: 1100; display: none; border: 1px solid rgba(52,211,153,0.4); max-height: 88vh; overflow-y: auto; }
        .success-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
        .success-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px 12px; }
        .success-item .s-lbl { font-size: 10px; color: #64748b; text-transform: uppercase; }
        .success-item .s-val { font-size: 13px; font-weight: 600; color: #e2e8f0; word-break: break-all; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 9999; border-left: 4px solid #10b981; max-width: 360px; font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 140px; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; margin-top: 16px; }
        .service-card { cursor: pointer; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
        .info-note { background: rgba(245,158,11,0.15); border-left: 4px solid #f59e0b; padding: 14px; border-radius: 12px; margin: 12px 0; }
        .join-tabs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
        .join-tab-btn { background: #1e293b; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 13px; color: white; }
        .join-tab-btn.active { background: #2b6ef0; }
        .join-tab-content { display: none; }
        .join-tab-content.active { display: block; }
        .history-table { overflow-x: auto; margin-top: 12px; }
        .history-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th, .history-table td { padding: 9px 12px; text-align: left; border-bottom: 1px solid #2d3a5e; }
        .loading-spinner { text-align: center; padding: 60px; }
        .loading-spinner i { font-size: 44px; animation: spin 1s linear infinite; color: #3b82f6; }
        @keyframes spin { to { transform: rotate(360deg); } }
        hr.divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 12px 0; }
        @media (max-width: 600px) { .platform-icon-item { padding: 6px 11px; } .success-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar"><div style="display:flex;justify-content:space-between;margin-bottom:28px;"><h3><i class="fas fa-chart-line"></i> MTS SMM</h3><i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i></div><div class="sidebar-menu"><a href="#" data-page="home"><i class="fas fa-home"></i> Home</a><a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a><a href="#" data-page="services"><i class="fas fa-box"></i> Services</a><a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a><a href="#" data-page="profile"><i class="fas fa-user-edit"></i> Profile</a><a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a><a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us</a><a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a><div style="margin-top:20px;"><label style="color:#64748b;">Currency</label><div class="currency-btn-group" id="currencyGroup"><button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button><button class="currency-btn" data-curr="USD">🇺🇸 USD</button><button class="currency-btn" data-curr="AED">🇦🇪 AED</button><button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button><button class="currency-btn" data-curr="INR">🇮🇳 INR</button><button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button></div></div><button onclick="doLogout()" style="background:#dc2626;margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
<div class="main-content"><div class="top-bar"><div id="menuBtn" style="cursor:pointer;"><i class="fas fa-bars"></i></div><div style="font-weight:700;"><i class="fas fa-rocket"></i> MTS SMM</div><div><i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer;"></i> <span id="userNameDisplay">Guest</span></div></div><div id="pageContent"><div class="loading-spinner"><i class="fas fa-spinner"></i></div></div></div>
<div id="successModal" class="modal"><div style="text-align:center;"><div style="width:64px;height:64px;background:rgba(16,185,129,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><i class="fas fa-check-circle" style="font-size:36px;color:#10b981;"></i></div><h2>Order Placed!</h2><div id="successOrderId" style="background:rgba(43,110,240,0.18);border-radius:14px;padding:10px;margin:14px 0;font-weight:700;"></div><div class="success-grid" id="successGrid"></div><button onclick="closeSuccessModal()" class="btn btn-success">OK</button></div></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";
let currentUser = null, activeCurrency = "PKR", allServices = [], selectedService = null, selectedCategory = "all", selectedPaymentMethod = null;
const exchangeRates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.30, EUR:0.0033 };
const currencySymbols = { PKR:"Rs", USD:"$", AED:"د.إ", SAR:"﷼", INR:"₹", EUR:"€" };
const PLATFORMS = [{ name:"Instagram",icon:"fab fa-instagram",color:"#E4405F",cats:["Likes","Views","Followers","Comments"]},{ name:"TikTok",icon:"fab fa-tiktok",color:"#fff",cats:["Likes","Views","Followers"]},{ name:"Facebook",icon:"fab fa-facebook",color:"#1877F2",cats:["Likes","Views","Followers"]},{ name:"YouTube",icon:"fab fa-youtube",color:"#FF0000",cats:["Likes","Views","Subscribers"]},{ name:"Twitter",icon:"fab fa-twitter",color:"#1DA1F2",cats:["Likes","Retweets","Followers"]},{ name:"WhatsApp",icon:"fab fa-whatsapp",color:"#25D366",cats:["Traffic"]},{ name:"Telegram",icon:"fab fa-telegram",color:"#26A5E4",cats:["Members"]}];
const COUNTRIES = ["Worldwide","Pakistan","India","USA","UK","UAE"];

function isTrue(v) { return v === true || v === "TRUE" || v === "true" || v === 1 || v === "1"; }
function showToast(msg, err=false) { let t=document.createElement('div'); t.className='toast'; t.style.borderLeftColor=err?'#dc2626':'#10b981'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3500); }
function fmtCur(pkr) { let v=pkr*exchangeRates[activeCurrency]; return `${currencySymbols[activeCurrency]} ${v.toFixed(2)}${activeCurrency==='PKR'?' PKR':''}`; }
function rateLabel(s) { return isTrue(s.Per1k)? `${fmtCur(s.Rate)} = 1000` : `${fmtCur(s.Rate)} / unit`; }
function show(id){ let e=document.getElementById(id); if(e) e.style.display='block'; }
function hide(id){ let e=document.getElementById(id); if(e) e.style.display='none'; }
function el(id){ return document.getElementById(id); }
function val(id){ let e=el(id); return e?e.value:''; }

async function apiCall(action,data={}) {
    let payload={action,...data,sessionToken:localStorage.getItem("mts_token")};
    let fd=new FormData(); fd.append("payload",JSON.stringify(payload));
    try { let res=await fetch(APPS_SCRIPT_URL,{method:"POST",body:fd}); return JSON.parse(await res.text()); } catch(e){ return {success:false,error:e.message}; }
}
async function loadServices() { if(!allServices.length){ let r=await apiCall("getServices"); if(r.success) allServices=r.services||[]; } }
async function checkAuth() {
    let token=localStorage.getItem("mts_token");
    if(!token){ showAuthScreen(); return false; }
    let r=await apiCall("verifySession",{token});
    if(r.success && r.user){ currentUser=r.user; el("userNameDisplay").innerText=currentUser.fullName?.split(" ")[0]||currentUser.username; return true; }
    localStorage.removeItem("mts_token"); showAuthScreen(); return false;
}
function doLogout() { localStorage.removeItem("mts_token"); location.reload(); }
window.doLogout=doLogout;
function closeSuccessModal() { el('successModal').style.display='none'; if(currentUser) navigate("home"); }
window.closeSuccessModal=closeSuccessModal;

function showAuthScreen() {
    el("pageContent").innerHTML=`<div class="glass-card" style="max-width:440px;margin:50px auto;"><h2>MTS SMM</h2><div id="loginForm"><label>Email</label><input id="loginEmail"><label>Password</label><input id="loginPass" type="password"><button id="doLogin" class="btn" style="width:100%;margin-top:14px;">Login</button><button id="showSignupBtn" style="background:transparent;border:1px solid #2b6ef0;width:100%;margin-top:10px;">Sign Up</button></div><div id="signupForm" style="display:none;"><div class="form-row"><div><label>Full Name</label><input id="sFullName"></div><div><label>Username</label><input id="sUsername"></div></div><div class="form-row"><div><label>Gmail</label><input id="sGmail"></div><div><label>Phone</label><input id="sPhone"></div></div><label>Account Type</label><select id="sType"><option>Commission Based</option><option>Salary Based</option></select><div class="form-row"><div><label>Password</label><input id="sPass" type="password"></div><div><label>Confirm</label><input id="sConfirm" type="password"></div></div><button id="doSignup" class="btn">Register</button><button id="backLogin" style="background:transparent;">Back</button></div></div>`;
    el("doLogin")?.addEventListener("click",async()=>{ let r=await apiCall("login",{email:val("loginEmail"),pass:val("loginPass")}); if(r.success){ localStorage.setItem("mts_token",r.token); location.reload(); } else showToast(r.error||"Login failed",true); });
    el("showSignupBtn")?.addEventListener("click",()=>{ el("loginForm").style.display="none"; el("signupForm").style.display="block"; });
    el("backLogin")?.addEventListener("click",()=>{ el("loginForm").style.display="block"; el("signupForm").style.display="none"; });
    el("doSignup")?.addEventListener("click",async()=>{ if(val("sPass")!==val("sConfirm")){ showToast("Passwords mismatch",true); return; } let r=await apiCall("signup",{fullName:val("sFullName"),username:val("sUsername"),gmail:val("sGmail"),phone:val("sPhone"),userType:val("sType"),password:val("sPass")}); if(r.success){ showToast("Account created! Please login."); el("loginForm").style.display="block"; el("signupForm").style.display="none"; } else showToast(r.error,true); });
}

// ---------- ORDER FORM (Fixed) ----------
async function renderHome() {
    await loadServices();
    if(!allServices.length){ showToast("No services loaded. Please refresh.",true); }
    let balance=currentUser?.wallet||0;
    el("pageContent").innerHTML=`<div class="glass-card" style="display:flex;justify-content:space-between;flex-wrap:wrap;"><div><div style="font-size:11px;color:#64748b;">Wallet</div><div style="font-size:22px;font-weight:700;color:#34d399;">${fmtCur(balance)}</div></div><button onclick="navigate('addfunds')" class="btn btn-success">Add Funds</button></div>
    <div class="glass-card"><h3><i class="fas fa-cart-plus"></i> New Order</h3>
    <div class="step-block"><div class="step-header"><div class="step-num">1</div><div class="step-title">Platform</div></div><div class="platform-icons" id="platformIcons">${PLATFORMS.map(p=>`<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}" style="color:${p.color};"></i><span>${p.name}</span></div>`).join('')}</div><select id="platformSelect" onchange="onPlatformChangeFixed()"><option value="">— Choose —</option>${PLATFORMS.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div>
    <div id="catBlock" class="step-block" style="display:none;"><div class="step-header"><div class="step-num">2</div><div class="step-title">Category</div></div><div id="catChips" class="cat-chips"></div></div>
    <div id="svcBlock" class="step-block" style="display:none;"><div class="step-header"><div class="step-num">3</div><div class="step-title">Service</div></div><select id="serviceSelect" onchange="onServiceChangeFixed()"><option value="">— Select service —</option></select></div>
    <div id="svcDesc" style="display:none;"></div>
    <div id="countryBlock" class="step-block" style="display:none;"><div class="step-header"><div class="step-num">4</div><div class="step-title">Country</div></div><select id="countrySelect">${COUNTRIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div id="dynFields"></div>
    <div id="qtyBlock" class="step-block" style="display:none;"><div class="step-header"><div class="step-num" id="qtyStepNum">5</div><div class="step-title">Quantity</div></div><input type="number" id="qtyInput" min="1" oninput="calcTotalFixed()" placeholder="Enter quantity"><div id="qtyHint" style="font-size:12px;color:#64748b;"></div></div>
    <div id="summaryBlock" class="order-summary" style="display:none;"><h4>Order Summary</h4><div class="sum-row"><span class="k">Service</span><span class="v" id="sName">—</span></div><div class="sum-row"><span class="k">Quantity</span><span class="v" id="sQty">—</span></div><div class="sum-row"><span class="k">Rate</span><span class="v" id="sPrice">—</span></div><div class="sum-row"><span class="k">Total</span><span class="v" id="sTotal">—</span></div></div>
    <div style="display:flex;gap:12px;margin-top:16px;"><button onclick="placeOrderFixed()" class="btn btn-success">Place Order</button><button onclick="clearOrderFormFixed()" class="btn btn-secondary">Clear</button></div></div>`;
    document.getElementById("platformIcons")?.addEventListener("click",(e)=>{ let item=e.target.closest(".platform-icon-item"); if(item){ el("platformSelect").value=item.dataset.platform; onPlatformChangeFixed(); } });
}
window.onPlatformChangeFixed = function() {
    let platform=val("platformSelect");
    document.querySelectorAll("#platformIcons .platform-icon-item").forEach(i=>i.classList.toggle("active",i.dataset.platform===platform));
    selectedService=null; selectedCategory="all";
    if(!platform){ ["catBlock","svcBlock","svcDesc","countryBlock","qtyBlock","summaryBlock"].forEach(hide); el("dynFields").innerHTML=""; return; }
    let svcForPlat=allServices.filter(s=>s.Platform===platform);
    let availCats=["all"];
    let platObj=PLATFORMS.find(p=>p.name===platform);
    if(platObj) platObj.cats.forEach(cat=>{ if(svcForPlat.some(s=>s.Name?.toLowerCase().includes(cat.toLowerCase()))) availCats.push(cat); });
    el("catChips").innerHTML=availCats.map(c=>`<div class="cat-chip ${c==='all'?'active':''}" onclick="selectCatFixed('${c}')">${c==='all'?'⚡ All':c}</div>`).join('');
    show("catBlock");
    buildServiceDropdownFixed(platform,"all");
    show("svcBlock");
    hide("svcDesc"); hide("countryBlock"); hide("qtyBlock"); hide("summaryBlock"); el("dynFields").innerHTML="";
};
window.selectCatFixed = function(cat) {
    selectedCategory=cat;
    document.querySelectorAll(".cat-chip").forEach(c=>c.classList.toggle("active",c.textContent.replace("⚡ ","")===cat||(cat==="all"&&c.textContent==="⚡ All")));
    buildServiceDropdownFixed(val("platformSelect"),cat);
    selectedService=null; hide("svcDesc"); hide("countryBlock"); hide("qtyBlock"); hide("summaryBlock"); el("dynFields").innerHTML="";
};
function buildServiceDropdownFixed(platform,cat){
    let svcs=allServices.filter(s=>s.Platform===platform);
    if(cat!=="all") svcs=svcs.filter(s=>s.Name?.toLowerCase().includes(cat.toLowerCase()));
    let sel=el("serviceSelect");
    if(sel) sel.innerHTML='<option value="">— Choose service —</option>'+svcs.map(s=>`<option value="${s.ServiceId}">[${s.ServiceId}] ${s.Name} — ${rateLabel(s)}</option>`).join('');
}
window.onServiceChangeFixed = function() {
    let sid=val("serviceSelect");
    if(!sid){ selectedService=null; hide("svcDesc"); hide("qtyBlock"); hide("summaryBlock"); el("dynFields").innerHTML=""; return; }
    selectedService=allServices.find(s=>s.ServiceId==sid);
    if(!selectedService) return;
    // show description
    let per1k=isTrue(selectedService.Per1k);
    let priceChip=per1k?`<span class="price-chip">${fmtCur(selectedService.Rate)} = 1000</span>`:`<span class="price-chip">${fmtCur(selectedService.Rate)} / unit</span>`;
    el("svcDesc").innerHTML=`<div class="svc-desc"><div style="display:flex;justify-content:space-between;"><div class="svc-desc-name">${selectedService.Name}</div>${priceChip}</div><div class="svc-desc-grid"><div class="svc-desc-item"><div class="lbl">ID</div><div class="val">${selectedService.ServiceId}</div></div><div class="svc-desc-item"><div class="lbl">Min/Max</div><div class="val">${selectedService.MinQty} - ${selectedService.MaxQty}</div></div><div class="svc-desc-item"><div class="lbl">Delivery</div><div class="val">${selectedService.DeliveryTime||"Fast"}</div></div></div><div class="svc-desc-text">${selectedService.Description||"High quality service"}</div></div>`;
    show("svcDesc");
    // conditional fields
    let showCountry=isTrue(selectedService.TargetCountry);
    let isAccount=isTrue(selectedService.IsAccount);
    let needEmail=isTrue(selectedService.RequireEmail);
    let needLink=isTrue(selectedService.RequireLink);
    let needComments=isTrue(selectedService.CustomComments);
    let step=4;
    if(showCountry){ el("countryStepNum")?.setAttribute("class","step-num"); show("countryBlock"); step++; } else hide("countryBlock");
    let dynHtml="";
    if(isAccount && needEmail){ dynHtml+=`<div class="step-block"><div class="step-header"><div class="step-num">${step++}</div><div class="step-title">Account Email</div></div><input id="emailField" type="email" placeholder="Email address"></div>`; }
    else if(needLink || (!isAccount && !needEmail)){ dynHtml+=`<div class="step-block"><div class="step-header"><div class="step-num">${step++}</div><div class="step-title">Profile / Post Link</div></div><input id="linkField" placeholder="https://..."></div>`; }
    if(needComments){ dynHtml+=`<div class="step-block"><div class="step-header"><div class="step-num">${step++}</div><div class="step-title">Custom Comments</div></div><textarea id="commentsField" rows="2" placeholder="One per line or comma separated"></textarea></div>`; }
    el("dynFields").innerHTML=dynHtml;
    // quantity block
    let qStep=el("qtyStepNum"); if(qStep) qStep.textContent=step;
    let hint=el("qtyHint"); if(hint) hint.innerText=`Min: ${selectedService.MinQty}  Max: ${selectedService.MaxQty}`;
    let qtyInp=el("qtyInput"); if(qtyInp) qtyInp.value="";
    show("qtyBlock");
    hide("summaryBlock");
    if(selectedService._qty) delete selectedService._qty;
    if(selectedService._total) delete selectedService._total;
};
window.calcTotalFixed = function() {
    if(!selectedService) return;
    let qty=parseInt(el("qtyInput")?.value)||0;
    let minQ=parseInt(selectedService.MinQty)||1, maxQ=parseInt(selectedService.MaxQty)||999999;
    if(qty<minQ || qty>maxQ || !qty){ hide("summaryBlock"); return; }
    let per1k=isTrue(selectedService.Per1k);
    let totalPKR=per1k ? (selectedService.Rate/1000)*qty : selectedService.Rate*qty;
    selectedService._total=totalPKR; selectedService._qty=qty;
    el("sName").innerText=selectedService.Name;
    el("sQty").innerText=qty.toLocaleString();
    el("sPrice").innerText=per1k?`${fmtCur(selectedService.Rate)} per 1000`:fmtCur(selectedService.Rate);
    el("sTotal").innerText=fmtCur(totalPKR);
    show("summaryBlock");
};
window.placeOrderFixed = async function() {
    if(!selectedService || !selectedService._qty){ showToast("Select service and valid quantity first",true); return; }
    let total=selectedService._total;
    if((currentUser?.wallet||0)<total){ showToast(`Insufficient balance! Need ${fmtCur(total)}`,true); return; }
    let extra={};
    let link=val("linkField"), emailF=val("emailField"), comments=val("commentsField"), country=(el("countryBlock")?.style.display!=="none"?val("countrySelect"):"");
    if(link) extra.link=link;
    if(emailF) extra.email=emailF;
    if(comments) extra.comments=comments;
    if(country) extra.targetCountry=country;
    let r=await apiCall("createOrder",{ serviceId:selectedService.ServiceId, quantity:selectedService._qty, totalAmount:total, extraFields:extra });
    if(r.success){
        el("successOrderId").innerHTML=`Order ID: <strong>${r.orderId}</strong>`;
        let details=[{l:"Service",v:selectedService.Name},{l:"Quantity",v:selectedService._qty},{l:"Amount",v:fmtCur(total)}];
        if(link) details.push({l:"Link",v:link});
        if(emailF) details.push({l:"Email",v:emailF});
        if(country) details.push({l:"Country",v:country});
        el("successGrid").innerHTML=details.map(d=>`<div class="success-item"><div class="s-lbl">${d.l}</div><div class="s-val">${d.v}</div></div>`).join('');
        el("successModal").style.display="block";
        if(currentUser) currentUser.wallet-=total;
        clearOrderFormFixed();
    } else showToast(r.error||"Order failed",true);
};
window.clearOrderFormFixed = function() {
    selectedService=null; selectedCategory="all";
    let ps=el("platformSelect"); if(ps) ps.value="";
    document.querySelectorAll("#platformIcons .platform-icon-item").forEach(i=>i.classList.remove("active"));
    ["catBlock","svcBlock","svcDesc","countryBlock","qtyBlock","summaryBlock"].forEach(hide);
    if(el("dynFields")) el("dynFields").innerHTML="";
};

// ---------- Other pages (shortened but functional) ----------
async function renderDashboard() {
    let [stats,orders]=await Promise.all([apiCall("userStats"), apiCall("getUserOrders")]);
    el("pageContent").innerHTML=`<div class="grid-cards"><div class="glass-card"><i class="fas fa-wallet fa-2x"></i><h3>${fmtCur(currentUser?.wallet||0)}</h3><p>Balance</p></div><div class="glass-card"><i class="fas fa-chart-line"></i><h3>${stats.totalOrders||0}</h3><p>Total Orders</p></div><div class="glass-card"><i class="fas fa-clock"></i><h3>${stats.pendingOrders||0}</h3><p>Pending</p></div></div><div class="glass-card"><h3>Order History</h3>${orders.orders?.length?`<div class="history-table"><table><tr><th>ID</th><th>Service</th><th>Qty</th><th>Amount</th><th>Status</th></tr>${orders.orders.map(o=>`<tr><td>${o.id}</td><td>${o.serviceName}</td><td>${o.qty}</td><td>${fmtCur(o.amount)}</td><td>${o.status}</td></tr>`).join('')}</table></div>`:'<p>No orders</p>'}</div>`;
}
async function renderServices() {
    await loadServices();
    el("pageContent").innerHTML=`<div class="glass-card"><div class="platform-icons" id="svcPlatIcons"><div class="platform-icon-item active" data-platform="all">All</div>${PLATFORMS.map(p=>`<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}"></i>${p.name}</div>`).join('')}</div><input id="searchInput" placeholder="Search..."></div><div id="servicesGrid" class="service-grid"></div>`;
    function filter(){ let platform=document.querySelector("#svcPlatIcons .platform-icon-item.active")?.dataset.platform||"all"; let search=el("searchInput")?.value.toLowerCase()||""; let filtered=allServices.filter(s=>(platform==="all"||s.Platform===platform)&&(s.Name.toLowerCase().includes(search)||s.ServiceId.toString().includes(search))); el("servicesGrid").innerHTML=filtered.map(s=>{ let p=PLATFORMS.find(p=>p.name===s.Platform)||{icon:"fas fa-globe",color:"#fff"}; return `<div class="glass-card service-card"><i class="${p.icon}"></i><strong>${s.Name}</strong><hr><p>${rateLabel(s)}</p><p>Min ${s.MinQty} Max ${s.MaxQty}</p><button class="btn" onclick="navigate('home');setTimeout(()=>autoSelect('${s.Platform}','${s.ServiceId}'),200)">Order</button></div>`; }).join('')||'<p>No services</p>'; }
    el("svcPlatIcons").addEventListener("click",e=>{ let item=e.target.closest(".platform-icon-item"); if(item){ document.querySelectorAll("#svcPlatIcons .platform-icon-item").forEach(i=>i.classList.remove("active")); item.classList.add("active"); filter(); } });
    el("searchInput")?.addEventListener("input",filter); filter();
}
window.autoSelect=function(platform,svcId){ let ps=el("platformSelect"); if(ps){ ps.value=platform; onPlatformChangeFixed(); setTimeout(()=>{ let ss=el("serviceSelect"); if(ss){ ss.value=svcId; onServiceChangeFixed(); }},250); }};
async function renderAddFunds(){ el("pageContent").innerHTML=`<div class="glass-card"><h3>Add Funds</h3><div class="pm-grid"><div class="pm-card" onclick="pickMethod('easypaisa')"><div>📱 Easypaisa</div><div>0319-8595421</div><div>Muhammad Ramzan</div></div><div class="pm-card" onclick="pickMethod('sadapay')"><div>💳 SadaPay</div><div>0319-8595421</div></div><div class="pm-card" onclick="pickMethod('jazzcash')"><div>🟠 JazzCash</div><div>0319-8595421</div></div></div><div id="proofSec" style="display:none;"><label>Amount (PKR)</label><input id="fundAmount" type="number"><label>Transaction ID</label><input id="fundTxn"><label>Email</label><input id="fundEmail"><input type="file" id="fundScreenshot"><button onclick="submitFund()" class="btn btn-success">Submit</button></div></div>`; }
window.pickMethod=function(m){ selectedPaymentMethod=m; show("proofSec"); };
window.submitFund=async function(){ let file=el("fundScreenshot")?.files[0]; if(!file){ showToast("Screenshot required",true); return; } let reader=new FileReader(); reader.onload=async()=>{ let r=await apiCall("addFundsRequest",{amount:val("fundAmount"),transactionId:val("fundTxn"),email:val("fundEmail"),paymentMethod:selectedPaymentMethod,screenshotBase64:reader.result}); showToast(r.message||"Submitted"); }; reader.readAsDataURL(file); };
async function renderProfile(){ el("pageContent").innerHTML=`<div class="glass-card"><h3>Profile</h3><div class="form-row"><div><label>Name</label><input id="pName" value="${currentUser?.fullName||''}"></div><div><label>Username</label><input id="pUser" value="${currentUser?.username||''}"></div></div><div class="form-row"><div><label>Email</label><input id="pEmail" value="${currentUser?.gmail||''}"></div><div><label>Phone</label><input id="pPhone" value="${currentUser?.phone||''}"></div></div><label>New Password</label><input id="pPass" type="password"><button onclick="updateProf()" class="btn">Save</button></div>`; }
window.updateProf=async function(){ let r=await apiCall("updateProfile",{fullName:val("pName"),username:val("pUser"),gmail:val("pEmail"),phone:val("pPhone"),newPassword:val("pPass")}); showToast(r.message); };
async function renderRecommendations(){ el("pageContent").innerHTML=`<div class="glass-card"><h3>Recommendation</h3><input id="recEmail" placeholder="Email"><input id="recWa" placeholder="WhatsApp"><textarea id="recText" placeholder="Your review"></textarea><button onclick="submitRec()" class="btn">Send</button></div>`; }
window.submitRec=async function(){ let r=await apiCall("submitRecommendation",{email:val("recEmail"),whatsapp:val("recWa"),text:val("recText")}); showToast(r.message); };
async function renderJoinUs(){ el("pageContent").innerHTML=`<div class="glass-card"><h3>Join Us</h3><p>Application system active - contact admin for details.</p></div>`; }
async function renderHelp(){ el("pageContent").innerHTML=`<div class="glass-card"><h3>Help</h3><input id="helpEmail" placeholder="Email"><textarea id="helpMsg" placeholder="Message"></textarea><button onclick="submitHelp()" class="btn">Send</button></div>`; }
window.submitHelp=async function(){ let r=await apiCall("submitHelp",{email:val("helpEmail"),message:val("helpMsg")}); showToast(r.message); };
function navigate(page){ if(page==="home") renderHome(); else if(page==="dashboard") renderDashboard(); else if(page==="services") renderServices(); else if(page==="addfunds") renderAddFunds(); else if(page==="profile") renderProfile(); else if(page==="recommendations") renderRecommendations(); else if(page==="joinus") renderJoinUs(); else if(page==="help") renderHelp(); }
window.navigate=navigate;
// Sidebar & currency
document.querySelectorAll("[data-page]").forEach(a=>a.addEventListener("click",e=>{ e.preventDefault(); navigate(a.getAttribute("data-page")); el("sidebar").classList.remove("open"); el("overlay").style.display="none"; }));
el("menuBtn").onclick=()=>{ el("sidebar").classList.add("open"); el("overlay").style.display="block"; };
el("closeSidebar").onclick=()=>{ el("sidebar").classList.remove("open"); el("overlay").style.display="none"; };
el("overlay").onclick=()=>{ el("sidebar").classList.remove("open"); el("overlay").style.display="none"; };
el("refreshBtn").onclick=()=>{ if(currentUser) navigate("home"); else showAuthScreen(); };
el("currencyGroup").addEventListener("click",e=>{ if(e.target.dataset.curr){ activeCurrency=e.target.dataset.curr; document.querySelectorAll(".currency-btn").forEach(b=>b.classList.toggle("active",b.dataset.curr===activeCurrency)); navigate("home"); } });
(async function(){ if(await checkAuth()){ await loadServices(); navigate("home"); } })();
</script>
