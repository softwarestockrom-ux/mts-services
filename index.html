<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.5); transform: translateY(-2px); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #3b82f6; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.96); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; max-height: 200px; overflow-y: auto; padding: 10px; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.6); border-radius: 50px; padding: 10px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .platform-icon-item:hover, .platform-icon-item.active { background: #2b6ef0; transform: translateY(-3px); }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .currency-btn.active { background: #2b6ef0; border-color: white; }
        .order-summary { background: rgba(0, 200, 255, 0.1); border-radius: 20px; padding: 15px; margin-top: 20px; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172ae6; backdrop-filter: blur(20px); border-radius: 32px; padding: 24px; width: 90%; max-width: 500px; z-index: 1100; display: none; border: 1px solid cyan; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 2000; border-left: 4px solid #2b6ef0; max-width: 350px; z-index: 9999; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 25px 0; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-approved { background: #10b981; color: white; }
        .status-pending { background: #f59e0b; color: black; }
        .status-rejected { background: #dc2626; color: white; }
        .join-main-tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .join-main-tab-btn { background: #1e293b; padding: 12px 24px; border-radius: 40px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .join-main-tab-btn.active { background: #2b6ef0; }
        .join-main-tab-btn:hover { background: #3b82f6; }
        .join-tab-content { display: none; }
        .join-tab-content.active { display: block; }
        .info-note { background: rgba(245, 158, 11, 0.2); border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .category-selector { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 15px; margin: 15px 0; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .category-btn { background: #1e293b; padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .category-btn:hover, .category-btn.active { background: #2b6ef0; }
        .history-table { overflow-x: auto; margin-top: 15px; }
        .history-table table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 10px; text-align: left; border-bottom: 1px solid #2d3a5e; }
        .history-table th { background: rgba(43, 110, 240, 0.3); }
        @media (max-width: 768px) { .form-row { flex-direction: column; } .platform-icon-item { padding: 6px 12px; font-size: 12px; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" data-page="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile"><i class="fas fa-user-edit"></i> Profile Settings</a>
        <a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a>
        <a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us & Earn</a>
        <a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-toggle" style="margin-top: 20px;">
            <label><i class="fas fa-exchange-alt"></i> Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button>
                <button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-curr="AED">🇦🇪 AED</button>
                <button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
                <button class="currency-btn" data-curr="INR">🇮🇳 INR</button>
                <button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div class="user-info">
            <i class="fas fa-sync-alt refresh-btn" id="refreshBtn" style="cursor:pointer; margin-right:15px;"></i>
            <span id="userAvatar"><i class="fas fa-user-circle"></i></span>
            <span id="userNameDisplay">Guest</span>
        </div>
    </div>
    <div id="pageContent">Loading...</div>
</div>

<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size: 60px; color: #10b981;"></i>
        <h2>Order Placed!</h2>
        <p id="successMessage"></p>
        <button onclick="closeSuccessModal()" class="btn">OK</button>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOlV_XyOIhuYsOkmLlCvTpxGuVyjA_trHpBH6G-ahD4UiANTBVDEtqirYzkhIfh3NcPw/exec";
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR: 1, USD: 0.0036, AED: 0.0132, SAR: 0.0135, INR: 0.30, EUR: 0.0033 };
    let currencySymbols = { PKR: "Rs", USD: "$", AED: "د.إ", SAR: "﷼", INR: "₹", EUR: "€" };
    let allServices = [];
    let selectedService = null;
    let joinStatus = null;
    let selectedCategory = "all";
    
    const serviceCategories = ["Likes", "Views", "Followers", "Comments", "Saves", "Shares", "Subscribers", "Watchtime", "Repins", "Retweets", "Traffic", "Members"];
    
    const platforms = [
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F", categories: ["Likes", "Views", "Followers", "Comments", "Saves", "Shares"] },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#000000", categories: ["Likes", "Views", "Followers", "Comments", "Shares"] },
        { name: "Facebook", icon: "fab fa-facebook", color: "#1877F2", categories: ["Likes", "Views", "Followers", "Comments", "Shares"] },
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000", categories: ["Likes", "Views", "Subscribers", "Watchtime", "Comments"] },
        { name: "Twitter", icon: "fab fa-twitter", color: "#1DA1F2", categories: ["Likes", "Retweets", "Followers", "Views"] },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366", categories: ["Traffic", "Views", "Members"] },
        { name: "Snapchat", icon: "fab fa-snapchat", color: "#FFFC00", categories: ["Views", "Followers"] },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4", categories: ["Members", "Views"] },
        { name: "LinkedIn", icon: "fab fa-linkedin", color: "#0A66C2", categories: ["Likes", "Followers", "Views"] },
        { name: "Pinterest", icon: "fab fa-pinterest", color: "#BD081C", categories: ["Repins", "Likes", "Followers"] },
        { name: "Discord", icon: "fab fa-discord", color: "#5865F2", categories: ["Members"] },
        { name: "Twitch", icon: "fab fa-twitch", color: "#9146FF", categories: ["Followers", "Views"] },
        { name: "Spotify", icon: "fab fa-spotify", color: "#1DB954", categories: ["Followers", "Plays"] },
        { name: "Google", icon: "fab fa-google", color: "#4285F4", categories: ["Traffic", "Views"] },
        { name: "Threads", icon: "fab fa-threads", color: "#000000", categories: ["Likes", "Followers", "Views"] },
        { name: "Netflix", icon: "fas fa-film", color: "#E50914", categories: ["Views"] },
        { name: "Canva", icon: "fas fa-palette", color: "#00C4CC", categories: ["Designs", "Templates"] },
        { name: "CapCut", icon: "fas fa-cut", color: "#00D4FF", categories: ["Edits", "Templates"] },
        { name: "ChatGPT", icon: "fas fa-comment-dots", color: "#10A37F", categories: ["Prompts"] },
        { name: "Gemini", icon: "fas fa-brain", color: "#4285F4", categories: ["Prompts"] },
        { name: "Website Traffic", icon: "fas fa-globe", color: "#3b82f6", categories: ["Traffic", "Views"] },
        { name: "PUBG UC", icon: "fas fa-gamepad", color: "#FFA500", categories: ["UC", "Points"] }
    ];
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeSuccessModal() { document.getElementById('successModal').style.display = 'none'; if (currentUser) navigate("home"); }
    
    function convertPrice(amountPKR) { return amountPKR * exchangeRates[activeCurrency]; }
    function formatCurrency(amountPKR) { 
        let converted = convertPrice(amountPKR);
        let symbol = currencySymbols[activeCurrency];
        if (activeCurrency === 'PKR') return `${symbol} ${converted.toFixed(2)} PKR`;
        return `${symbol} ${converted.toFixed(2)}`;
    }
    
    function formatRateDisplay(service) {
        if (service.Per1k === true || service.Per1k === "TRUE") {
            let ratePer1000 = service.Rate;
            let converted = convertPrice(ratePer1000);
            let symbol = currencySymbols[activeCurrency];
            let currencyText = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${currencyText} per 1000`;
        } else {
            let converted = convertPrice(service.Rate);
            let symbol = currencySymbols[activeCurrency];
            let currencyText = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${currencyText} per unit`;
        }
    }
    
    function updateCurrencyDisplay() {
        document.querySelectorAll('.currency-btn').forEach(btn => {
            if (btn.dataset.curr === activeCurrency) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (currentUser && document.getElementById("pageContent")) {
            let currentPage = window.location.hash.replace('#', '') || "home";
            navigate(currentPage);
        }
    }
    
    async function apiCall(action, data = {}) {
        const payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            return await res.json();
        } catch(err) { return { success: false, error: err.message }; }
    }
    
    async function loadServices() { 
        let res = await apiCall("getServices"); 
        if(res.success) allServices = res.services; 
    }
    
    async function checkAuth() { 
        let token = localStorage.getItem("mts_token"); 
        if(!token) { showAuthScreen(); return false; } 
        let res = await apiCall("verifySession", { token }); 
        if(res.success) { 
            currentUser = res.user; 
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; 
            await loadJoinApplicationStatus();
            return true; 
        } else { 
            localStorage.removeItem("mts_token"); 
            showAuthScreen(); 
            return false; 
        } 
    }
    
    async function loadJoinApplicationStatus() {
        let res = await apiCall("getMyJoinStatus");
        if(res.success && res.application) joinStatus = res.application;
        else joinStatus = null;
    }
    
    function showAuthScreen() { 
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:50px auto;">
                <h2><i class="fas fa-rocket"></i> Welcome to MTS SMM</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" class="btn" style="width:100%">Login</button>
                    <button id="showSignupBtn" style="background:transparent; border:1px solid #2b6ef0; width:100%; margin-top:10px;">Create Account</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Gmail"><input id="phoneNum" placeholder="Phone">
                    <select id="userType"><option>Commission Based</option><option>Salary Based</option></select>
                    <input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm">
                    <button id="doSignup" class="btn" style="width:100%">Register</button>
                    <button id="backLogin" style="background:transparent; border:1px solid #475569; width:100%; margin-top:10px;">Back</button>
                </div>
            </div>
        `; 
        attachAuthEvents(); 
    }
    
    function attachAuthEvents() { 
        document.getElementById("doLogin")?.addEventListener("click", async () => {
            let res = await apiCall("login", { email: document.getElementById("loginEmail").value, pass: document.getElementById("loginPass").value });
            if(res.success) { localStorage.setItem("mts_token", res.token); location.reload(); }
            else showToast(res.error, true);
        });
        document.getElementById("showSignupBtn")?.addEventListener("click", () => { document.getElementById("loginForm").style.display = "none"; document.getElementById("signupForm").style.display = "block"; });
        document.getElementById("backLogin")?.addEventListener("click", () => { document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; });
        document.getElementById("doSignup")?.addEventListener("click", async () => {
            let pass = document.getElementById("pass").value, confirm = document.getElementById("confirmPass").value;
            if(pass !== confirm) { showToast("Passwords don't match", true); return; }
            let res = await apiCall("signup", {
                fullName: document.getElementById("fullName").value, username: document.getElementById("username").value,
                gmail: document.getElementById("gmail").value, phone: document.getElementById("phoneNum").value,
                userType: document.getElementById("userType").value, password: pass
            });
            if(res.success) { showToast("Account created! Please login."); document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; }
            else showToast(res.error, true);
        });
    }
    
    async function renderProfile() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h2><i class="fas fa-user-edit"></i> Profile Settings</h2>
                <div class="form-row"><input id="profileFullName" placeholder="Full Name" value="${currentUser.fullName || ''}"></div>
                <div class="form-row"><input id="profileUsername" placeholder="Username" value="${currentUser.username || ''}"></div>
                <div class="form-row"><input id="profileGmail" placeholder="Email" value="${currentUser.gmail || ''}"></div>
                <div class="form-row"><input id="profilePhone" placeholder="Phone" value="${currentUser.phone || ''}"></div>
                <div class="form-row"><input type="password" id="newPassword" placeholder="New Password (leave blank to keep unchanged)"></div>
                <button id="updateProfileBtn" class="btn btn-success">Update Profile</button>
            </div>
        `;
        document.getElementById("updateProfileBtn").onclick = async () => {
            let res = await apiCall("updateProfile", {
                fullName: document.getElementById("profileFullName").value,
                username: document.getElementById("profileUsername").value,
                gmail: document.getElementById("profileGmail").value,
                phone: document.getElementById("profilePhone").value,
                newPassword: document.getElementById("newPassword").value
            });
            showToast(res.message);
            if(res.success) { currentUser = { ...currentUser, fullName: document.getElementById("profileFullName").value, username: document.getElementById("profileUsername").value, gmail: document.getElementById("profileGmail").value, phone: document.getElementById("profilePhone").value }; document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; }
        };
    }
    
    async function renderHome() { 
        await loadServices();
        let html = `
            <div class="glass-card"><h3><i class="fas fa-coins"></i> Wallet Balance: ${formatCurrency(currentUser.wallet)}</h3></div>
            <div class="glass-card">
                <div class="platform-icons" id="homePlatformIcons">${platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('')}</div>
                <select id="platformSelect"><option value="">Select Platform</option>${platforms.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}</select>
                <div id="categoryContainer" style="display:none;" class="category-selector">
                    <label><i class="fas fa-tags"></i> Select Category:</label>
                    <div class="category-buttons" id="categoryButtons"></div>
                </div>
                <select id="serviceSelect"><option value="">Select Service</option></select>
                <input type="number" id="quantity" placeholder="Quantity" min="1">
                <div id="dynamicFields"></div>
                <div id="serviceDetails" style="display:none;"></div>
                <div class="order-summary" id="orderSummary" style="display:none;"><h4>Order Summary</h4><p>Price per unit: <span id="servicePrice">0</span></p><p>Total Amount: <span id="totalAmount">0</span></p></div>
                <div style="display:flex; gap:10px;"><button id="placeOrderBtn" class="btn">Place Order</button><button id="clearFormBtn" class="btn btn-secondary">Clear</button></div>
            </div>
        `;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(el => el.addEventListener('click', () => { 
            document.getElementById('platformSelect').value = el.dataset.platform; 
            updateCategorySelector();
            updateServiceDropdown(); 
        }));
        document.getElementById("platformSelect").addEventListener("change", updateCategorySelector);
        document.getElementById("serviceSelect").addEventListener("change", showServiceDetails);
        document.getElementById("quantity").addEventListener("input", calculateTotal);
        document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
        document.getElementById("clearFormBtn").addEventListener("click", () => { selectedService = null; document.getElementById("serviceDetails").style.display = "none"; document.getElementById("orderSummary").style.display = "none"; document.getElementById("dynamicFields").innerHTML = ""; document.getElementById("quantity").value = ""; selectedCategory = "all"; });
        updateCategorySelector();
        updateServiceDropdown();
    }
    
    function updateCategorySelector() {
        let platform = document.getElementById("platformSelect").value;
        let platformData = platforms.find(p => p.name === platform);
        let categoryContainer = document.getElementById("categoryContainer");
        let categoryButtonsDiv = document.getElementById("categoryButtons");
        
        if (platform && platformData && platformData.categories) {
            categoryContainer.style.display = "block";
            let categories = ["all", ...platformData.categories];
            categoryButtonsDiv.innerHTML = categories.map(cat => 
                `<div class="category-btn ${selectedCategory === cat ? 'active' : ''}" data-category="${cat}">${cat === 'all' ? 'All Services' : cat}</div>`
            ).join('');
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCategory = btn.dataset.category;
                    updateServiceDropdown();
                });
            });
        } else {
            categoryContainer.style.display = "none";
            selectedCategory = "all";
            updateServiceDropdown();
        }
    }
    
    function updateServiceDropdown() {
        let platform = document.getElementById("platformSelect").value;
        let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
        if (selectedCategory !== "all") {
            filtered = filtered.filter(s => s.Name && s.Name.toLowerCase().includes(selectedCategory.toLowerCase()));
        }
        let select = document.getElementById("serviceSelect");
        select.innerHTML = '<option value="">Select a service</option>';
        filtered.forEach(s => { 
            let rateDisplay = formatRateDisplay(s);
            select.innerHTML += `<option value="${s.ServiceId}">${s.Name} - ${rateDisplay}</option>`; 
        });
        selectedService = null;
        document.getElementById("serviceDetails").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
    }
    
    function showServiceDetails() {
        let serviceId = document.getElementById("serviceSelect").value;
        if (!serviceId) return;
        selectedService = allServices.find(s => s.ServiceId === serviceId);
        
        let rateDisplay = formatRateDisplay(selectedService);
        let detailsHtml = `
            <div class="service-detail-card" style="background:rgba(0,0,0,0.3); border-radius:20px; padding:15px; margin:15px 0;">
                <h4>${selectedService.Name}</h4>
                <p><i class="fas fa-tag"></i> <strong>Rate:</strong> ${rateDisplay}</p>
                <p><i class="fas fa-chart-line"></i> <strong>Min Order:</strong> ${selectedService.MinQty} | <strong>Max Order:</strong> ${selectedService.MaxQty}</p>
                <p><i class="fas fa-clock"></i> <strong>Delivery Time:</strong> ${selectedService.DeliveryTime || '1-2 hours'}</p>
                <p><i class="fas fa-info-circle"></i> <strong>Description:</strong> ${selectedService.Description || 'High quality service'}</p>
            </div>
        `;
        document.getElementById("serviceDetails").innerHTML = detailsHtml;
        document.getElementById("serviceDetails").style.display = "block";
        
        let dynamicHtml = '';
        if (selectedService.IsAccount === true || selectedService.IsAccount === "TRUE") {
            dynamicHtml = `<div class="form-row"><div><label><i class="fas fa-envelope"></i> Email Address</label><input type="email" id="emailField" placeholder="Enter email for account"></div></div>`;
        } else {
            dynamicHtml = `<div class="form-row"><div><label><i class="fas fa-link"></i> Profile/Post Link</label><input type="url" id="linkField" placeholder="Enter your profile/post link"></div></div>`;
        }
        if (selectedService.CustomComments === true || selectedService.CustomComments === "TRUE") {
            dynamicHtml += `<div class="form-row"><div><label><i class="fas fa-comments"></i> Custom Comments (comma separated)</label><textarea id="commentsField" placeholder="Enter comments separated by commas"></textarea></div></div>`;
        }
        document.getElementById("dynamicFields").innerHTML = dynamicHtml;
        calculateTotal();
    }
    
    function calculateTotal() {
        if (!selectedService) return;
        let qty = parseInt(document.getElementById("quantity").value) || 0;
        let minQty = parseInt(selectedService.MinQty) || 1;
        let maxQty = parseInt(selectedService.MaxQty) || 10000;
        
        if (qty > 0 && qty < minQty) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Minimum quantity is ${minQty}`, true);
            return;
        }
        if (qty > maxQty) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Maximum quantity is ${maxQty}`, true);
            return;
        }
        if (qty === 0) {
            document.getElementById("orderSummary").style.display = "none";
            return;
        }
        
        let totalPKR;
        let pricePerUnitPKR;
        if (selectedService.Per1k === true || selectedService.Per1k === "TRUE") {
            pricePerUnitPKR = selectedService.Rate / 1000;
            totalPKR = pricePerUnitPKR * qty;
        } else {
            pricePerUnitPKR = selectedService.Rate;
            totalPKR = selectedService.Rate * qty;
        }
        
        document.getElementById("servicePrice").innerHTML = formatCurrency(pricePerUnitPKR);
        document.getElementById("totalAmount").innerHTML = formatCurrency(totalPKR);
        document.getElementById("orderSummary").style.display = "block";
        selectedService.calculatedTotal = totalPKR;
    }
    
    async function placeOrder() {
        if (!selectedService) { showToast("Select a service first", true); return; }
        let qty = parseInt(document.getElementById("quantity").value);
        if (!qty || qty < selectedService.MinQty) { showToast(`Minimum quantity: ${selectedService.MinQty}`, true); return; }
        if (currentUser.wallet < selectedService.calculatedTotal) { showToast(`Insufficient balance! Need ${formatCurrency(selectedService.calculatedTotal)}`, true); return; }
        
        let extraFields = {};
        if (document.getElementById("emailField")) extraFields.email = document.getElementById("emailField").value;
        if (document.getElementById("linkField")) extraFields.link = document.getElementById("linkField").value;
        if (document.getElementById("commentsField")) extraFields.comments = document.getElementById("commentsField").value;
        
        let res = await apiCall("createOrder", { serviceId: selectedService.ServiceId, quantity: qty, totalAmount: selectedService.calculatedTotal, extraFields });
        if (res.success) { 
            document.getElementById("successMessage").innerHTML = `<strong>Order ID:</strong> ${res.orderId}<br>Service: ${selectedService.Name}<br>Quantity: ${qty}<br>Amount: ${formatCurrency(selectedService.calculatedTotal)}`; 
            document.getElementById("successModal").style.display = "block"; 
        } else showToast(res.error, true);
    }
    
    async function renderServices() { 
        await loadServices();
        let html = `<div class="glass-card"><div class="platform-icons" id="servicePlatformIcons"><div class="platform-icon-item active" data-platform="all"><i class="fas fa-th-large"></i><span>All</span></div>${platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('')}</div><input id="searchInput" placeholder="🔍 Search services..."></div><div id="servicesGrid" class="service-grid"></div>`;
        document.getElementById("pageContent").innerHTML = html;
        document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(el => el.addEventListener('click', () => { document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); filterServices(); }));
        document.getElementById("searchInput").addEventListener("input", filterServices);

    function filterServices() {
        let platform = document.querySelector('#servicePlatformIcons .platform-icon-item.active')?.dataset.platform || 'all';
        let search = document.getElementById("searchInput")?.value.toLowerCase() || "";
        let filtered = allServices.filter(s => (platform === 'all' || s.Platform === platform) && (s.Name.toLowerCase().includes(search) || s.ServiceId.includes(search)));
        document.getElementById("servicesGrid").innerHTML = filtered.map(s => {
            let rateDisplay = formatRateDisplay(s);
            let platformIcon = platforms.find(p => p.name === s.Platform) || { icon: "fab fa-globe", color: "#fff" };
            return `<div class="glass-card service-card" onclick="navigateTo('home'); setTimeout(()=>selectService('${s.Platform}', '${s.ServiceId}'), 100)"><div style="display:flex; align-items:center; gap:10px;"><i class="${platformIcon.icon}" style="font-size:24px; color:${platformIcon.color}"></i><strong>${s.Name}</strong></div><hr style="margin:10px 0; border-color:#2d3a5e;"><p>Rate: ${rateDisplay}</p><p>Min: ${s.MinQty} | Max: ${s.MaxQty}</p><button class="btn" style="margin-top:10px; width:100%;" onclick="event.stopPropagation(); navigateTo('home'); setTimeout(()=>selectService('${s.Platform}', '${s.ServiceId}'), 100)">Order Now</button></div>`;
        }).join('');
    }
    
    function selectService(platform, serviceId) {
        let platformSelect = document.getElementById("platformSelect");
        if(platformSelect) { 
            platformSelect.value = platform; 
            updateCategorySelector();
            updateServiceDropdown(); 
            setTimeout(() => { 
                document.getElementById("serviceSelect").value = serviceId; 
                showServiceDetails(); 
            }, 100); 
        }
    }

    // JOIN US & EARN PAGE WITH 4 MAIN BUTTONS

    function navigate(page) { 
        if(page === "home") renderHome(); 
        else if(page === "dashboard") renderDashboard(); 
        else if(page === "services") renderServices(); 
        else if(page === "addfunds") renderAddFunds(); 
        else if(page === "profile") renderProfile();
        else if(page === "recommendations") renderRecommendations(); 
        else if(page === "joinus") renderJoinUs(); 
        else if(page === "help") renderHelp(); 
    }

    document.getElementById("currencyGroup")?.addEventListener("click", (e) => { if(e.target.dataset.curr) { activeCurrency = e.target.dataset.curr; updateCurrencyDisplay(); } });
    
    window.navigateTo = navigate;
    window.selectService = selectService;
    
    (async function init() { if(await checkAuth()) { await loadServices(); navigate("home"); } })();
</script>
