<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM | Professional Social Media Growth</title>
    <!-- Bootstrap 5 + Icons + Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: #f8fafc;
            transition: all 0.2s;
        }
        body.dark-mode {
            background: #0f172a;
            color: #e2e8f0;
        }
        .glass-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(0px);
            border-radius: 28px;
            border: 1px solid rgba(0,0,0,0.05);
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        body.dark-mode .glass-card {
            background: rgba(15, 25, 45, 0.85);
            border-color: rgba(255,255,255,0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .btn-primary-custom {
            background: linear-gradient(90deg, #2563eb, #06b6d4);
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 600;
            color: white;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); opacity: 0.9; }
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 1050;
            transition: 0.3s;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.05);
        }
        body.dark-mode .sidebar {
            background: #0f172a;
            border-right: 1px solid #1e293b;
        }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1040; display: none; }
        .platform-icon {
            background: #f1f5f9;
            border-radius: 60px;
            padding: 8px 16px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        body.dark-mode .platform-icon { background: #1e293b; color: #cbd5e1; }
        .platform-icon.active, .platform-icon:hover { background: #2563eb; color: white; }
        .cat-chip {
            background: #e2e8f0;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        body.dark-mode .cat-chip { background: #1e293b; }
        .cat-chip.active, .cat-chip:hover { background: #2563eb; color: white; }
        .service-card {
            transition: 0.2s;
            cursor: pointer;
            border-radius: 20px;
        }
        .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2); }
        .price-badge {
            background: #10b98120;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #10b981;
        }
        .admin-stat-card {
            border-left: 5px solid #2563eb;
        }
        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        @media (max-width:768px){
            .sidebar { width: 260px; }
        }
        .avatar-sm {
            width: 36px;
            height: 36px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fas fa-chart-line text-primary"></i> MTS SMM</h4>
        <i class="fas fa-times fs-5" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="nav flex-column">
        <a href="#" data-page="home" class="nav-link py-2"><i class="fas fa-home me-2"></i> Home</a>
        <a href="#" data-page="services" class="nav-link py-2"><i class="fas fa-box me-2"></i> Services</a>
        <a href="#" data-page="affiliate" class="nav-link py-2"><i class="fas fa-hand-holding-usd me-2"></i> Affiliate Program</a>
        <a href="#" data-page="privacy" class="nav-link py-2"><i class="fas fa-shield-alt me-2"></i> Privacy Policy</a>
        <a href="#" data-page="support" class="nav-link py-2"><i class="fas fa-headset me-2"></i> Contact Support</a>
        <a href="#" data-page="admin" class="nav-link py-2 d-none" id="adminNavLink"><i class="fas fa-crown me-2"></i> Admin Panel</a>
        <hr>
        <a href="#" id="logoutBtn" class="nav-link py-2 text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>
    <div class="mt-4 small text-muted">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeToggle">
            <label class="form-check-label" for="darkModeToggle">🌙 Dark Mode</label>
        </div>
    </div>
</div>

<div class="container-fluid px-0">
    <!-- Top Bar -->
    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm px-3 px-md-4" style="backdrop-filter: blur(12px); background: rgba(255,255,255,0.95)!important;">
        <div class="container-fluid">
            <button id="menuBtn" class="btn btn-link text-dark me-2 d-lg-none"><i class="fas fa-bars fs-4"></i></button>
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-rocket text-primary"></i> MTS SMM</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span id="walletBadge" class="badge bg-success bg-opacity-25 text-success px-3 py-2 rounded-pill">Wallet: $0</span>
                <div id="authButtons" class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" id="showLoginBtn">Login</button>
                    <button class="btn btn-primary btn-sm" id="showSignupBtn">Sign Up</button>
                </div>
                <div id="userMenu" class="dropdown d-none">
                    <div class="d-flex align-items-center gap-2" data-bs-toggle="dropdown">
                        <div class="avatar-sm" id="userAvatar">U</div>
                        <span id="userNameNav" class="fw-semibold d-none d-sm-inline"></span>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" id="dropdownLogout" href="#"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="px-3 px-md-4 py-4" id="mainContent">
        <div class="text-center py-5">Loading secure platform...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // -------------------- SUPABASE CONFIGURATION (YOUR CREDENTIALS) --------------------
    const SUPABASE_URL = "https://cwinwwsmjzyworyasecc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_t18iJfwO6nn45XNSRY9TGQ_yMtW4wFH";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Global state
    let currentUser = null;
    let currentProfile = null;
    let allServices = [];
    let platforms = ["TikTok","Instagram","Facebook","YouTube","Twitter","Pinterest","Telegram","WhatsApp","Snapchat","LinkedIn"];
    let categoriesMap = {
        "TikTok":["Likes","Views","Followers","Comments","Shares"],
        "Instagram":["Likes","Views","Followers","Comments","Saves","Shares"],
        "Facebook":["Likes","Views","Followers","Comments","Shares"],
        "YouTube":["Likes","Views","Subscribers","Watchtime","Comments"],
        "Twitter":["Likes","Retweets","Followers","Views"],
        default:["Likes","Views","Followers","Comments"]
    };

    // UI Helpers
    function showToast(message, isError = false) {
        const toastDiv = document.createElement('div');
        toastDiv.className = `toast-custom alert alert-${isError ? 'danger' : 'success'} shadow-lg`;
        toastDiv.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} me-2"></i> ${message}`;
        document.body.appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 4000);
    }

    async function refreshUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            currentProfile = profile;
            document.getElementById('authButtons').classList.add('d-none');
            document.getElementById('userMenu').classList.remove('d-none');
            document.getElementById('userNameNav').innerText = profile?.full_name?.split(' ')[0] || user.email;
            document.getElementById('userAvatar').innerText = (profile?.full_name?.charAt(0) || user.email.charAt(0)).toUpperCase();
            const { data: wallet } = await supabase.from('wallets').select('balance').eq('user_id', user.id).single();
            let balance = wallet?.balance || 0;
            document.getElementById('walletBadge').innerHTML = `💰 Wallet: $${balance.toFixed(2)}`;
            // check admin
            if (profile?.role === 'admin') document.getElementById('adminNavLink').classList.remove('d-none');
            else document.getElementById('adminNavLink').classList.add('d-none');
        } else {
            currentUser = null;
            document.getElementById('authButtons').classList.remove('d-none');
            document.getElementById('userMenu').classList.add('d-none');
        }
    }

    async function loadServicesFromDB() {
        const { data, error } = await supabase.from('services').select('*').eq('active', true);
        if (!error) allServices = data;
        else allServices = [];
    }

    // Routing & Pages
    async function navigate(page) {
        if (!currentUser && page !== 'home' && page !== 'services' && page !== 'privacy' && page !== 'support') {
            showToast("Please login first", true);
            return;
        }
        if (page === 'admin' && currentProfile?.role !== 'admin') {
            showToast("Access denied: Admin only", true);
            return;
        }
        const contentDiv = document.getElementById('mainContent');
        if (page === 'home') await renderHome(contentDiv);
        else if (page === 'services') await renderServices(contentDiv);
        else if (page === 'affiliate') await renderAffiliate(contentDiv);
        else if (page === 'privacy') renderPrivacy(contentDiv);
        else if (page === 'support') renderSupport(contentDiv);
        else if (page === 'dashboard') await renderDashboard(contentDiv);
        else if (page === 'admin') await renderAdminPanel(contentDiv);
        else await renderHome(contentDiv);
    }

    // HOME PAGE with ordering flow
    async function renderHome(container) {
        await loadServicesFromDB();
        let selectedPlatform = "", selectedCategory = "", selectedService = null, qty = 0;
        let extraLink = "", extraComments = "";
        container.innerHTML = `
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4 rounded-4 shadow-sm">
                        <h4 class="mb-3"><i class="fas fa-shopping-cart text-primary"></i> Place New Order</h4>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">1. Select Platform</label>
                            <div class="d-flex flex-wrap gap-2" id="platformListHome"></div>
                        </div>
                        <div class="mb-3" id="catDiv" style="display:none;">
                            <label class="form-label fw-semibold">2. Category</label>
                            <div class="d-flex flex-wrap gap-2" id="catListHome"></div>
                        </div>
                        <div class="mb-3" id="serviceDiv" style="display:none;">
                            <label class="form-label fw-semibold">3. Service</label>
                            <select class="form-select" id="serviceSelectHome"></select>
                        </div>
                        <div id="serviceDetail" style="display:none;" class="alert alert-secondary mt-2"></div>
                        <div id="linkDiv" style="display:none;" class="mb-3">
                            <label>Profile / Post URL</label>
                            <input type="url" class="form-control" id="orderLink" placeholder="https://instagram.com/p/...">
                        </div>
                        <div id="commentsDiv" style="display:none;" class="mb-3">
                            <label>Custom Comments (comma separated)</label>
                            <textarea class="form-control" id="orderComments" rows="2"></textarea>
                        </div>
                        <div id="qtyDiv" style="display:none;" class="mb-3">
                            <label>Quantity</label>
                            <input type="number" class="form-control" id="orderQty" min="1">
                            <small class="text-muted" id="qtyLimit"></small>
                        </div>
                        <div id="summaryDiv" style="display:none;" class="p-3 bg-light rounded-3 mb-3"></div>
                        <button id="placeOrderBtn" class="btn btn-primary-custom w-100" disabled>Place Order</button>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="glass-card p-4 rounded-4">
                        <h5><i class="fas fa-chart-line"></i> Why Choose MTS SMM?</h5>
                        <div class="mt-3"><i class="fas fa-shield-alt text-primary"></i> <strong>We Sell Trust</strong><br>Reliable delivery</div>
                        <div class="mt-2"><i class="fas fa-tag text-primary"></i> <strong>Affordable & Guaranteed</strong><br>Best prices</div>
                        <div class="mt-2"><i class="fas fa-globe text-primary"></i> <strong>Global Platforms</strong><br>30+ networks</div>
                        <div class="mt-2"><i class="fas fa-headset text-primary"></i> <strong>24/7 Support</strong><br>Fast assistance</div>
                    </div>
                </div>
            </div>
        `;

        const platformDiv = document.getElementById('platformListHome');
        platforms.forEach(p => {
            const btn = document.createElement('div');
            btn.className = "platform-icon";
            btn.innerText = p;
            btn.onclick = () => {
                document.querySelectorAll('#platformListHome .platform-icon').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                selectedPlatform = p;
                renderCategories(p);
                document.getElementById('catDiv').style.display = 'block';
                document.getElementById('serviceDiv').style.display = 'none';
                document.getElementById('serviceDetail').style.display = 'none';
                document.getElementById('qtyDiv').style.display = 'none';
                document.getElementById('summaryDiv').style.display = 'none';
                document.getElementById('placeOrderBtn').disabled = true;
                selectedService = null;
            };
            platformDiv.appendChild(btn);
        });

        function renderCategories(platform) {
            const cats = categoriesMap[platform] || categoriesMap.default;
            const catContainer = document.getElementById('catListHome');
            catContainer.innerHTML = '';
            cats.forEach(cat => {
                const chip = document.createElement('div');
                chip.className = "cat-chip";
                chip.innerText = cat;
                chip.onclick = () => {
                    document.querySelectorAll('#catListHome .cat-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    selectedCategory = cat;
                    loadServicesForPlatform(platform, cat);
                    document.getElementById('serviceDiv').style.display = 'block';
                };
                catContainer.appendChild(chip);
            });
        }

        function loadServicesForPlatform(platform, category) {
            const filtered = allServices.filter(s => s.platform === platform && s.name.toLowerCase().includes(category.toLowerCase()));
            const select = document.getElementById('serviceSelectHome');
            select.innerHTML = '<option value="">-- Choose service --</option>';
            filtered.forEach(svc => {
                const opt = document.createElement('option');
                opt.value = svc.id;
                opt.textContent = `${svc.name} | ${svc.price_per_1k ? `$${svc.price}/1k` : `$${svc.price}/unit`}`;
                select.appendChild(opt);
            });
            select.onchange = () => {
                const svcId = select.value;
                selectedService = allServices.find(s => s.id == svcId);
                if (!selectedService) return;
                document.getElementById('serviceDetail').style.display = 'block';
                document.getElementById('serviceDetail').innerHTML = `<strong>${selectedService.name}</strong><br>Min:${selectedService.min_qty} Max:${selectedService.max_qty} Delivery: fast`;
                // Extra fields
                document.getElementById('linkDiv').style.display = selectedService.require_link ? 'block' : 'none';
                document.getElementById('commentsDiv').style.display = selectedService.require_comments ? 'block' : 'none';
                document.getElementById('qtyDiv').style.display = 'block';
                document.getElementById('qtyLimit').innerHTML = `Min ${selectedService.min_qty} - Max ${selectedService.max_qty}`;
                document.getElementById('orderQty').value = selectedService.min_qty;
                updateSummary();
                document.getElementById('placeOrderBtn').disabled = false;
            };
            if(filtered.length) select.dispatchEvent(new Event('change'));
        }

        function updateSummary() {
            const qtyEl = document.getElementById('orderQty');
            if (!selectedService || !qtyEl) return;
            let quantity = parseInt(qtyEl.value) || 0;
            if (quantity < selectedService.min_qty) quantity = selectedService.min_qty;
            if (quantity > selectedService.max_qty) quantity = selectedService.max_qty;
            let total = 0;
            if (selectedService.price_per_1k) {
                total = (selectedService.price / 1000) * quantity;
            } else {
                total = selectedService.price * quantity;
            }
            document.getElementById('summaryDiv').style.display = 'block';
            document.getElementById('summaryDiv').innerHTML = `<strong>Order Summary</strong><br>Service: ${selectedService.name}<br>Quantity: ${quantity}<br>Total: $${total.toFixed(2)}`;
            document.getElementById('placeOrderBtn').dataset.total = total;
            document.getElementById('placeOrderBtn').dataset.qty = quantity;
        }
        document.getElementById('orderQty')?.addEventListener('input', updateSummary);
        document.getElementById('placeOrderBtn').onclick = async () => {
            if (!currentUser) { showToast("Login required", true); return; }
            const total = parseFloat(document.getElementById('placeOrderBtn').dataset.total);
            const quantity = parseInt(document.getElementById('placeOrderBtn').dataset.qty);
            const walletRes = await supabase.from('wallets').select('balance').eq('user_id', currentUser.id).single();
            if (walletRes.error || walletRes.data.balance < total) { showToast("Insufficient wallet balance", true); return; }
            const orderData = {
                user_id: currentUser.id,
                service_id: selectedService.id,
                service_name: selectedService.name,
                quantity: quantity,
                total_amount: total,
                status: 'pending',
                link: document.getElementById('orderLink')?.value || '',
                comments: document.getElementById('orderComments')?.value || ''
            };
            const { error: orderErr } = await supabase.from('orders').insert(orderData);
            if (orderErr) { showToast("Order failed", true); return; }
            // deduct wallet
            const newBalance = walletRes.data.balance - total;
            await supabase.from('wallets').update({ balance: newBalance }).eq('user_id', currentUser.id);
            await refreshUser();
            showToast(`Order placed! ID: ${Math.floor(Math.random()*10000)}`);
            document.getElementById('orderLink').value = '';
            document.getElementById('orderComments').value = '';
            document.getElementById('placeOrderBtn').disabled = true;
        };
    }

    // SERVICES PAGE
    async function renderServices(container) {
        await loadServicesFromDB();
        container.innerHTML = `<div class="glass-card p-4"><div class="row"><div class="col-md-3" id="serviceFilters"></div><div class="col-md-9" id="serviceList"></div></div></div>`;
        const filterDiv = document.getElementById('serviceFilters');
        const servicesDiv = document.getElementById('serviceList');
        filterDiv.innerHTML = `<h5>Platforms</h5><div class="d-flex flex-wrap gap-2" id="filterPlats"></div><input type="text" id="searchService" class="form-control mt-3" placeholder="Search...">`;
        const platContainer = document.getElementById('filterPlats');
        platforms.forEach(p => {
            const btn = document.createElement('div');
            btn.className = "platform-icon";
            btn.innerText = p;
            btn.onclick = () => { renderServiceCards(p, servicesDiv); };
            platContainer.appendChild(btn);
        });
        document.getElementById('searchService').addEventListener('input', () => renderServiceCards('all', servicesDiv));
        renderServiceCards('all', servicesDiv);
    }
    async function renderServiceCards(platform, div) {
        let filtered = allServices;
        if (platform !== 'all') filtered = filtered.filter(s => s.platform === platform);
        const search = document.getElementById('searchService')?.value.toLowerCase() || '';
        if (search) filtered = filtered.filter(s => s.name.toLowerCase().includes(search) || s.id.toString().includes(search));
        div.innerHTML = `<div class="row g-3">` + filtered.map(s => `
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h6 class="fw-bold">${s.name}</h6>
                        <p class="small text-muted">${s.platform}</p>
                        <div class="price-badge d-inline-block">${s.price_per_1k ? `$${s.price}/1k` : `$${s.price}/unit`}</div>
                        <hr>
                        <button class="btn btn-sm btn-primary order-now-btn w-100" data-id="${s.id}">Order Now</button>
                    </div>
                </div>
            </div>
        `).join('') + `</div>`;
        document.querySelectorAll('.order-now-btn').forEach(btn => {
            btn.addEventListener('click', () => { navigate('home'); setTimeout(()=>{ /*simulate preselect?*/ }, 100); });
        });
    }

    // AFFILIATE PROGRAM
    async function renderAffiliate(container) {
        if (!currentUser) { container.innerHTML = '<div class="alert alert-warning">Please login to join affiliate program.</div>'; return; }
        const { data: affiliate } = await supabase.from('affiliates').select('*').eq('user_id', currentUser.id).single();
        let refLink = `${window.location.origin}?ref=${currentUser.id}`;
        let commissionRate = 20;
        const { data: settings } = await supabase.from('site_settings').select('value').eq('key', 'affiliate_commission').single();
        if (settings) commissionRate = parseFloat(settings.value);
        container.innerHTML = `
            <div class="glass-card p-4 mb-4">
                <h3><i class="fas fa-hand-holding-usd"></i> Affiliate Partner Program</h3>
                <p>Earn ${commissionRate}% commission on every order from your referrals.</p>
                ${!affiliate ? `<button id="applyAffiliateBtn" class="btn btn-primary">Apply as Affiliate</button>` : `<div class="alert alert-success">✅ Affiliate active! Your referral link: <br><code>${refLink}</code><br>Total earned: $${affiliate?.earnings || 0}</div>`}
                <div class="mt-4"><h5>Terms & Conditions</h5><p class="small">Must be 18+, No spam, commission paid after order completion. Minimum payout $50.</p></div>
            </div>
        `;
        if (!affiliate) document.getElementById('applyAffiliateBtn')?.addEventListener('click', async () => {
            await supabase.from('affiliates').insert({ user_id: currentUser.id, commission_rate: commissionRate, earnings: 0 });
            showToast("Affiliate application submitted. Approved instantly for demo.");
            renderAffiliate(container);
        });
    }

    // Dashboard
    async function renderDashboard(container) {
        const { data: orders } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(10);
        const { data: wallet } = await supabase.from('wallets').select('balance').eq('user_id', currentUser.id).single();
        container.innerHTML = `
            <div class="row g-4">
                <div class="col-md-4"><div class="glass-card p-3 text-center"><h5>Wallet</h5><h3>$${wallet?.balance || 0}</h3></div></div>
                <div class="col-md-4"><div class="glass-card p-3 text-center"><h5>Total Orders</h5><h3>${orders?.length || 0}</h3></div></div>
                <div class="col-md-12 glass-card p-4"><h5>Recent Orders</h5><div class="table-responsive"><table class="table">${orders?.map(o => `<tr><td>#${o.id}</td><td>${o.service_name}</td><td>$${o.total_amount}</td><td>${o.status}</td>`).join('') || '<tr><td colspan="3">No orders</td></tr>'}<\/table></div></div>
            </div>`;
    }

    // Admin Panel
    async function renderAdminPanel(container) {
        if (currentProfile?.role !== 'admin') return;
        const { data: users } = await supabase.from('profiles').select('*');
        const { data: ordersAll } = await supabase.from('orders').select('*');
        const totalRev = ordersAll?.reduce((a, b) => a + (b.total_amount || 0), 0) || 0;
        container.innerHTML = `
            <div class="row g-3">
                <div class="col-md-3"><div class="glass-card p-3"><h6>Total Users</h6><h3>${users?.length}</h3></div></div>
                <div class="col-md-3"><div class="glass-card p-3"><h6>Total Orders</h6><h3>${ordersAll?.length}</h3></div></div>
                <div class="col-md-3"><div class="glass-card p-3"><h6>Revenue</h6><h3>$${totalRev.toFixed(2)}</h3></div></div>
                <div class="col-md-12 glass-card p-4">
                    <h5>Manage Commission Rate</h5>
                    <div class="input-group w-50"><input type="number" id="commRate" class="form-control" placeholder="%"><button id="saveCommBtn" class="btn btn-primary">Save</button></div>
                    <hr><h5>User Services (soon)</h5><button class="btn btn-sm btn-warning" id="refreshServicesAdmin">Mock Sync</button>
                </div>
            </div>`;
        document.getElementById('saveCommBtn')?.addEventListener('click', async() => {
            const rate = document.getElementById('commRate').value;
            await supabase.from('site_settings').upsert({ key: 'affiliate_commission', value: rate });
            showToast("Commission updated");
        });
    }

    // Privacy & Support
    function renderPrivacy(container) {
        container.innerHTML = `<div class="glass-card p-5"><h2>Privacy Policy</h2><p>We value your privacy. All data is encrypted. We never share personal information. For details, contact support.</p><p>GDPR Compliant.</p></div>`;
    }
    function renderSupport(container) {
        container.innerHTML = `<div class="glass-card p-5"><h3>Contact Support</h3><form id="supportForm"><input class="form-control mb-2" placeholder="Email" id="supEmail"><textarea class="form-control mb-2" placeholder="Message" rows="4"></textarea><button class="btn btn-primary">Send</button></form><div class="mt-4"><a href="https://wa.me/123456789" class="btn btn-success"><i class="fab fa-whatsapp"></i> WhatsApp</a></div></div>`;
        document.getElementById('supportForm')?.addEventListener('submit', async(e) => { e.preventDefault(); showToast("Ticket sent! Our team responds quickly."); });
    }

    // Authentication Modals
    function showAuthModal(type) {
        Swal.fire({
            title: type === 'login' ? 'Login to MTS SMM' : 'Create Account',
            html: `<input id="emailInput" class="swal2-input" placeholder="Email">
                   <input id="passInput" type="password" class="swal2-input" placeholder="Password">
                   ${type === 'signup' ? '<input id="nameInput" class="swal2-input" placeholder="Full Name">' : ''}`,
            preConfirm: async () => {
                const email = document.getElementById('emailInput').value;
                const pass = document.getElementById('passInput').value;
                if (type === 'login') {
                    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
                    if (error) { Swal.showValidationMessage(error.message); return false; }
                } else {
                    const name = document.getElementById('nameInput').value;
                    const { data, error } = await supabase.auth.signUp({ email, password: pass });
                    if (error) { Swal.showValidationMessage(error.message); return false; }
                    if (data.user) {
                        await supabase.from('profiles').insert({ id: data.user.id, full_name: name, email: email, role: 'user' });
                        await supabase.from('wallets').insert({ user_id: data.user.id, balance: 0 });
                    }
                }
                await refreshUser();
                navigate('home');
                return true;
            }
        });
    }

    // Event listeners & Init
    document.getElementById('menuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').style.display = 'block'; };
    document.getElementById('closeSidebar').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; };
    document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; };
    document.querySelectorAll('[data-page]').forEach(el => {
        el.addEventListener('click', (e) => { e.preventDefault(); navigate(el.getAttribute('data-page')); document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; });
    });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => showAuthModal('login'));
    document.getElementById('showSignupBtn')?.addEventListener('click', () => showAuthModal('signup'));
    document.getElementById('logoutBtn')?.addEventListener('click', async () => { await supabase.auth.signOut(); refreshUser(); navigate('home'); });
    document.getElementById('dropdownLogout')?.addEventListener('click', async () => { await supabase.auth.signOut(); refreshUser(); navigate('home'); });
    document.getElementById('darkModeToggle')?.addEventListener('change', (e) => { if(e.target.checked) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode'); });

    // Initialize
    supabase.auth.onAuthStateChange(async (event, session) => { await refreshUser(); navigate('home'); });
    (async () => {
        await refreshUser();
        await loadServicesFromDB();
        navigate('home');
    })();
</script>
</body>
</html>
