<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.5); transform: translateY(-2px); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
        select option { background: #1e293b; color: white; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.96); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; max-height: 200px; overflow-y: auto; padding: 10px; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.6); border-radius: 50px; padding: 10px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .platform-icon-item:hover, .platform-icon-item.active { background: #2b6ef0; transform: translateY(-3px); }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s; color: white; }
        .currency-btn.active { background: #2b6ef0; border-color: white; }

        /* Order Form Styles */
        .order-form-section { margin: 12px 0; }
        .order-form-section label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; padding-left: 8px; }
        .step-indicator { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #3b82f6; margin-bottom: 8px; }
        .step-indicator .step-num { background: #2b6ef0; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Category chips */
        .category-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 0; }
        .cat-chip { background: rgba(30,41,59,0.8); border: 1px solid #334155; padding: 7px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .cat-chip:hover { background: #1e40af; border-color: #3b82f6; }
        .cat-chip.active { background: #2b6ef0; border-color: #60a5fa; color: white; }

        /* Service description box */
        .service-desc-box { background: rgba(0,0,0,0.35); border: 1px solid #1e3a5f; border-radius: 20px; padding: 16px 20px; margin: 10px 0; }
        .service-desc-box .desc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .desc-item { display: flex; flex-direction: column; gap: 2px; }
        .desc-item .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .desc-item .value { font-size: 14px; font-weight: 600; color: #e2e8f0; }

        /* Price display */
        .price-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(43,110,240,0.2); border: 1px solid rgba(43,110,240,0.4); border-radius: 20px; padding: 5px 14px; font-size: 14px; font-weight: 700; color: #60a5fa; }

        /* Order summary */
        .order-summary { background: linear-gradient(135deg, rgba(0,200,255,0.08), rgba(43,110,240,0.08)); border: 1px solid rgba(0,200,255,0.25); border-radius: 20px; padding: 18px 20px; margin-top: 16px; }
        .order-summary h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .summary-row:last-child { border-bottom: none; font-size: 16px; font-weight: 700; color: #34d399; margin-top: 4px; }
        .summary-row .key { color: #94a3b8; }

        /* Payment method cards */
        .payment-methods { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
        .payment-method-card { background: rgba(30,41,59,0.6); border: 2px solid #334155; border-radius: 20px; padding: 18px; cursor: pointer; transition: all 0.25s; text-align: center; }
        .payment-method-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
        .payment-method-card.selected { border-color: #2b6ef0; background: rgba(43,110,240,0.2); }
        .payment-method-card .pm-icon { font-size: 32px; margin-bottom: 8px; }
        .payment-method-card .pm-name { font-weight: 700; font-size: 16px; }
        .payment-method-card .pm-number { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .payment-method-card .pm-holder { font-size: 12px; color: #64748b; }
        .proof-form { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; }
        .proof-form.active { display: block; }

        /* Success modal */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172ae6; backdrop-filter: blur(20px); border-radius: 32px; padding: 28px; width: 90%; max-width: 520px; z-index: 1100; display: none; border: 1px solid rgba(0,200,255,0.4); max-height: 85vh; overflow-y: auto; }
        .success-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; text-align: left; }
        .success-detail-item { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 12px; }
        .success-detail-item .s-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .success-detail-item .s-value { font-size: 14px; font-weight: 600; color: #e2e8f0; word-break: break-all; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 9999; border-left: 4px solid #2b6ef0; max-width: 350px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 120px; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 25px 0; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-approved { background: #10b981; color: white; }
        .status-pending { background: #f59e0b; color: black; }
        .status-rejected { background: #dc2626; color: white; }
        .join-main-tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .join-main-tab-btn { background: #1e293b; padding: 12px 24px; border-radius: 40px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .join-main-tab-btn.active { background: #2b6ef0; }
        .join-main-tab-btn:hover { background: #3b82f6; }
        .join-tab-content { display: none; }
        .join-tab-content.active { display: block; }
        .info-note { background: rgba(245, 158, 11, 0.2); border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .success-note { background: rgba(16, 185, 129, 0.2); border-left: 4px solid #10b981; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .category-selector { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 15px; margin: 15px 0; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .category-btn { background: #1e293b; padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-size: 14px; color: white; border: none; }
        .category-btn:hover, .category-btn.active { background: #2b6ef0; }
        .history-table { overflow-x: auto; margin-top: 15px; }
        .history-table table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 10px; text-align: left; border-bottom: 1px solid #2d3a5e; }
        .history-table th { background: rgba(43, 110, 240, 0.3); }
        .loading-spinner { text-align: center; padding: 50px; }
        .loading-spinner i { font-size: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .form-row { flex-direction: column; } .platform-icon-item { padding: 6px 12px; font-size: 12px; } .success-detail-grid { grid-template-columns: 1fr; } }

        /* Divider */
        .section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 16px 0; }

        /* Fade-in animation for dynamic sections */
        .fade-in { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" data-page="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile"><i class="fas fa-user-edit"></i> Profile Settings</a>
        <a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a>
        <a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us & Earn</a>
        <a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-toggle" style="margin-top: 20px;">
            <label><i class="fas fa-exchange-alt"></i> Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button>
                <button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-curr="AED">🇦🇪 AED</button>
                <button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
                <button class="currency-btn" data-curr="INR">🇮🇳 INR</button>
                <button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div class="user-info">
            <i class="fas fa-sync-alt refresh-btn" id="refreshBtn" style="cursor:pointer; margin-right:15px;"></i>
            <span id="userAvatar"><i class="fas fa-user-circle"></i></span>
            <span id="userNameDisplay">Guest</span>
        </div>
    </div>
    <div id="pageContent"><div class="loading-spinner"><i class="fas fa-spinner"></i><br>Loading...</div></div>
</div>

<!-- Success Modal -->
<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size: 56px; color: #10b981; margin-bottom: 10px;"></i>
        <h2 style="margin-bottom:6px;">Order Placed!</h2>
        <p style="color:#64748b; font-size:14px; margin-bottom:16px;">Your order has been successfully submitted.</p>
        <div id="successOrderId" style="background:rgba(43,110,240,0.2); border-radius:14px; padding:10px; margin-bottom:12px; font-size:18px; font-weight:700; color:#60a5fa;"></div>
        <div class="success-detail-grid" id="successDetailGrid"></div>
        <button onclick="closeSuccessModal()" class="btn btn-success" style="margin-top:10px; width:100%;">✓ OK</button>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR: 1, USD: 0.0036, AED: 0.0132, SAR: 0.0135, INR: 0.30, EUR: 0.0033 };
    let currencySymbols = { PKR: "Rs", USD: "$", AED: "د.إ", SAR: "﷼", INR: "₹", EUR: "€" };
    let allServices = [];
    let selectedService = null;
    let joinApplication = null;
    let selectedCategory = "all";
    let selectedPaymentMethod = null;
    
    const platforms = [
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F", categories: ["Likes", "Views", "Followers", "Comments", "Saves", "Shares"] },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#ffffff", categories: ["Likes", "Views", "Followers", "Comments", "Shares"] },
        { name: "Facebook", icon: "fab fa-facebook", color: "#1877F2", categories: ["Likes", "Views", "Followers", "Comments", "Shares"] },
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000", categories: ["Likes", "Views", "Subscribers", "Watchtime", "Comments"] },
        { name: "Twitter", icon: "fab fa-twitter", color: "#1DA1F2", categories: ["Likes", "Retweets", "Followers", "Views"] },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366", categories: ["Traffic", "Views", "Members"] },
        { name: "Snapchat", icon: "fab fa-snapchat", color: "#FFFC00", categories: ["Views", "Followers"] },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4", categories: ["Members", "Views"] },
        { name: "LinkedIn", icon: "fab fa-linkedin", color: "#0A66C2", categories: ["Likes", "Followers", "Views"] },
        { name: "Pinterest", icon: "fab fa-pinterest", color: "#BD081C", categories: ["Repins", "Likes", "Followers"] },
        { name: "Discord", icon: "fab fa-discord", color: "#5865F2", categories: ["Members"] },
        { name: "Twitch", icon: "fab fa-twitch", color: "#9146FF", categories: ["Followers", "Views"] },
        { name: "Spotify", icon: "fab fa-spotify", color: "#1DB954", categories: ["Followers", "Plays"] },
        { name: "Google", icon: "fab fa-google", color: "#4285F4", categories: ["Traffic", "Views"] },
        { name: "Threads", icon: "fab fa-threads", color: "#ffffff", categories: ["Likes", "Followers", "Views"] },
        { name: "Netflix", icon: "fas fa-film", color: "#E50914", categories: ["Views"] },
        { name: "Canva", icon: "fas fa-palette", color: "#00C4CC", categories: ["Designs", "Templates"] },
        { name: "CapCut", icon: "fas fa-cut", color: "#00D4FF", categories: ["Edits", "Templates"] },
        { name: "ChatGPT", icon: "fas fa-comment-dots", color: "#10A37F", categories: ["Prompts"] },
        { name: "Gemini", icon: "fas fa-brain", color: "#4285F4", categories: ["Prompts"] },
        { name: "Website Traffic", icon: "fas fa-globe", color: "#3b82f6", categories: ["Traffic", "Views"] },
        { name: "PUBG UC", icon: "fas fa-gamepad", color: "#FFA500", categories: ["UC", "Points"] }
    ];

    const TARGET_COUNTRIES = [
        "Worldwide","Pakistan","India","USA","UK","UAE","Saudi Arabia","Bangladesh","Turkey","Egypt","Indonesia","Brazil","Germany","France","Canada","Australia","Italy","Spain","Netherlands","Russia","Japan","South Korea","Philippines","Malaysia","Nigeria","Kenya","Mexico","Argentina","South Africa","Iraq","Jordan"
    ];
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }
    
    function closeSuccessModal() { document.getElementById('successModal').style.display = 'none'; if (currentUser) navigate("home"); }
    
    function convertPrice(amountPKR) { return amountPKR * exchangeRates[activeCurrency]; }
    function formatCurrency(amountPKR) { 
        let converted = convertPrice(amountPKR);
        let symbol = currencySymbols[activeCurrency];
        if (activeCurrency === 'PKR') return `${symbol} ${converted.toFixed(2)} PKR`;
        return `${symbol} ${converted.toFixed(2)}`;
    }
    
    function formatRateDisplay(service) {
        if (service.Per1k === true || service.Per1k === "TRUE") {
            let converted = convertPrice(service.Rate);
            let symbol = currencySymbols[activeCurrency];
            let currencyText = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${currencyText} = 1000`;
        } else {
            let converted = convertPrice(service.Rate);
            let symbol = currencySymbols[activeCurrency];
            let currencyText = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${currencyText} per unit`;
        }
    }
    
    function updateCurrencyDisplay() {
        document.querySelectorAll('.currency-btn').forEach(btn => {
            if (btn.dataset.curr === activeCurrency) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (currentUser && document.getElementById("pageContent")) {
            let currentPage = window.location.hash.replace('#', '') || "home";
            navigate(currentPage);
        }
    }
    
    async function apiCall(action, data = {}) {
        const payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            const text = await res.text();
            return JSON.parse(text);
        } catch(err) { 
            console.error("API Error:", err);
            return { success: false, error: err.message }; 
        }
    }
    
    async function loadServices() { 
        let res = await apiCall("getServices"); 
        if(res.success) allServices = res.services; 
    }
    
    async function checkAuth() { 
        let token = localStorage.getItem("mts_token"); 
        if(!token) { showAuthScreen(); return false; } 
        let res = await apiCall("verifySession", { token }); 
        if(res.success && res.user) { 
            currentUser = res.user; 
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; 
            await loadJoinApplication();
            return true; 
        } else { 
            localStorage.removeItem("mts_token"); 
            currentUser = null;
            showAuthScreen(); 
            return false; 
        } 
    }
    
    async function loadJoinApplication() {
        try {
            let res = await apiCall("getMyJoinStatus");
            if(res.success && res.application) {
                joinApplication = res.application;
            } else {
                joinApplication = null;
            }
        } catch(e) {
            joinApplication = null;
        }
    }
    
    function showAuthScreen() { 
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:50px auto;">
                <h2><i class="fas fa-rocket"></i> Welcome to MTS SMM</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" class="btn" style="width:100%">Login</button>
                    <button id="showSignupBtn" style="background:transparent; border:1px solid #2b6ef0; width:100%; margin-top:10px;">Create Account</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Gmail"><input id="phoneNum" placeholder="Phone">
                    <select id="userType"><option>Commission Based</option><option>Salary Based</option></select>
                    <input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm">
                    <button id="doSignup" class="btn" style="width:100%">Register</button>
                    <button id="backLogin" style="background:transparent; border:1px solid #475569; width:100%; margin-top:10px;">Back</button>
                </div>
            </div>
        `; 
        attachAuthEvents(); 
    }
    
    function attachAuthEvents() { 
        document.getElementById("doLogin")?.addEventListener("click", async () => {
            let email = document.getElementById("loginEmail").value;
            let pass = document.getElementById("loginPass").value;
            if(!email || !pass) { showToast("Please enter email and password", true); return; }
            showToast("Logging in...");
            let res = await apiCall("login", { email, pass });
            if(res.success) { 
                localStorage.setItem("mts_token", res.token); 
                showToast("Login successful!");
                location.reload(); 
            } else { 
                showToast(res.error || "Login failed", true); 
            }
        });
        document.getElementById("showSignupBtn")?.addEventListener("click", () => { document.getElementById("loginForm").style.display = "none"; document.getElementById("signupForm").style.display = "block"; });

    function onPlatformChange() {
        let platform = document.getElementById("platformSelect").value;
        if (!platform) {
            document.getElementById("categorySection").style.display = "none";
            document.getElementById("serviceSection").style.display = "none";
            document.getElementById("serviceDescBox").style.display = "none";
            document.getElementById("targetCountrySection").style.display = "none";
            document.getElementById("quantitySection").style.display = "none";
            document.getElementById("dynamicFields").innerHTML = "";
            document.getElementById("orderSummary").style.display = "none";
            selectedService = null;
            selectedCategory = "all";
            return;
        }

        // Update platform icon active state
        document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(i => {
            i.classList.toggle('active', i.dataset.platform === platform);
        });

        selectedCategory = "all";
        selectedService = null;

        // Build category chips from services that actually exist for this platform
        let platformData = platforms.find(p => p.name === platform);
        let platformServices = allServices.filter(s => s.Platform === platform);

        // Get categories that have real services
        let availableCategories = ["all"];
        if (platformData && platformData.categories) {
            platformData.categories.forEach(cat => {
                let hasServices = platformServices.some(s => s.Name && s.Name.toLowerCase().includes(cat.toLowerCase()));
                if (hasServices) availableCategories.push(cat);
            });
        }

        let chipsHtml = availableCategories.map(cat =>
            `<div class="cat-chip ${cat === 'all' ? 'active' : ''}" data-category="${cat}">${cat === 'all' ? '⚡ All Services' : cat}</div>`
        ).join('');

        document.getElementById("categoryChips").innerHTML = chipsHtml;
        document.getElementById("categorySection").style.display = "block";

        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedCategory = chip.dataset.category;
                updateServiceDropdown();
            });
        });

        updateServiceDropdown();
    }

    function updateServiceDropdown() {
        let platform = document.getElementById("platformSelect").value;
        let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
        if (selectedCategory !== "all") {
            filtered = filtered.filter(s => s.Name && s.Name.toLowerCase().includes(selectedCategory.toLowerCase()));
        }
        let select = document.getElementById("serviceSelect");
        select.innerHTML = '<option value="">— Choose a service —</option>';
        filtered.forEach(s => { 
            let rateDisplay = formatRateDisplay(s);
            select.innerHTML += `<option value="${s.ServiceId}">[${s.ServiceId}] ${s.Name} — ${rateDisplay}</option>`; 
        });

        document.getElementById("serviceSection").style.display = "block";
        document.getElementById("serviceDescBox").style.display = "none";
        document.getElementById("targetCountrySection").style.display = "none";
        document.getElementById("dynamicFields").innerHTML = "";
        document.getElementById("quantitySection").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
        selectedService = null;
    }

    function onServiceChange() {
        let serviceId = document.getElementById("serviceSelect").value;
        if (!serviceId) {
            document.getElementById("serviceDescBox").style.display = "none";
            document.getElementById("targetCountrySection").style.display = "none";
            document.getElementById("dynamicFields").innerHTML = "";
            document.getElementById("quantitySection").style.display = "none";
            document.getElementById("orderSummary").style.display = "none";
            selectedService = null;
            return;
        }

        selectedService = allServices.find(s => s.ServiceId === serviceId);
        if (!selectedService) return;

        // ── Service Description Box ──
        let isPer1k = selectedService.Per1k === true || selectedService.Per1k === "TRUE";
        let rateLabel = isPer1k
            ? `<span class="price-tag"><i class="fas fa-tag"></i> ${formatCurrency(selectedService.Rate)} = 1000</span>`
            : `<span class="price-tag"><i class="fas fa-tag"></i> ${formatCurrency(selectedService.Rate)} / unit</span>`;

        document.getElementById("serviceDescBox").innerHTML = `
            <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:8px;">
                <strong style="font-size:15px;">${selectedService.Name}</strong>
                ${rateLabel}
            </div>
            <div class="desc-grid">
                <div class="desc-item"><span class="label">Service ID</span><span class="value">${selectedService.ServiceId}</span></div>
                <div class="desc-item"><span class="label">Platform</span><span class="value">${selectedService.Platform}</span></div>
                <div class="desc-item"><span class="label">Min Qty</span><span class="value">${selectedService.MinQty}</span></div>
                <div class="desc-item"><span class="label">Max Qty</span><span class="value">${selectedService.MaxQty}</span></div>

            </div>
            <hr class="section-divider">

        `;
        document.getElementById("serviceDescBox").style.display = "block";
        document.getElementById("serviceDescBox").classList.remove('fade-in');
        void document.getElementById("serviceDescBox").offsetWidth;
        document.getElementById("serviceDescBox").classList.add('fade-in');

        // ── Target Country ──
        let showCountry = selectedService.TargetCountry === true || selectedService.TargetCountry === "TRUE";
        document.getElementById("targetCountrySection").style.display = showCountry ? "block" : "none";

        // Determine step numbers dynamically
        let stepOffset = showCountry ? 1 : 0;

        // ── Dynamic Fields ──
        let dynamicHtml = '';
        let isAccount = selectedService.IsAccount === true || selectedService.IsAccount === "TRUE";
        let requireEmail = selectedService.RequireEmail === true || selectedService.RequireEmail === "TRUE";
        let requireLink = selectedService.RequireLink === true || selectedService.RequireLink === "TRUE";
        let customComments = selectedService.CustomComments === true || selectedService.CustomComments === "TRUE";

        let fieldStep = 4 + stepOffset;

        if (isAccount && requireEmail) {
            dynamicHtml += `
                <div class="order-form-section fade-in">
                    <div class="step-indicator"><div class="step-num">${fieldStep++}</div> Account Email</div>
                    <input type="email" id="emailField" placeholder="Enter email address for account">
                </div>`;
        } else if (requireLink || (!isAccount && !requireEmail)) {
            dynamicHtml += `
                <div class="order-form-section fade-in">
                    <div class="step-indicator"><div class="step-num">${fieldStep++}</div> Profile / Post Link</div>
                    <input type="url" id="linkField" placeholder="https://... enter your profile or post link">
                </div>`;
        }

        if (customComments) {
            dynamicHtml += `
                <div class="order-form-section fade-in">
                    <div class="step-indicator"><div class="step-num">${fieldStep++}</div> Custom Comments</div>
                    <textarea id="commentsField" placeholder="Enter comments separated by commas" rows="3"></textarea>
                </div>`;
        }

        document.getElementById("dynamicFields").innerHTML = dynamicHtml;

        // Quantity step num
        let qtyStep = fieldStep;
        document.getElementById("quantityStepNum").innerHTML = `<div class="step-num">${qtyStep}</div> Enter Quantity`;
        document.getElementById("qtyHint").textContent = `Min: ${selectedService.MinQty}  •  Max: ${selectedService.MaxQty}`;
        document.getElementById("quantity").value = "";
        document.getElementById("quantitySection").style.display = "block";
        document.getElementById("quantitySection").classList.remove('fade-in');
        void document.getElementById("quantitySection").offsetWidth;
        document.getElementById("quantitySection").classList.add('fade-in');

        document.getElementById("orderSummary").style.display = "none";
        // Re-attach quantity listener
        document.getElementById("quantity").addEventListener("input", calculateTotal);
    }

    function calculateTotal() {
        if (!selectedService) return;
        let qty = parseInt(document.getElementById("quantity").value) || 0;
        let minQty = parseInt(selectedService.MinQty) || 1;
        let maxQty = parseInt(selectedService.MaxQty) || 99999;
        
        if (qty === 0) { document.getElementById("orderSummary").style.display = "none"; return; }
        if (qty < minQty) { document.getElementById("orderSummary").style.display = "none"; return; }
        if (qty > maxQty) { document.getElementById("orderSummary").style.display = "none"; showToast(`Maximum quantity is ${maxQty}`, true); return; }
        
        let isPer1k = selectedService.Per1k === true || selectedService.Per1k === "TRUE";
        let pricePerUnitPKR, totalPKR;
        if (isPer1k) {
            pricePerUnitPKR = selectedService.Rate / 1000;
            totalPKR = pricePerUnitPKR * qty;
        } else {
            pricePerUnitPKR = selectedService.Rate;
            totalPKR = selectedService.Rate * qty;
        }
        
        selectedService.calculatedTotal = totalPKR;

        // Fill summary
        document.getElementById("sumPlatform").textContent = selectedService.Platform;
        document.getElementById("sumService").textContent = selectedService.Name;
        document.getElementById("sumServiceId").textContent = selectedService.ServiceId;
        document.getElementById("sumQty").textContent = qty.toLocaleString();
        document.getElementById("sumPriceUnit").textContent = isPer1k
            ? `${formatCurrency(selectedService.Rate)} = 1000`
            : formatCurrency(pricePerUnitPKR);
        document.getElementById("sumTotal").textContent = formatCurrency(totalPKR);
        document.getElementById("orderSummary").style.display = "block";
    }
    
    async function placeOrder() {
        if (!selectedService) { showToast("Please select a service first", true); return; }
        let qty = parseInt(document.getElementById("quantity").value);
        if (!qty || qty < (parseInt(selectedService.MinQty) || 1)) { showToast(`Minimum quantity: ${selectedService.MinQty}`, true); return; }
        if (!selectedService.calculatedTotal) { showToast("Please enter a valid quantity", true); return; }
        if (currentUser.wallet < selectedService.calculatedTotal) { showToast(`Insufficient balance! Need ${formatCurrency(selectedService.calculatedTotal)}`, true); return; }
        
        let extraFields = {};
        let orderLink = "";
        if (document.getElementById("emailField")) extraFields.email = document.getElementById("emailField").value;
        if (document.getElementById("linkField")) { extraFields.link = document.getElementById("linkField").value; orderLink = extraFields.link; }
        if (document.getElementById("commentsField")) extraFields.comments = document.getElementById("commentsField").value;
        if (document.getElementById("targetCountrySelect") && document.getElementById("targetCountrySection").style.display !== "none") {
            extraFields.targetCountry = document.getElementById("targetCountrySelect").value;
        }
        
        let res = await apiCall("createOrder", { serviceId: selectedService.ServiceId, quantity: qty, totalAmount: selectedService.calculatedTotal, extraFields });
        if (res.success) { 
            // Build success modal
            document.getElementById("successOrderId").innerHTML = `<i class="fas fa-hashtag"></i> Order ID: <strong>${res.orderId}</strong>`;
            
            let isPer1k = selectedService.Per1k === true || selectedService.Per1k === "TRUE";
            let priceDisplay = isPer1k
                ? `${formatCurrency(selectedService.Rate)} = 1000`
                : formatCurrency(selectedService.Rate / 1000 * qty);

            let detailItems = [
                { label: "Platform", value: selectedService.Platform },
                { label: "Service ID", value: selectedService.ServiceId },
                { label: "Service Name", value: selectedService.Name },
                { label: "Quantity", value: qty.toLocaleString() },
                { label: "Amount Spent", value: formatCurrency(selectedService.calculatedTotal) },
            ];
            if (orderLink) detailItems.push({ label: "Link", value: orderLink });
            if (extraFields.email) detailItems.push({ label: "Email", value: extraFields.email });
            if (extraFields.targetCountry) detailItems.push({ label: "Target Country", value: extraFields.targetCountry });

            document.getElementById("successDetailGrid").innerHTML = detailItems.map(item =>
                `<div class="success-detail-item"><div class="s-label">${item.label}</div><div class="s-value">${item.value}</div></div>`
            ).join('');

            document.getElementById("successModal").style.display = "block"; 
            // Update local wallet balance
            if (currentUser) currentUser.wallet = (currentUser.wallet || 0) - selectedService.calculatedTotal;
        } else {
            showToast(res.error || "Order failed", true);
        }
    }

                            <div class="pm-holder">Muhammad Ramzan Al Sami</div>
                        </div>
                        <div class="payment-method-card" data-method="sadapay" onclick="selectPaymentMethod('sadapay')">
                            <div class="pm-icon">💳</div>
                            <div class="pm-name" style="color:#ff4081;">SadaPay</div>
                            <div class="pm-number">0319-8595421</div>
                            <div class="pm-holder">Muhammad Ramzan Ul Sami</div>
                        </div>
                        <div class="payment-method-card" data-method="jazzcash" onclick="selectPaymentMethod('jazzcash')">
                            <div class="pm-icon">🟠</div>
                            <div class="pm-name" style="color:#ff6f00;">JazzCash</div>
                            <div class="pm-number">0319-8595421</div>
                            <div class="pm-holder">Muhammad Ramzan Ul Sami</div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Proof Form (shown after selection) -->
                <div id="proofFormWrap" class="proof-form" style="display:none;">
                    <div class="step-indicator"><div class="step-num">2</div> Submit Payment Proof</div>
                    <div id="selectedMethodBanner" style="background:rgba(43,110,240,0.15); border-radius:16px; padding:12px 16px; margin-bottom:12px; font-size:14px; color:#60a5fa;"></div>
                    <div class="form-row">
                        <div>
                            <label style="font-size:12px; color:#64748b; padding-left:8px;">Amount Sent (PKR)</label>
                            <input id="amountFund" placeholder="e.g. 500" type="number">
                        </div>
                        <div>
                            <label style="font-size:12px; color:#64748b; padding-left:8px;">Transaction ID</label>
                            <input id="transId" placeholder="e.g. TXN12345678">
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label style="font-size:12px; color:#64748b; padding-left:8px;">Your Email</label>
                            <input id="fundEmail" placeholder="your@email.com" type="email" value="${currentUser?.gmail || ''}">
                        </div>
                    </div>
                    <label style="font-size:12px; color:#64748b; padding-left:8px; display:block; margin-top:8px;">Payment Screenshot</label>
                    <input type="file" id="screenshot" accept="image/*" style="border-radius:14px;">
                    <button id="submitProof" class="btn btn-success" style="width:100%; margin-top:14px;"><i class="fas fa-paper-plane"></i> Submit Proof</button>
                </div>
            </div>
        `;

        document.getElementById("submitProof")?.addEventListener("click", async () => {
            let file = document.getElementById("screenshot").files[0];
            if(!file) { showToast("Please upload a screenshot", true); return; }
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", {
                    amount: document.getElementById("amountFund").value,
                    transactionId: document.getElementById("transId").value,
                    email: document.getElementById("fundEmail").value,
                    paymentMethod: selectedPaymentMethod || "Unknown",
                    screenshotBase64: reader.result
                });
                showToast(res.message || "Proof submitted!");
                if(res.success) document.getElementById("proofFormWrap").style.display = "none";
            };
            reader.readAsDataURL(file);
        });
    }

    window.selectPaymentMethod = function(method) {
        selectedPaymentMethod = method;
        document.querySelectorAll('.payment-method-card').forEach(c => {
            c.classList.toggle('selected', c.dataset.method === method);
        });
        let methodNames = { easypaisa: "Easypaisa — 0319-8595421 (Muhammad Ramzan Al Sami)", sadapay: "SadaPay — 0319-8595421 (Muhammad Ramzan Ul Sami)", jazzcash: "JazzCash — 0319-8595421 (Muhammad Ramzan Ul Sami)" };
        document.getElementById("selectedMethodBanner").innerHTML = `<i class="fas fa-check-circle" style="color:#10b981;"></i> You selected: <strong>${methodNames[method]}</strong><br><small style="color:#94a3b8;">Please send the amount to the number above, then fill out the form below.</small>`;
        let wrap = document.getElementById("proofFormWrap");
        wrap.style.display = "block";
        wrap.classList.add('fade-in');
        wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };
    
    // ─────────────────────────────────────────────
    // RECOMMENDATIONS
    // ─────────────────────────────────────────────
    async function renderRecommendations() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Share Your Experience</h3><input id="recEmail" placeholder="Email"><input id="recWhatsapp" placeholder="WhatsApp"><input id="recPhone" placeholder="Phone"><textarea id="recText" placeholder="Your Recommendation" rows="4"></textarea><button id="submitRec" class="btn">Submit Recommendation</button></div>`;
        document.getElementById("submitRec").onclick = async () => { let res = await apiCall("submitRecommendation", { email: document.getElementById("recEmail").value, whatsapp: document.getElementById("recWhatsapp").value, phone: document.getElementById("recPhone").value, text: document.getElementById("recText").value }); showToast(res.message); };
    }
    
    // ─────────────────────────────────────────────
    // JOIN US
    // ─────────────────────────────────────────────
    async function renderJoinUs() {
        await loadJoinApplication();
        let statusHtml = '';
        let applicationFormHtml = '';
        let attendanceFormHtml = '';
        let jobsFormHtml = '';
        let historyHtml = '';
        const hasApplied = joinApplication && joinApplication.requestId;
        let applicationStatus = joinApplication?.status || 'none';
        const normalizedStatus = applicationStatus.toLowerCase();
        
        if (!hasApplied || normalizedStatus === 'none') {
            applicationFormHtml = `
                <h3>📝 Application Form</h3>
                <div class="form-row"><input id="appName" placeholder="Full Name" value="${currentUser?.fullName || ''}"><input id="appUsername" placeholder="Username" value="${currentUser?.username || ''}"></div>
                <div class="form-row"><input id="appPhone" placeholder="Phone Number"><input id="appWhatsapp" placeholder="WhatsApp Number"></div>
                <div class="form-row"><input id="appEmail" placeholder="Email" value="${currentUser?.gmail || ''}"><select id="appSalaryType"><option>Commission Based</option><option>Salary Based</option></select></div>
                <div class="form-row"><select id="appHours"><option>4 hours</option><option>5 hours</option><option>6 hours</option><option>Custom</option></select><select id="appShift"><option>Day</option><option>Night</option></select></div>
                <textarea id="appAbout" placeholder="About Yourself (Experience, Skills, Why you want to join?)" rows="4"></textarea>
                <input type="file" id="appPhoto" accept="image/*">
                <button id="submitApplication" class="btn btn-success">Submit Application</button>
            `;
        } else if (normalizedStatus === 'pending') {
            statusHtml = `<div class="info-note"><i class="fas fa-clock"></i> <strong>Application Status: Pending Review</strong><br>Your application has been submitted and is being reviewed by admin.</div>`;
        } else if (normalizedStatus === 'approved') {
            statusHtml = `<div class="success-note"><i class="fas fa-check-circle"></i> <strong>Application Approved!</strong><br>Salary: ${joinApplication.salary ? formatCurrency(parseFloat(joinApplication.salary)) : 'To be set by admin'} per month<br>Welcome to the team!</div>`;
            attendanceFormHtml = `
                <h3>📋 Daily Attendance</h3>
                <div class="form-row"><input id="attName" placeholder="Full Name" value="${currentUser?.fullName || ''}"><input id="attEmail" placeholder="Email" value="${currentUser?.gmail || ''}"></div>
                <div class="form-row"><input id="attPhone" placeholder="Contact Number"><input type="time" id="attLoginTime" placeholder="Login Time"></div>
                <div class="form-row"><input type="number" id="attWorkingHours" placeholder="Working Hours"><input type="time" id="attLogoutTime" placeholder="Logout Time"></div>
                <div class="form-row"><select id="attWorkType"><option>Sharing Posts</option><option>Designed Posts</option><option>Platform Management</option><option>Client Support</option></select><input id="attClientCount" placeholder="Client Contacts Count" type="number"></div>
                <div class="form-row"><select id="attBoosted"><option>No</option><option>Yes</option></select><select id="attSharedPlatforms"><option>Instagram</option><option>Facebook</option><option>Twitter</option><option>All Platforms</option></select></div>
                <textarea id="attWorkDetail" placeholder="Work Detail (What did you work on today?)" rows="3"></textarea>
                <button id="submitAttendance" class="btn btn-success">✅ Mark Attendance</button>
            `;
            jobsFormHtml = `
                <h3>💼 Job Details</h3>
                <div class="form-row"><input id="jobName" placeholder="Job/Service Name"><input id="jobOrderId" placeholder="Order ID (if placed)"></div>
                <div class="form-row"><input id="jobPlatform" placeholder="Platform (Instagram/TikTok/etc)"><input id="jobAmount" placeholder="Amount Spent (PKR)" type="number"></div>
                <div class="form-row"><input id="jobLink" placeholder="Platform Link / Order Link"></div>
                <textarea id="jobFullDetails" placeholder="Full Details about the work done" rows="3"></textarea>
                <button id="submitJob" class="btn btn-success">📌 Submit Job</button>
            `;
            historyHtml = `<h3>📜 My History</h3><div id="historyData" class="glass-card">Loading...</div>`;
        } else if (normalizedStatus === 'rejected') {
            statusHtml = `<div class="info-note" style="background:rgba(220,38,38,0.2); border-left-color:#dc2626;"><i class="fas fa-times-circle"></i> <strong>Application Status: Not Selected</strong><br>Thank you for your interest.</div>`;
        }
        
        let defaultTab = normalizedStatus === 'approved' ? 'attendance' : 'application';
        let html = `<div class="glass-card"><h2><i class="fas fa-user-plus"></i> Join Us & Earn</h2>${statusHtml}
            <div class="join-main-tabs">
                <button class="join-main-tab-btn ${defaultTab === 'application' ? 'active' : ''}" data-join-tab="application">📝 Application Form</button>
                <button class="join-main-tab-btn ${defaultTab === 'attendance' ? 'active' : ''}" data-join-tab="attendance">📋 Daily Attendance</button>
                <button class="join-main-tab-btn" data-join-tab="jobs">💼 Daily Job Detail</button>
                <button class="join-main-tab-btn" data-join-tab="history">📜 History</button>
            </div>
            <div id="applicationTab" class="join-tab-content ${defaultTab === 'application' ? 'active' : ''}">${applicationFormHtml || '<p class="info-note">Status: ' + applicationStatus + '</p>'}</div>
            <div id="attendanceTab" class="join-tab-content ${defaultTab === 'attendance' ? 'active' : ''}">${attendanceFormHtml || '<p class="info-note">Attendance section is only available after your application is approved.</p>'}</div>
            <div id="jobsTab" class="join-tab-content">${jobsFormHtml || '<p class="info-note">Job details section is only available after your application is approved.</p>'}</div>
            <div id="historyTab" class="join-tab-content">${historyHtml || '<p class="info-note">History section is only available after your application is approved.</p>'}</div>
        </div>`;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('.join-main-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.join-main-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.join-tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-join-tab') + 'Tab').classList.add('active');
            });
        });
        
        if (document.getElementById("submitApplication") && !hasApplied) {
            document.getElementById("submitApplication").onclick = async () => {
                let file = document.getElementById("appPhoto").files[0];
                let reader = new FileReader();
                reader.onload = async () => {
                    let res = await apiCall("submitJoinRequest", {
                        name: document.getElementById("appName").value, username: document.getElementById("appUsername").value,
                        phone: document.getElementById("appPhone").value, whatsapp: document.getElementById("appWhatsapp").value,
                        email: document.getElementById("appEmail").value, salaryType: document.getElementById("appSalaryType").value,
                        hours: document.getElementById("appHours").value, shift: document.getElementById("appShift").value,
                        about: document.getElementById("appAbout").value, photo: reader.result
                    });
                    showToast(res.message);
                    if(res.success) setTimeout(() => renderJoinUs(), 1500);
                };
                if(file) reader.readAsDataURL(file);
                else showToast("Please upload photo", true);
            };
        }
        
        if (document.getElementById("submitAttendance")) {
            document.getElementById("submitAttendance").onclick = async () => {
                let res = await apiCall("submitAttendance", { name: document.getElementById("attName").value, email: document.getElementById("attEmail").value, phone: document.getElementById("attPhone").value, loginTime: document.getElementById("attLoginTime").value, workingHours: document.getElementById("attWorkingHours").value, logoutTime: document.getElementById("attLogoutTime").value, workType: document.getElementById("attWorkType").value, clientCount: document.getElementById("attClientCount").value, boosted: document.getElementById("attBoosted").value, sharedPlatforms: document.getElementById("attSharedPlatforms").value, workDetail: document.getElementById("attWorkDetail").value });
                showToast(res.message);
            };
        }
        
        if (document.getElementById("submitJob")) {
            document.getElementById("submitJob").onclick = async () => {
                let res = await apiCall("submitJobDetail", { jobName: document.getElementById("jobName").value, orderId: document.getElementById("jobOrderId").value, platform: document.getElementById("jobPlatform").value, amount: document.getElementById("jobAmount").value, link: document.getElementById("jobLink").value, details: document.getElementById("jobFullDetails").value });
                showToast(res.message);
            };
        }
        
        if (document.getElementById("historyData") && normalizedStatus === 'approved') {
            let attendanceHistory = await apiCall("getMyAttendance");
            let jobsHistory = await apiCall("getMyJobs");
            document.getElementById("historyData").innerHTML = `
                <div class="history-table"><h4>📊 Attendance Records</h4>${attendanceHistory.attendance?.length ? '<table style="width:100%"><tr><th>Date</th><th>Login Time</th><th>Logout Time</th><th>Hours</th></tr>' + attendanceHistory.attendance.map(a => `<tr><td>${a.date||a.Date}</td><td>${a.loginTime||a.LoginTime}</td><td>${a.logoutTime||a.LogoutTime}</td><td>${a.workingHours||a.WorkingHours}</td></tr>`).join('') + '</table>' : '<p>No records</p>'}</div>
                <div class="history-table" style="margin-top:25px;"><h4>📌 Job Records</h4>${jobsHistory.jobs?.length ? '<table style="width:100%"><tr><th>Date</th><th>Job Name</th><th>Order ID</th><th>Amount</th></tr>' + jobsHistory.jobs.map(j => `<tr><td>${j.date||j.Date}</td><td>${j.jobName||j.JobName}</td><td>${j.orderId||j.OrderId||'-'}</td><td>${j.amount||j.Amount}</td></tr>`).join('') + '</table>' : '<p>No records</p>'}</div>
            `;
        }
    }
    
    // ─────────────────────────────────────────────
    // HELP
    // ─────────────────────────────────────────────
    async function renderHelp() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Need Help?</h3><input id="helpEmail" placeholder="Email"><input id="helpPhone" placeholder="Phone/WhatsApp"><textarea id="helpMsg" placeholder="Your Message" rows="4"></textarea><button id="submitHelp" class="btn">Send Message</button></div>`;
        document.getElementById("submitHelp").onclick = async () => { let res = await apiCall("submitHelp", { email: document.getElementById("helpEmail").value, phone: document.getElementById("helpPhone").value, message: document.getElementById("helpMsg").value }); showToast(res.message); };
    }
    
    function navigate(page) { 
        if(page === "home") renderHome(); 
        else if(page === "dashboard") renderDashboard(); 
        else if(page === "services") renderServices(); 
        else if(page === "addfunds") renderAddFunds(); 
        else if(page === "profile") renderProfile();
        else if(page === "recommendations") renderRecommendations(); 
        else if(page === "joinus") renderJoinUs(); 
        else if(page === "help") renderHelp(); 
    }
    
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => { e.preventDefault(); navigate(el.getAttribute("data-page")); document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; }));
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate("home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => { if(e.target.dataset.curr) { activeCurrency = e.target.dataset.curr; updateCurrencyDisplay(); } });
    
    window.navigateTo = navigate;
    window.selectService = selectService;
    
    (async function init() { 
        try {
            if(await checkAuth()) { 
                await loadServices(); 
                navigate("home"); 
            }
        } catch(e) {
            console.error("Init error:", e);
            showAuthScreen();
        }
    })();
</script>
</body>
</html>
