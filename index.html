<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services | Advanced Order Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0f1c; color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.7); backdrop-filter: blur(4px); border-radius: 24px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; margin-bottom: 24px; transition: 0.2s; }
        .btn { background: #2b6ef0; border: none; padding: 12px 24px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-success { background: #10b981; }
        .btn-secondary { background: #475569; }
        input, select, textarea { background: #111827; border: 1px solid #1e293b; padding: 12px 16px; border-radius: 20px; color: white; width: 100%; margin: 8px 0; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: #2b6ef0; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0d1425; z-index: 1000; transition: 0.25s; padding: 24px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; backdrop-filter: blur(3px); }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: #0d1425; border-radius: 60px; margin-bottom: 24px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
        .platform-icon-item { background: #1e293b; border-radius: 60px; padding: 8px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .platform-icon-item.active { background: #2b6ef0; box-shadow: 0 4px 12px rgba(43,110,240,0.3); }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
        .category-btn { background: #1e293b; padding: 6px 18px; border-radius: 40px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .category-btn.active { background: #2b6ef0; }
        .service-detail-card { background: #0f172a; border-radius: 20px; padding: 20px; margin: 20px 0; border-left: 4px solid #2b6ef0; }
        .order-summary { background: rgba(16,185,129,0.08); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid rgba(16,185,129,0.3); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
        .currency-btn { background: #1e293b; padding: 8px 14px; border-radius: 30px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .currency-btn.active { background: #2b6ef0; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; padding: 12px 24px; border-radius: 50px; z-index: 2000; border-left: 4px solid #10b981; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #0f172a; border-radius: 32px; padding: 28px; width: 90%; max-width: 500px; z-index: 1100; display: none; border: 1px solid #2b6ef0; max-height: 85vh; overflow-y: auto; }
        .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .form-row > * { flex: 1; }
        .required-star:after { content: " *"; color: #ef4444; }
        .info-badge { background: #2b6ef020; border-radius: 12px; padding: 8px 12px; font-size: 13px; margin-top: 8px; }
        @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .platform-icons { gap: 8px; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 32px;">
        <h2>MTS SMM</h2>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer; font-size: 22px;"></i>
    </div>
    <div style="display: flex; flex-direction: column; gap: 12px;">
        <a href="#" data-page="home" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-user-edit"></i> Profile</a>
        <a href="#" data-page="joinus" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-user-plus"></i> Join Us</a>
        <a href="#" data-page="help" style="color:white; text-decoration:none; padding:10px;"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-btn-group" id="currencyGroupSidebar">
            <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button><button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
            <button class="currency-btn" data-curr="AED">🇦🇪 AED</button><button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
            <button class="currency-btn" data-curr="INR">🇮🇳 INR</button><button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px; padding:12px; border-radius:40px;">Logout</button>
    </div>
</div>
<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars fa-lg"></i></div>
        <div style="font-weight:700; font-size:18px;">MTS SMM Services</div>
        <div><i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer;"></i> <span id="userNameDisplay">Guest</span></div>
    </div>
    <div id="pageContent"><div style="text-align:center;padding:80px;"><i class="fas fa-spinner fa-pulse fa-2x"></i> Loading...</div></div>
</div>
<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size:55px; color:#10b981; margin-bottom:12px;"></i>
        <h2>✅ Order Confirmed!</h2>
        <div id="orderDetails" style="margin:20px 0; text-align:left; background:#0a0f1c; padding:16px; border-radius:20px;"></div>
        <button onclick="closeModal()" class="btn" style="margin-top:10px;">OK</button>
    </div>
</div>
<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";
    let currentUser = null;
    let activeCurrency = "PKR";
    let rates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.30, EUR:0.0033 };
    let symbols = { PKR:"Rs", USD:"$", AED:"د.إ", SAR:"﷼", INR:"₹", EUR:"€" };
    let allServices = [];
    let selectedServiceObj = null;
    let selectedCategory = "All";
    
    const platformCategories = {
        "Instagram": ["Likes","Views","Followers","Comments","Saves","Shares"], "TikTok": ["Likes","Views","Followers","Comments","Shares"],
        "Facebook": ["Likes","Views","Followers","Comments","Shares"], "YouTube": ["Likes","Views","Subscribers","Watchtime","Comments"],
        "Twitter": ["Likes","Retweets","Followers","Views"], "WhatsApp": ["Traffic","Views","Members"], "Snapchat": ["Views","Followers"],
        "Telegram": ["Members","Views"], "LinkedIn": ["Likes","Followers","Views"], "Pinterest": ["Repins","Likes"], "Discord": ["Members"],
        "Twitch": ["Followers","Views"], "Spotify": ["Followers","Plays"], "Google": ["Traffic"], "Website Traffic": ["Traffic","Views"]
    };
    const platforms = [
        { name:"Instagram", icon:"fab fa-instagram", color:"#E4405F" }, { name:"TikTok", icon:"fab fa-tiktok", color:"#000000" },
        { name:"Facebook", icon:"fab fa-facebook", color:"#1877F2" }, { name:"YouTube", icon:"fab fa-youtube", color:"#FF0000" },
        { name:"Twitter", icon:"fab fa-twitter", color:"#1DA1F2" }, { name:"WhatsApp", icon:"fab fa-whatsapp", color:"#25D366" },
        { name:"Snapchat", icon:"fab fa-snapchat", color:"#FFFC00" }, { name:"Telegram", icon:"fab fa-telegram", color:"#26A5E4" },
        { name:"LinkedIn", icon:"fab fa-linkedin", color:"#0A66C2" }, { name:"Pinterest", icon:"fab fa-pinterest", color:"#BD081C" },
        { name:"Discord", icon:"fab fa-discord", color:"#5865F2" }, { name:"Twitch", icon:"fab fa-twitch", color:"#9146FF" },
        { name:"Spotify", icon:"fab fa-spotify", color:"#1DB954" }, { name:"Google", icon:"fab fa-google", color:"#4285F4" },
        { name:"Website Traffic", icon:"fas fa-globe", color:"#3b82f6" }
    ];
    
    function showToast(msg, isErr=false) { let t=document.createElement('div'); t.className='toast'; t.style.borderLeftColor=isErr?'#dc2626':'#10b981'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function closeModal() { document.getElementById('successModal').style.display='none'; }
    function formatPrice(pkr) { let converted = pkr * rates[activeCurrency]; let sym = symbols[activeCurrency]; let flag = {PKR:"🇵🇰",USD:"🇺🇸",AED:"🇦🇪",SAR:"🇸🇦",INR:"🇮🇳",EUR:"🇪🇺"}[activeCurrency] || ""; return `${flag} ${sym} ${converted.toFixed(2)}`; }
    
    async function apiCall(action, data={}) {
        let payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        let formData = new FormData(); formData.append("payload", JSON.stringify(payload));
        try { let res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData }); return await res.json(); } 
        catch(e) { return { success: false, error: e.message }; }
    }
    
    async function loadServices() { let res = await apiCall("getServices"); if(res.success && res.services) { allServices = res.services; console.log("services loaded", allServices.length); } else showToast("Failed load services", true); }
    
    async function checkAuth() {
        let token = localStorage.getItem("mts_token");
        if(!token) { showAuthScreen(); return false; }
        let res = await apiCall("verifySession", { token });
        if(res.success && res.user) { currentUser = res.user; document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; return true; } 
        else { localStorage.removeItem("mts_token"); showAuthScreen(); return false; }
    }
    
    function showAuthScreen() { /* login/signup ui - compact */ document.getElementById("pageContent").innerHTML = `<div class="glass-card" style="max-width:450px;margin:50px auto;"><h2>🔐 Welcome</h2><div id="loginForm"><input id="loginEmail" placeholder="Email/Username"><input id="loginPass" type="password" placeholder="Password"><button id="doLogin" class="btn" style="width:100%">Login</button><button id="showSignupBtn" class="btn btn-secondary" style="width:100%;margin-top:10px;">Sign Up</button></div><div id="signupForm" style="display:none;"><input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username"><input id="gmail" placeholder="Email"><input id="phoneNum" placeholder="Phone"><select id="userType"><option>Commission Based</option><option>Salary Based</option></select><input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm"><button id="doSignup" class="btn">Register</button><button id="backLogin" class="btn btn-secondary">Back</button></div></div>`;
        document.getElementById("doLogin")?.addEventListener("click", async()=>{ let res=await apiCall("login",{email:document.getElementById("loginEmail").value,pass:document.getElementById("loginPass").value}); if(res.success){localStorage.setItem("mts_token",res.token); location.reload();} else showToast(res.error,true); });
        document.getElementById("showSignupBtn")?.addEventListener("click",()=>{document.getElementById("loginForm").style.display="none";document.getElementById("signupForm").style.display="block";});
        document.getElementById("backLogin")?.addEventListener("click",()=>{document.getElementById("loginForm").style.display="block";document.getElementById("signupForm").style.display="none";});
        document.getElementById("doSignup")?.addEventListener("click",async()=>{ let p=document.getElementById("pass").value,c=document.getElementById("confirmPass").value; if(p!==c){showToast("Passwords mismatch",true);return;} let res=await apiCall("signup",{fullName:document.getElementById("fullName").value,username:document.getElementById("username").value,gmail:document.getElementById("gmail").value,phone:document.getElementById("phoneNum").value,userType:document.getElementById("userType").value,password:p}); if(res.success){showToast("Account created! Login now.");document.getElementById("loginForm").style.display="block";document.getElementById("signupForm").style.display="none";} else showToast(res.error,true);});
    }
    
    // ========== ADVANCED ORDER PAGE ==========
    async function renderHome() {
        await loadServices();
        let platformIconsHtml = platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('');
        let html = `
            <div class="glass-card"><div style="display:flex;justify-content:space-between;"><h3>💰 Balance: ${formatPrice(currentUser.wallet)}</h3></div></div>
            <div class="glass-card"><h2>📌 New Order</h2>
            <div class="platform-icons" id="platformIconsList">${platformIconsHtml}</div>
            <label>Select Platform</label><select id="platformSelect"><option value="">-- Choose Platform --</option>${platforms.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select>
            <div id="categorySection" style="display:none;"><label>Filter Category:</label><div id="categoryButtons" class="category-buttons"></div></div>
            <label>📦 Select Service</label><select id="serviceSelect"><option value="">-- Select Service --</option></select>
            <div id="serviceInfoContainer"></div>
            <div id="dynamicFields"></div>
            <label>📊 Quantity</label><input type="number" id="quantity" placeholder="Enter quantity" min="1">
            <div id="qtyWarning" style="color:#f97316; font-size:13px; margin-top:-5px;"></div>
            <div id="orderSummary" style="display:none;" class="order-summary"><h4>📋 Order Summary</h4><p>💰 Price per unit: <span id="unitPriceDisplay">0</span></p><p>💵 Total Amount: <span id="totalAmountDisplay">0</span></p><p>⏱️ Delivery ETA: <span id="deliveryETA">-</span></p></div>
            <div style="display:flex; gap:12px; margin-top:20px;"><button id="placeOrderBtn" class="btn btn-success"><i class="fas fa-cart-plus"></i> Place Order</button><button id="clearFormBtn" class="btn btn-secondary">Clear</button></div>
            </div>`;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#platformIconsList .platform-icon-item').forEach(el=>{el.addEventListener('click',()=>{document.getElementById('platformSelect').value=el.dataset.platform; updatePlatform();});});
        document.getElementById("platformSelect").addEventListener("change", updatePlatform);
        document.getElementById("serviceSelect").addEventListener("change", showServiceFullDetails);
        document.getElementById("quantity").addEventListener("input", computeTotal);
        document.getElementById("placeOrderBtn").addEventListener("click", placeOrderFinal);
        document.getElementById("clearFormBtn").addEventListener("click", clearOrderForm);
        
        function updatePlatform() {
            let platform = document.getElementById("platformSelect").value;
            let catSection = document.getElementById("categorySection");
            if(platform && platformCategories[platform]) {
                catSection.style.display = "block";
                let cats = ["All", ...platformCategories[platform]];
                document.getElementById("categoryButtons").innerHTML = cats.map(c=>`<div class="category-btn ${selectedCategory===c?'active':''}" data-cat="${c}">${c}</div>`).join('');
                document.querySelectorAll('.category-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); selectedCategory=btn.dataset.cat; updateServiceDropdown();});});
                selectedCategory="All";
            } else { catSection.style.display="none"; selectedCategory="All"; }
            updateServiceDropdown();
        }
        
        function updateServiceDropdown() {
            let platform = document.getElementById("platformSelect").value;
            let filtered = platform ? allServices.filter(s=>s.Platform===platform) : [];
            if(selectedCategory!=="All") filtered = filtered.filter(s=>s.Name && s.Name.toLowerCase().includes(selectedCategory.toLowerCase()));
            let select = document.getElementById("serviceSelect");
            select.innerHTML = '<option value="">-- Choose Service --</option>';
            filtered.forEach(s=>{select.innerHTML+=`<option value="${s.ServiceId}">${s.Name}</option>`;});
            selectedServiceObj=null;
            document.getElementById("serviceInfoContainer").innerHTML = "";
            document.getElementById("dynamicFields").innerHTML = "";
            document.getElementById("orderSummary").style.display="none";
        }
        
        function showServiceFullDetails() {
            let sid = document.getElementById("serviceSelect").value;
            if(!sid) return;
            selectedServiceObj = allServices.find(s=>s.ServiceId===sid);
            if(!selectedServiceObj) return;
            let rateDesc = selectedServiceObj.Per1k ? `${formatPrice(selectedServiceObj.Rate)} per 1000 (${formatPrice(selectedServiceObj.Rate/1000)}/unit)` : `${formatPrice(selectedServiceObj.Rate)} per unit`;
            document.getElementById("serviceInfoContainer").innerHTML = `<div class="service-detail-card"><h4>✨ ${selectedServiceObj.Name}</h4><p>${selectedServiceObj.Description || "High quality SMM service"}</p><p><strong>💰 Rate:</strong> ${rateDesc}</p><p><strong>📏 Limits:</strong> Min ${selectedServiceObj.MinQty} — Max ${selectedServiceObj.MaxQty}</p><p><strong>⏱️ Delivery:</strong> ${selectedServiceObj.DeliveryTime || 'Instant - 2 hours'}</p></div>`;
            
            let extraHtml = "";
            if(selectedServiceObj.CustomComments) extraHtml += `<div><label class="required-star">💬 Custom Comments (comma separated)</label><textarea id="customCommentsField" rows="2" placeholder="Enter each comment separated by comma..."></textarea><div class="info-badge">⚠️ Required for this service</div></div>`;
            if(selectedServiceObj.IsAccount) extraHtml += `<div><label class="required-star">📧 Email Address</label><input type="email" id="emailRequiredField" placeholder="you@example.com"></div>`;
            if(selectedServiceObj.RequireLink) extraHtml += `<div><label class="required-star">🔗 Profile/Post Link</label><input type="url" id="linkRequiredField" placeholder="https://instagram.com/p/..."></div>`;
            if(selectedServiceObj.TargetCountry) extraHtml += `<div><label class="required-star">🌍 Target Country</label><select id="countrySelect"><option value="">Select Country</option><option>USA</option><option>UK</option><option>Pakistan</option><option>UAE</option><option>India</option></select></div>`;
            document.getElementById("dynamicFields").innerHTML = extraHtml;
            computeTotal();
        }
        
        function computeTotal() {
            if(!selectedServiceObj) return;
            let qty = parseInt(document.getElementById("quantity").value) || 0;
            let minQ = parseInt(selectedServiceObj.MinQty)||1, maxQ = parseInt(selectedServiceObj.MaxQty)||100000;
            let warnDiv = document.getElementById("qtyWarning");
            if(qty>0 && qty<minQ) { warnDiv.innerHTML = `⚠️ Minimum quantity is ${minQ}`; document.getElementById("orderSummary").style.display="none"; return; }
            if(qty>maxQ) { warnDiv.innerHTML = `⚠️ Maximum quantity allowed ${maxQ}`; document.getElementById("orderSummary").style.display="none"; return; }
            warnDiv.innerHTML = "";
            if(qty===0) { document.getElementById("orderSummary").style.display="none"; return; }
            let unitPKR = selectedServiceObj.Per1k ? (selectedServiceObj.Rate / 1000) : selectedServiceObj.Rate;
            let totalPKR = unitPKR * qty;
            document.getElementById("unitPriceDisplay").innerHTML = formatPrice(unitPKR);
            document.getElementById("totalAmountDisplay").innerHTML = formatPrice(totalPKR);
            document.getElementById("deliveryETA").innerHTML = selectedServiceObj.DeliveryTime || "1-3 hours";
            document.getElementById("orderSummary").style.display = "block";
            selectedServiceObj._tempTotal = totalPKR;
            selectedServiceObj._tempQty = qty;
        }
        
        async function placeOrderFinal() {
            if(!selectedServiceObj) { showToast("Please select a service", true); return; }
            let qty = parseInt(document.getElementById("quantity").value);
            if(!qty || qty < selectedServiceObj.MinQty) { showToast(`Min quantity: ${selectedServiceObj.MinQty}`, true); return; }
            if(qty > selectedServiceObj.MaxQty) { showToast(`Max quantity: ${selectedServiceObj.MaxQty}`, true); return; }
            // validate dynamic mandatory fields
            if(selectedServiceObj.CustomComments) { let comm = document.getElementById("customCommentsField")?.value.trim(); if(!comm) { showToast("Custom comments are required", true); return; } }
            if(selectedServiceObj.IsAccount) { let email = document.getElementById("emailRequiredField")?.value.trim(); if(!email) { showToast("Email address is required", true); return; } }
            if(selectedServiceObj.RequireLink) { let link = document.getElementById("linkRequiredField")?.value.trim(); if(!link) { showToast("Profile/Post link is required", true); return; } }
            if(selectedServiceObj.TargetCountry) { let country = document.getElementById("countrySelect")?.value; if(!country) { showToast("Please select target country", true); return; } }
            
            let totalAmt = selectedServiceObj._tempTotal;
            if(currentUser.wallet < totalAmt) { showToast(`Insufficient balance! Need ${formatPrice(totalAmt)}`, true); return; }
            
            let extra = {};
            if(selectedServiceObj.CustomComments) extra.comments = document.getElementById("customCommentsField").value;
            if(selectedServiceObj.IsAccount) extra.email = document.getElementById("emailRequiredField").value;
            if(selectedServiceObj.RequireLink) extra.link = document.getElementById("linkRequiredField").value;
            if(selectedServiceObj.TargetCountry) extra.country = document.getElementById("countrySelect").value;
            
            let res = await apiCall("createOrder", { serviceId: selectedServiceObj.ServiceId, quantity: qty, totalAmount: totalAmt, extraFields: extra });
            if(res.success) {
                let orderDetailsHtml = `<p><strong>🆔 Order ID:</strong> ${res.orderId}</p><p><strong>📱 Platform:</strong> ${selectedServiceObj.Platform}</p><p><strong>🔧 Service ID:</strong> ${selectedServiceObj.ServiceId}</p><p><strong>📌 Service Name:</strong> ${selectedServiceObj.Name}</p><p><strong>📝 Description:</strong> ${selectedServiceObj.Description || 'Standard delivery'}</p><p><strong>🔢 Quantity:</strong> ${qty}</p><p><strong>💰 Total Paid:</strong> ${formatPrice(totalAmt)}</p><p><strong>📅 Date & Time:</strong> ${new Date().toLocaleString()}</p><p><strong>📧 Email sent to:</strong> ${currentUser.gmail || 'user email'}</p>`;
                document.getElementById("orderDetails").innerHTML = orderDetailsHtml;
                document.getElementById("successModal").style.display = "block";
                setTimeout(()=> location.reload(), 2500);
            } else { showToast(res.error || "Order failed", true); }
        }
        function clearOrderForm() { document.getElementById("platformSelect").value=""; document.getElementById("serviceSelect").innerHTML='<option>-- Select Service --</option>'; document.getElementById("quantity").value=""; document.getElementById("serviceInfoContainer").innerHTML=""; document.getElementById("dynamicFields").innerHTML=""; document.getElementById("orderSummary").style.display="none"; document.getElementById("qtyWarning").innerHTML=""; selectedServiceObj=null; showToast("Form cleared"); }
        updatePlatform();
    }
    
    async function renderServices() { await loadServices(); let html = `<div class="glass-card"><div class="platform-icons" id="servicesPlatformList"><div class="platform-icon-item active" data-platform="all"><i class="fas fa-th-large"></i><span>All</span></div>${platforms.map(p=>`<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}"></i><span>${p.name}</span></div>`).join('')}</div><input type="text" id="searchServices" placeholder="🔍 Search service..."></div><div id="servicesGrid" class="cards-grid"></div>`;
        document.getElementById("pageContent").innerHTML = html;
        document.querySelectorAll('#servicesPlatformList .platform-icon-item').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('#servicesPlatformList .platform-icon-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); filterServiceGrid();});});
        document.getElementById("searchServices").addEventListener("input", filterServiceGrid);
        function filterServiceGrid() { let platform = document.querySelector('#servicesPlatformList .platform-icon-item.active')?.dataset.platform||'all'; let search = document.getElementById("searchServices")?.value.toLowerCase()||""; let filtered = allServices.filter(s=>(platform==='all'||s.Platform===platform) && (s.Name.toLowerCase().includes(search)||s.ServiceId.includes(search))); document.getElementById("servicesGrid").innerHTML = filtered.map(s=>{let price = s.Per1k? formatPrice(s.Rate/1000) : formatPrice(s.Rate); return `<div class="service-card" style="cursor:pointer;background:#0d1425;border-radius:20px;padding:18px;" onclick="navigateTo('home'); setTimeout(()=>selectPlatformAndService('${s.Platform}','${s.ServiceId}'),100)"><div style="display:flex;gap:12px;align-items:center;"><i class="fab fa-${s.Platform.toLowerCase()}" style="font-size:28px;"></i><strong>${s.Name}</strong></div><hr><p>Price: ${price} ${s.Per1k?'/1000':'/unit'}</p><p>Min: ${s.MinQty} | Max: ${s.MaxQty}</p><button class="btn" style="width:100%;margin-top:8px;">Order Now</button></div>`;}).join(''); }
        filterServiceGrid();
    }
    
    window.selectPlatformAndService = (platform, serviceId) => { let ps = document.getElementById("platformSelect"); if(ps){ ps.value=platform; ps.dispatchEvent(new Event('change')); setTimeout(()=>{let ss=document.getElementById("serviceSelect"); if(ss){ ss.value=serviceId; ss.dispatchEvent(new Event('change'));}},200); } };
    async function renderDashboard() { let stats = await apiCall("userStats"); let orders = await apiCall("getUserOrders"); document.getElementById("pageContent").innerHTML = `<div class="stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;"><div class="glass-card"><i class="fas fa-wallet"></i><h3>${formatPrice(currentUser.wallet)}</h3><p>Balance</p></div><div class="glass-card"><i class="fas fa-shopping-cart"></i><h3>${stats.totalOrders||0}</h3><p>Orders</p></div><div class="glass-card"><i class="fas fa-clock"></i><h3>${stats.pendingOrders||0}</h3><p>Pending</p></div></div><div class="glass-card"><h3>📜 Order History</h3>${orders.orders?.length?'<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"></td><th>ID</th><th>Service</th><th>Qty</th><th>Amount</th><th>Status</th>'+orders.orders.map(o=>`<tr><td>${o.id}</td><td>${o.serviceName}</td><td>${o.qty}</td><td>${formatPrice(o.amount)}</td><td>${o.status}</td></tr>`).join('')+'</table></div>':'<p>No orders found</p>'}</div>`; }
    async function renderProfile() { document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h2>Profile</h2><input id="fullName" value="${currentUser.fullName||''}" placeholder="Full Name"><input id="username" value="${currentUser.username||''}" placeholder="Username"><input id="email" value="${currentUser.gmail||''}" placeholder="Email"><input id="phone" value="${currentUser.phone||''}" placeholder="Phone"><input type="password" id="newPass" placeholder="New Password (optional)"><button id="updateBtn" class="btn btn-success">Update</button></div>`; document.getElementById("updateBtn").onclick=async()=>{let res=await apiCall("updateProfile",{fullName:document.getElementById("fullName").value,username:document.getElementById("username").value,email:document.getElementById("email").value,phone:document.getElementById("phone").value,newPassword:document.getElementById("newPass").value}); showToast(res.message); if(res.success) location.reload();}; }
    async function renderAddFunds() { document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>💰 Add Funds</h3><div class="info-badge"><i class="fas fa-mobile-alt"></i> Easypaisa: 03198595421 - Muhammad Ramzan</div><div class="info-badge"><i class="fas fa-credit-card"></i> Sadapay: 03198595421 - Muhammad Ramzan</div><button id="showProofBtn" class="btn">I Have Sent Payment</button><div id="proofForm" style="display:none;margin-top:15px;"><input type="number" id="amount" placeholder="Amount (PKR)"><input id="transactionId" placeholder="Transaction ID"><input type="file" id="screenshot"><button id="submitProofBtn" class="btn btn-success">Submit Proof</button></div></div>`; document.getElementById("showProofBtn").onclick=()=>{document.getElementById("proofForm").style.display="block";}; document.getElementById("submitProofBtn").onclick=async()=>{let file=document.getElementById("screenshot").files[0]; if(!file){showToast("Upload screenshot",true);return;} let reader=new FileReader(); reader.onload=async()=>{let res=await apiCall("addFundsRequest",{amount:document.getElementById("amount").value,transactionId:document.getElementById("transactionId").value,email:currentUser.gmail,screenshotBase64:reader.result}); showToast(res.message);}; reader.readAsDataURL(file);}; }
    async function renderJoinUs() { let res = await apiCall("getMyJoinStatus"); let app = res.application; let status = app?.status||'none'; let html=`<div class="glass-card"><h2>Join Team</h2>`; if(status==='none'){html+=`<div class="form-row"><input id="appName" placeholder="Full Name"><input id="appUser" placeholder="Username"></div><div class="form-row"><input id="appPhone" placeholder="Phone"><input id="appWhats" placeholder="WhatsApp"></div><div class="form-row"><input id="appEmail" placeholder="Email"><select id="appType"><option>Commission</option><option>Salary</option></select></div><div class="form-row"><select id="appHours"><option>4h</option><option>5h</option><option>6h</option></select><select id="appShift"><option>Day</option><option>Night</option></select></div><textarea id="appAbout" placeholder="About you" rows="3"></textarea><input type="file" id="appPhoto"><button id="submitApp" class="btn btn-success">Submit</button>`;} else if(status==='pending') html+=`<div>⏳ Pending Review</div>`; else if(status==='approved') html+=`<div>✅ Approved</div>`; else html+=`<div>❌ Rejected</div>`; html+=`</div>`; document.getElementById("pageContent").innerHTML = html; if(document.getElementById("submitApp")){document.getElementById("submitApp").onclick=async()=>{let file=document.getElementById("appPhoto").files[0]; if(!file){showToast("Upload photo",true);return;} let reader=new FileReader(); reader.onload=async()=>{let res=await apiCall("submitJoinRequest",{name:document.getElementById("appName").value,username:document.getElementById("appUser").value,phone:document.getElementById("appPhone").value,whatsapp:document.getElementById("appWhats").value,email:document.getElementById("appEmail").value,salaryType:document.getElementById("appType").value,hours:document.getElementById("appHours").value,shift:document.getElementById("appShift").value,about:document.getElementById("appAbout").value,photo:reader.result}); showToast(res.message); if(res.success) setTimeout(()=>renderJoinUs(),1500);}; reader.readAsDataURL(file);};}}
    async function renderHelp() { document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Support</h3><input id="helpEmail" value="${currentUser.gmail}" placeholder="Email"><input id="helpPhone" placeholder="Phone"><textarea id="helpMsg" placeholder="Your message" rows="4"></textarea><button id="sendHelp" class="btn">Send</button></div>`; document.getElementById("sendHelp").onclick=async()=>{let res=await apiCall("submitHelp",{email:document.getElementById("helpEmail").value,phone:document.getElementById("helpPhone").value,message:document.getElementById("helpMsg").value}); showToast(res.message);}; }
    
    function navigate(page) { if(page==="home") renderHome(); else if(page==="dashboard") renderDashboard(); else if(page==="services") renderServices(); else if(page==="addfunds") renderAddFunds(); else if(page==="profile") renderProfile(); else if(page==="joinus") renderJoinUs(); else if(page==="help") renderHelp(); }
    
    document.querySelectorAll("[data-page]").forEach(el=>el.addEventListener("click",(e)=>{e.preventDefault(); navigate(el.getAttribute("data-page")); document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display="none";}));
    document.getElementById("menuBtn").onclick = ()=>{document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display="block";};
    document.getElementById("closeSidebar").onclick = ()=>{document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display="none";};
    document.getElementById("overlay").onclick = ()=>{document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display="none";};
    document.getElementById("refreshBtn").onclick = ()=>{if(currentUser)navigate("home"); else showAuthScreen();};
    document.getElementById("logoutBtn").onclick = ()=>{localStorage.removeItem("mts_token"); location.reload();};
    document.getElementById("currencyGroupSidebar")?.addEventListener("click",(e)=>{if(e.target.dataset.curr){activeCurrency=e.target.dataset.curr; document.querySelectorAll('.currency-btn').forEach(b=>b.classList.toggle('active',b.dataset.curr===activeCurrency)); if(currentUser)navigate("home");}});
    window.navigateTo = navigate;
    (async function init(){ if(await checkAuth()){ await loadServices(); navigate("home"); } })();
</script>
</body>
</html>
