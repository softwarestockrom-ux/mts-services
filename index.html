<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0f1c; color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.7); border-radius: 20px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 20px; margin-bottom: 20px; }
        .btn { background: #2b6ef0; border: none; padding: 10px 20px; border-radius: 30px; color: white; cursor: pointer; font-weight: 600; }
        .btn-success { background: #10b981; }
        .btn-secondary { background: #475569; }
        input, select, textarea { background: #111827; border: 1px solid #1e293b; padding: 10px 14px; border-radius: 16px; color: white; width: 100%; margin: 8px 0; }
        .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #0d1425; z-index: 1000; transition: 0.2s; padding: 20px; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1300px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #0d1425; border-radius: 40px; margin-bottom: 20px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .platform-icon-item { background: #1e293b; border-radius: 40px; padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .platform-icon-item.active { background: #2b6ef0; }
        .category-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .category-btn { background: #1e293b; padding: 6px 15px; border-radius: 30px; cursor: pointer; font-size: 12px; }
        .category-btn.active { background: #2b6ef0; }
        .service-detail-box { background: #111827; border-radius: 16px; padding: 15px; margin: 15px 0; }
        .order-summary { background: rgba(16,185,129,0.1); border-radius: 16px; padding: 15px; margin: 15px 0; border: 1px solid rgba(16,185,129,0.3); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 15px; }
        .service-card { background: #0d1425; border-radius: 16px; border: 1px solid #1e293b; padding: 15px; cursor: pointer; }
        .service-card:hover { border-color: #2b6ef0; }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .currency-btn { background: #1e293b; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .currency-btn.active { background: #2b6ef0; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 10px 20px; border-radius: 30px; z-index: 2000; border-left: 3px solid #10b981; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #0d1425; border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; z-index: 1100; display: none; border: 1px solid #2b6ef0; max-height: 80vh; overflow-y: auto; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; }
        .debug-info { background: #1e293b; border-radius: 12px; padding: 10px; margin: 10px 0; font-size: 12px; font-family: monospace; }
        @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
        <h3>MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <a href="#" data-page="home" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-user-edit"></i> Profile</a>
        <a href="#" data-page="joinus" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-user-plus"></i> Join Us</a>
        <a href="#" data-page="help" style="color:white; text-decoration:none; padding:8px;"><i class="fas fa-question-circle"></i> Help</a>
        <div style="margin-top: 15px;">
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button>
                <button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-curr="AED">🇦🇪 AED</button>
                <button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
                <button class="currency-btn" data-curr="INR">🇮🇳 INR</button>
                <button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:15px; padding:10px; border-radius:30px;">Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700;">MTS SMM Services</div>
        <div><i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer;"></i> <span id="userNameDisplay">Guest</span></div>
    </div>
    <div id="pageContent"><div style="text-align:center;padding:50px;"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
</div>

<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size:50px; color:#10b981;"></i>
        <h2>Order Placed!</h2>
        <div id="orderDetails"></div>
        <button onclick="closeModal()" class="btn" style="margin-top:15px;">OK</button>
    </div>
</div>

<script>
    // IMPORTANT: Replace with your actual Apps Script URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let rates = { PKR:1, USD:0.0036, AED:0.0132, SAR:0.0135, INR:0.30, EUR:0.0033 };
    let symbols = { PKR:"Rs", USD:"$", AED:"د.إ", SAR:"﷼", INR:"₹", EUR:"€" };
    let allServices = [];
    let selectedService = null;
    let selectedCategory = "All";
    
    // Platform categories mapping
    const platformCategories = {
        "Instagram": ["Likes", "Views", "Followers", "Comments", "Saves", "Shares"],
        "TikTok": ["Likes", "Views", "Followers", "Comments", "Shares"],
        "Facebook": ["Likes", "Views", "Followers", "Comments", "Shares"],
        "YouTube": ["Likes", "Views", "Subscribers", "Watchtime", "Comments"],
        "Twitter": ["Likes", "Retweets", "Followers", "Views"],
        "WhatsApp": ["Traffic", "Views", "Members"],
        "Snapchat": ["Views", "Followers"],
        "Telegram": ["Members", "Views"],
        "LinkedIn": ["Likes", "Followers", "Views"],
        "Pinterest": ["Repins", "Likes", "Followers"],
        "Discord": ["Members"],
        "Twitch": ["Followers", "Views"],
        "Spotify": ["Followers", "Plays"],
        "Google": ["Traffic", "Views"],
        "Threads": ["Likes", "Followers", "Views"],
        "Netflix": ["Views"],
        "Canva": ["Designs", "Templates"],
        "CapCut": ["Edits", "Templates"],
        "ChatGPT": ["Prompts"],
        "Gemini": ["Prompts"],
        "Website Traffic": ["Traffic", "Views"],
        "PUBG UC": ["UC", "Points"]
    };
    
    const platforms = [
        { name:"Instagram", icon:"fab fa-instagram", color:"#E4405F" },
        { name:"TikTok", icon:"fab fa-tiktok", color:"#000000" },
        { name:"Facebook", icon:"fab fa-facebook", color:"#1877F2" },
        { name:"YouTube", icon:"fab fa-youtube", color:"#FF0000" },
        { name:"Twitter", icon:"fab fa-twitter", color:"#1DA1F2" },
        { name:"WhatsApp", icon:"fab fa-whatsapp", color:"#25D366" },
        { name:"Snapchat", icon:"fab fa-snapchat", color:"#FFFC00" },
        { name:"Telegram", icon:"fab fa-telegram", color:"#26A5E4" },
        { name:"LinkedIn", icon:"fab fa-linkedin", color:"#0A66C2" },
        { name:"Pinterest", icon:"fab fa-pinterest", color:"#BD081C" },
        { name:"Discord", icon:"fab fa-discord", color:"#5865F2" },
        { name:"Twitch", icon:"fab fa-twitch", color:"#9146FF" },
        { name:"Spotify", icon:"fab fa-spotify", color:"#1DB954" },
        { name:"Google", icon:"fab fa-google", color:"#4285F4" },
        { name:"Website Traffic", icon:"fas fa-globe", color:"#3b82f6" }
    ];
    
    function showToast(msg, isErr=false) {
        let t=document.createElement('div');
        t.className='toast';
        t.style.borderLeftColor=isErr?'#dc2626':'#10b981';
        t.innerHTML=msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    }
    
    function closeModal() { document.getElementById('successModal').style.display='none'; }
    
    function formatPrice(pkr) {
        let converted = pkr * rates[activeCurrency];
        let sym = symbols[activeCurrency];
        let flag = {PKR:"🇵🇰",USD:"🇺🇸",AED:"🇦🇪",SAR:"🇸🇦",INR:"🇮🇳",EUR:"🇪🇺"}[activeCurrency] || "";
        return `${flag} ${sym} ${converted.toFixed(2)}`;
    }
    
    async function apiCall(action, data={}) {
        let payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        let formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            let res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            let result = await res.json();
            console.log(`API ${action}:`, result);
            return result;
        } catch(e) {
            console.error("API Error:", e);
            return { success: false, error: e.message };
        }
    }
    
    async function loadServices() {
        let res = await apiCall("getServices");
        if(res.success && res.services) {
            allServices = res.services;
            console.log("Loaded", allServices.length, "services");
            showToast(`Loaded ${allServices.length} services`);
        } else {
            console.log("Failed to load services:", res);
            showToast("Failed to load services: " + (res.error || "Unknown error"), true);
        }
    }
    
    async function checkAuth() {
        let token = localStorage.getItem("mts_token");
        if(!token) { showAuthScreen(); return false; }
        let res = await apiCall("verifySession", { token });
        if(res.success && res.user) {
            currentUser = res.user;
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username;
            return true;
        } else {
            localStorage.removeItem("mts_token");
            showAuthScreen();
            return false;
        }
    }
    
    function showAuthScreen() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:400px;margin:50px auto;">
                <h2>Welcome</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" class="btn" style="width:100%">Login</button>
                    <button id="showSignupBtn" class="btn btn-secondary" style="width:100%; margin-top:10px;">Sign Up</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Email"><input id="phoneNum" placeholder="Phone">
                    <select id="userType"><option>Commission Based</option><option>Salary Based</option></select>
                    <input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm">
                    <button id="doSignup" class="btn" style="width:100%">Register</button>
                    <button id="backLogin" class="btn btn-secondary" style="width:100%; margin-top:10px;">Back</button>
                </div>
            </div>
        `;
        
        document.getElementById("doLogin")?.addEventListener("click", async () => {
            let res = await apiCall("login", { email: document.getElementById("loginEmail").value, pass: document.getElementById("loginPass").value });
            if(res.success) { localStorage.setItem("mts_token", res.token); location.reload(); }
            else showToast(res.error, true);
        });
        document.getElementById("showSignupBtn")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        });
        document.getElementById("backLogin")?.addEventListener("click", () => {
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("signupForm").style.display = "none";
        });
        document.getElementById("doSignup")?.addEventListener("click", async () => {
            let p = document.getElementById("pass").value, c = document.getElementById("confirmPass").value;
            if(p !== c) { showToast("Passwords don't match", true); return; }
            let res = await apiCall("signup", {
                fullName: document.getElementById("fullName").value,
                username: document.getElementById("username").value,
                gmail: document.getElementById("gmail").value,
                phone: document.getElementById("phoneNum").value,
                userType: document.getElementById("userType").value,
                password: p
            });
            if(res.success) { showToast("Account created! Please login."); document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; }
            else showToast(res.error, true);
        });
    }
    
    // ========== HOME PAGE ==========
    async function renderHome() {
        await loadServices();
        
        let platformIconsHtml = platforms.map(p => `
            <div class="platform-icon-item" data-platform="${p.name}">
                <i class="${p.icon}" style="color:${p.color}"></i>
                <span>${p.name}</span>
            </div>
        `).join('');
        
        let html = `
            <div class="glass-card">
                <h3>💰 Balance: ${formatPrice(currentUser.wallet)}</h3>
            </div>
            <div class="glass-card">
                <h2>Place Order</h2>
                <div class="platform-icons" id="platformIconsList">${platformIconsHtml}</div>
                
                <label>Select Platform</label>
                <select id="platformSelect">
                    <option value="">-- Select Platform --</option>
                    ${platforms.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                </select>
                
                <div id="categorySection" style="display:none;" class="category-section">
                    <label>Filter by Category:</label>
                    <div id="categoryButtons" class="category-buttons"></div>
                </div>
                
                <label>Select Service</label>
                <select id="serviceSelect">
                    <option value="">-- Select Service --</option>
                </select>
                
                <div id="serviceInfo" style="display:none;"></div>
                
                <label>Quantity</label>
                <input type="number" id="quantity" placeholder="Enter quantity" min="1">
                <div id="qtyWarning" style="color:#f59e0b; font-size:12px; display:none;"></div>
                
                <div id="extraFields"></div>
                
                <div id="orderSummary" style="display:none;" class="order-summary">
                    <h4>Order Summary</h4>
                    <p>Price per unit: <span id="unitPrice">0</span></p>
                    <p>Total Amount: <span id="totalPrice">0</span></p>
                    <p>Delivery: <span id="deliveryTime">-</span></p>
                </div>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button id="placeOrderBtn" class="btn btn-success">Place Order</button>
                    <button id="clearFormBtn" class="btn btn-secondary">Clear</button>
                </div>
            </div>
        `;
        
        document.getElementById("pageContent").innerHTML = html;
        
        // Event listeners
        document.querySelectorAll('#platformIconsList .platform-icon-item').forEach(el => {
            el.addEventListener('click', () => {
                document.getElementById('platformSelect').value = el.dataset.platform;
                updatePlatform();
            });
        });
        
        document.getElementById("platformSelect").addEventListener("change", updatePlatform);
        document.getElementById("serviceSelect").addEventListener("change", showServiceDetails);
        document.getElementById("quantity").addEventListener("input", calculateTotal);
        document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
        document.getElementById("clearFormBtn").addEventListener("click", clearForm);
        
        function updatePlatform() {
            let platform = document.getElementById("platformSelect").value;
            let categorySection = document.getElementById("categorySection");
            let categoryBtns = document.getElementById("categoryButtons");
            
            if(platform && platformCategories[platform]) {
                categorySection.style.display = "block";
                let cats = ["All", ...platformCategories[platform]];
                categoryBtns.innerHTML = cats.map(c => 
                    `<div class="category-btn ${selectedCategory === c ? 'active' : ''}" data-cat="${c}">${c}</div>`
                ).join('');
                
                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedCategory = btn.dataset.cat;
                        updateServiceDropdown();
                    });
                });
                selectedCategory = "All";
            } else {
                categorySection.style.display = "none";
                selectedCategory = "All";
            }
            updateServiceDropdown();
        }
        
        function updateServiceDropdown() {
            let platform = document.getElementById("platformSelect").value;
            let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
            
            if(selectedCategory !== "All") {
                filtered = filtered.filter(s => s.Name && s.Name.toLowerCase().includes(selectedCategory.toLowerCase()));
            }
            
            let select = document.getElementById("serviceSelect");
            select.innerHTML = '<option value="">-- Select Service --</option>';
            filtered.forEach(s => {
                select.innerHTML += `<option value="${s.ServiceId}">${s.Name}</option>`;
            });
            selectedService = null;
            document.getElementById("serviceInfo").style.display = "none";
            document.getElementById("orderSummary").style.display = "none";
            document.getElementById("extraFields").innerHTML = "";
        }
        
        function showServiceDetails() {
            let serviceId = document.getElementById("serviceSelect").value;
            if(!serviceId) return;
            selectedService = allServices.find(s => s.ServiceId === serviceId);
            if(!selectedService) return;
            
            let rateDisplay = selectedService.Per1k ? 
                `${formatPrice(selectedService.Rate)} per 1000 (${formatPrice(selectedService.Rate/1000)} per unit)` : 
                `${formatPrice(selectedService.Rate)} per unit`;
            
            document.getElementById("serviceInfo").innerHTML = `
                <div style="background:#111827; border-radius:16px; padding:15px; margin:15px 0;">
                    <h4>${selectedService.Name}</h4>
                    <p>Rate: ${rateDisplay}</p>
                    <p>Min: ${selectedService.MinQty} | Max: ${selectedService.MaxQty}</p>
                    <p>Delivery: ${selectedService.DeliveryTime || '1-2 hours'}</p>
                    <p>${selectedService.Description || ''}</p>
                </div>
            `;
            document.getElementById("serviceInfo").style.display = "block";
            document.getElementById("deliveryTime").innerHTML = selectedService.DeliveryTime || '1-2 hours';
            
            let extra = '';
            if(selectedService.IsAccount) extra = '<div><label>Email Address</label><input type="email" id="emailField" placeholder="Enter email"></div>';
            if(selectedService.RequireLink) extra = '<div><label>Profile/Post Link</label><input type="url" id="linkField" placeholder="Enter link"></div>';
            if(selectedService.CustomComments) extra += '<div><label>Custom Comments</label><textarea id="commentsField" placeholder="Comments (comma separated)" rows="2"></textarea></div>';
            document.getElementById("extraFields").innerHTML = extra;
            calculateTotal();
        }
        
        function calculateTotal() {
            if(!selectedService) return;
            let qty = parseInt(document.getElementById("quantity").value) || 0;
            let minQty = parseInt(selectedService.MinQty) || 1;
            let maxQty = parseInt(selectedService.MaxQty) || 10000;
            
            if(qty > 0 && qty < minQty) {
                document.getElementById("qtyWarning").innerHTML = `⚠️ Min quantity: ${minQty}`;
                document.getElementById("qtyWarning").style.display = "block";
                document.getElementById("orderSummary").style.display = "none";
                return;
            } else if(qty > maxQty) {
                document.getElementById("qtyWarning").innerHTML = `⚠️ Max quantity: ${maxQty}`;
                document.getElementById("qtyWarning").style.display = "block";
                document.getElementById("orderSummary").style.display = "none";
                return;
            } else {
                document.getElementById("qtyWarning").style.display = "none";
            }
            
            if(qty === 0) {
                document.getElementById("orderSummary").style.display = "none";
                return;
            }
            
            let totalPKR, unitPKR;
            if(selectedService.Per1k) {
                unitPKR = selectedService.Rate / 1000;
                totalPKR = unitPKR * qty;
            } else {
                unitPKR = selectedService.Rate;
                totalPKR = selectedService.Rate * qty;
            }
            
            document.getElementById("unitPrice").innerHTML = formatPrice(unitPKR);
            document.getElementById("totalPrice").innerHTML = formatPrice(totalPKR);
            document.getElementById("orderSummary").style.display = "block";
            selectedService.calcTotal = totalPKR;
        }
        
        async function placeOrder() {
            if(!selectedService) { showToast("Select a service first", true); return; }
            let qty = parseInt(document.getElementById("quantity").value);
            if(!qty || qty < selectedService.MinQty) { showToast(`Min quantity: ${selectedService.MinQty}`, true); return; }
            if(currentUser.wallet < selectedService.calcTotal) { showToast(`Insufficient balance! Need ${formatPrice(selectedService.calcTotal)}`, true); return; }
            
            let extra = {};
            if(document.getElementById("emailField")) extra.email = document.getElementById("emailField").value;
            if(document.getElementById("linkField")) extra.link = document.getElementById("linkField").value;
            if(document.getElementById("commentsField")) extra.comments = document.getElementById("commentsField").value;
            
            let res = await apiCall("createOrder", {
                serviceId: selectedService.ServiceId,
                quantity: qty,
                totalAmount: selectedService.calcTotal,
                extraFields: extra
            });
            
            if(res.success) {
                document.getElementById("orderDetails").innerHTML = `
                    <p><strong>Order ID:</strong> ${res.orderId}</p>
                    <p><strong>Service:</strong> ${selectedService.Name}</p>
                    <p><strong>Quantity:</strong> ${qty}</p>
                    <p><strong>Amount:</strong> ${formatPrice(selectedService.calcTotal)}</p>
                    <p><strong>Date:</strong> ${new Date().toLocaleString()}</p>
                `;
                document.getElementById("successModal").style.display = "block";
                setTimeout(() => location.reload(), 2000);
            } else {
                showToast(res.error, true);
            }
        }
        
        function clearForm() {
            document.getElementById("platformSelect").value = "";
            document.getElementById("serviceSelect").innerHTML = '<option value="">-- Select Service --</option>';
            document.getElementById("quantity").value = "";
            document.getElementById("serviceInfo").style.display = "none";
            document.getElementById("orderSummary").style.display = "none";
            document.getElementById("extraFields").innerHTML = "";
            document.getElementById("categorySection").style.display = "none";
            document.getElementById("qtyWarning").style.display = "none";
            selectedService = null;
            showToast("Form cleared");
        }
        
        updatePlatform();
    }
    
    // ========== SERVICES PAGE ==========
    async function renderServices() {
        await loadServices();
        
        let platformIconsHtml = `<div class="platform-icon-item active" data-platform="all"><i class="fas fa-th-large"></i><span>All</span></div>` + 
            platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('');
        
        let html = `
            <div class="glass-card">
                <div class="platform-icons" id="servicesPlatformList">${platformIconsHtml}</div>
                <input type="text" id="searchServices" placeholder="🔍 Search services...">
            </div>
            <div id="servicesGrid" class="cards-grid"></div>
        `;
        
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#servicesPlatformList .platform-icon-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('#servicesPlatformList .platform-icon-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                filterServices();
            });
        });
        
        document.getElementById("searchServices").addEventListener("input", filterServices);
        
        function filterServices() {
            let platform = document.querySelector('#servicesPlatformList .platform-icon-item.active')?.dataset.platform || 'all';
            let search = document.getElementById("searchServices")?.value.toLowerCase() || "";
            let filtered = allServices.filter(s => (platform === 'all' || s.Platform === platform) && 
                (s.Name.toLowerCase().includes(search) || s.ServiceId.includes(search)));
            
            document.getElementById("servicesGrid").innerHTML = filtered.map(s => {
                let price = s.Per1k ? formatPrice(s.Rate/1000) : formatPrice(s.Rate);
                return `
                    <div class="service-card" onclick="navigateTo('home'); setTimeout(()=>selectPlatformAndService('${s.Platform}','${s.ServiceId}'),100)">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <i class="fab fa-${s.Platform.toLowerCase()}" style="font-size:24px;"></i>
                            <strong>${s.Name}</strong>
                        </div>
                        <hr>
                        <p>Price: ${price} ${s.Per1k ? '/1000' : '/unit'}</p>
                        <p>Min: ${s.MinQty}</p>
                        <button class="btn" style="margin-top:10px; width:100%;" onclick="event.stopPropagation(); navigateTo('home'); setTimeout(()=>selectPlatformAndService('${s.Platform}','${s.ServiceId}'),100)">Order Now</button>
                    </div>
                `;
            }).join('');
        }
        
        filterServices();
    }
    
    window.selectPlatformAndService = (platform, serviceId) => {
        let ps = document.getElementById("platformSelect");
        if(ps) {
            ps.value = platform;
            // Trigger change event
            ps.dispatchEvent(new Event('change'));
            setTimeout(() => {
                let ss = document.getElementById("serviceSelect");
                if(ss) {
                    ss.value = serviceId;
                    ss.dispatchEvent(new Event('change'));
                }
            }, 200);
        }
    };
    
    // ========== DASHBOARD PAGE ==========
    async function renderDashboard() {
        let stats = await apiCall("userStats");
        let orders = await apiCall("getUserOrders");
        document.getElementById("pageContent").innerHTML = `
            <div class="stats-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;">
                <div class="glass-card"><i class="fas fa-wallet"></i><h3>${formatPrice(currentUser.wallet)}</h3><p>Balance</p></div>
                <div class="glass-card"><i class="fas fa-shopping-cart"></i><h3>${stats.totalOrders||0}</h3><p>Orders</p></div>
                <div class="glass-card"><i class="fas fa-clock"></i><h3>${stats.pendingOrders||0}</h3><p>Pending</p></div>
            </div>
            <div class="glass-card"><h3>Order History</h3>${orders.orders?.length ? '<div style="overflow-x:auto;"><table style="width:100%"><tr><th>ID</th><th>Service</th><th>Qty</th><th>Amount</th><th>Status</th></tr>' + orders.orders.map(o => `<tr><td>${o.id}</td><td>${o.serviceName}</td><td>${o.qty}</td><td>${formatPrice(o.amount)}</td><td>${o.status}</td></tr>`).join('') + '</table></div>' : '<p>No orders</p>'}</div>`;
    }
    
    // ========== PROFILE PAGE ==========
    async function renderProfile() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h2>Profile Settings</h2>
                <input id="fullName" placeholder="Full Name" value="${currentUser.fullName || ''}">
                <input id="username" placeholder="Username" value="${currentUser.username || ''}">
                <input id="email" placeholder="Email" value="${currentUser.gmail || ''}">
                <input id="phone" placeholder="Phone" value="${currentUser.phone || ''}">
                <input type="password" id="newPass" placeholder="New Password (optional)">
                <button id="updateBtn" class="btn btn-success">Update Profile</button>
            </div>
        `;
        document.getElementById("updateBtn").onclick = async () => {
            let res = await apiCall("updateProfile", {
                fullName: document.getElementById("fullName").value,
                username: document.getElementById("username").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                newPassword: document.getElementById("newPass").value
            });
            showToast(res.message);
            if(res.success) location.reload();
        };
    }
    
    // ========== ADD FUNDS PAGE ==========
    async function renderAddFunds() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h3>Add Funds</h3>
                <div style="background:#1e293b; border-radius:16px; padding:15px; margin:10px 0;">
                    <i class="fas fa-mobile-alt"></i> <strong>Easypaisa:</strong> 03198595421 - Muhammad Ramzan
                </div>
                <div style="background:#1e293b; border-radius:16px; padding:15px; margin:10px 0;">
                    <i class="fas fa-credit-card"></i> <strong>Sadapay:</strong> 03198595421 - Muhammad Ramzan
                </div>
                <button id="showProofBtn" class="btn">I Have Sent Payment</button>
                <div id="proofForm" style="display:none; margin-top:15px;">
                    <input type="number" id="amount" placeholder="Amount (PKR)">
                    <input id="transactionId" placeholder="Transaction ID">
                    <input type="file" id="screenshot">
                    <button id="submitProofBtn" class="btn btn-success" style="margin-top:10px;">Submit</button>
                </div>
            </div>
        `;
        
        document.getElementById("showProofBtn").onclick = () => {
            document.getElementById("proofForm").style.display = "block";
        };
        document.getElementById("submitProofBtn").onclick = async () => {
            let file = document.getElementById("screenshot").files[0];
            if(!file) { showToast("Upload screenshot", true); return; }
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", {
                    amount: document.getElementById("amount").value,
                    transactionId: document.getElementById("transactionId").value,
                    email: currentUser.gmail,
                    screenshotBase64: reader.result
                });
                showToast(res.message);
            };
            reader.readAsDataURL(file);
        };
    }
    
    // ========== JOIN US PAGE ==========
    async function renderJoinUs() {
        let res = await apiCall("getMyJoinStatus");
        let application = res.application;
        let status = application?.status || 'none';
        
        let html = `<div class="glass-card"><h2>Join Us & Earn</h2>`;
        
        if(status === 'none') {
            html += `
                <h3>Application Form</h3>
                <div class="form-row"><input id="appName" placeholder="Full Name"><input id="appUser" placeholder="Username"></div>
                <div class="form-row"><input id="appPhone" placeholder="Phone"><input id="appWhats" placeholder="WhatsApp"></div>
                <div class="form-row"><input id="appEmail" placeholder="Email"><select id="appType"><option>Commission</option><option>Salary</option></select></div>
                <div class="form-row"><select id="appHours"><option>4h</option><option>5h</option><option>6h</option></select><select id="appShift"><option>Day</option><option>Night</option></select></div>
                <textarea id="appAbout" placeholder="About you" rows="3"></textarea>
                <input type="file" id="appPhoto">
                <button id="submitApp" class="btn btn-success">Submit Application</button>
            `;
        } else if(status === 'pending') {
            html += `<div class="info-note">⏳ Application Pending Review</div>`;
        } else if(status === 'approved') {
            html += `<div class="success-note">✅ Application Approved!</div>`;
        } else {
            html += `<div class="info-note">❌ Application Rejected</div>`;
        }
        html += `</div>`;
        
        document.getElementById("pageContent").innerHTML = html;
        
        if(document.getElementById("submitApp")) {
            document.getElementById("submitApp").onclick = async () => {
                let file = document.getElementById("appPhoto").files[0];
                let reader = new FileReader();
                reader.onload = async () => {
                    let res = await apiCall("submitJoinRequest", {
                        name: document.getElementById("appName").value,
                        username: document.getElementById("appUser").value,
                        phone: document.getElementById("appPhone").value,
                        whatsapp: document.getElementById("appWhats").value,
                        email: document.getElementById("appEmail").value,
                        salaryType: document.getElementById("appType").value,
                        hours: document.getElementById("appHours").value,
                        shift: document.getElementById("appShift").value,
                        about: document.getElementById("appAbout").value,
                        photo: reader.result
                    });
                    showToast(res.message);
                    if(res.success) setTimeout(() => renderJoinUs(), 1500);
                };
                if(file) reader.readAsDataURL(file);
                else showToast("Upload photo", true);
            };
        }
    }
    
    // ========== HELP PAGE ==========
    async function renderHelp() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h3>Help Center</h3>
                <input id="helpEmail" placeholder="Email" value="${currentUser.gmail}">
                <input id="helpPhone" placeholder="Phone">
                <textarea id="helpMsg" placeholder="Your message" rows="4"></textarea>
                <button id="sendHelp" class="btn">Send</button>
            </div>
        `;
        document.getElementById("sendHelp").onclick = async () => {
            let res = await apiCall("submitHelp", {
                email: document.getElementById("helpEmail").value,
                phone: document.getElementById("helpPhone").value,
                message: document.getElementById("helpMsg").value
            });
            showToast(res.message);
        };
    }
    
    function navigate(page) {
        if(page === "home") renderHome();
        else if(page === "dashboard") renderDashboard();
        else if(page === "services") renderServices();
        else if(page === "addfunds") renderAddFunds();
        else if(page === "profile") renderProfile();
        else if(page === "joinus") renderJoinUs();
        else if(page === "help") renderHelp();
    }
    
    // Navigation
    document.querySelectorAll("[data-page]").forEach(el => {
        el.addEventListener("click", (e) => {
            e.preventDefault();
            navigate(el.getAttribute("data-page"));
            document.getElementById("sidebar").classList.remove("open");
            document.getElementById("overlay").style.display = "none";
        });
    });
    
    document.getElementById("menuBtn").onclick = () => {
        document.getElementById("sidebar").classList.add("open");
        document.getElementById("overlay").style.display = "block";
    };
    document.getElementById("closeSidebar").onclick = () => {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    };
    document.getElementById("overlay").onclick = () => {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate("home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => {
        if(e.target.dataset.curr) {
            activeCurrency = e.target.dataset.curr;
            document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.dataset.curr === activeCurrency));
            if(currentUser) navigate("home");
        }
    });
    
    window.navigateTo = navigate;
    
    // Initialize
    (async function init() {
        if(await checkAuth()) {
            await loadServices();
            navigate("home");
        }
    })();
</script>
</body>
</html>
