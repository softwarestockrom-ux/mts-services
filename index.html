<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.5); transform: translateY(-2px); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        .payment-method-card { background: rgba(30, 41, 59, 0.5); border-radius: 20px; padding: 20px; margin: 15px 0; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .payment-method-card:hover { background: rgba(30, 41, 59, 0.8); transform: translateX(5px); }
        .payment-method-card.selected { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .payment-method-card .selected-check { float: right; color: #10b981; }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 24px; color: white; width: 100%; outline: none; margin: 8px 0; }
        input:focus, select:focus { border-color: #3b82f6; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.96); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .currency-btn.active { background: #2b6ef0; border-color: white; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 2000; border-left: 4px solid #2b6ef0; max-width: 350px; z-index: 9999; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; }
        @media (max-width: 768px) { .form-row { flex-direction: column; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
        <h3><i class="fas fa-chart-line"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 15px;">
        <a href="#" data-page="home"><i class="fas fa-home"></i> Home</a>
        <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" data-page="services"><i class="fas fa-box"></i> Services</a>
        <a href="#" data-page="addfunds"><i class="fas fa-wallet"></i> Add Funds</a>
        <a href="#" data-page="profile"><i class="fas fa-user-edit"></i> Profile Settings</a>
        <a href="#" data-page="recommendations"><i class="fas fa-star"></i> Recommendations</a>
        <a href="#" data-page="joinus"><i class="fas fa-user-plus"></i> Join Us & Earn</a>
        <a href="#" data-page="help"><i class="fas fa-question-circle"></i> Help</a>
        <div class="currency-toggle" style="margin-top: 20px;">
            <label><i class="fas fa-exchange-alt"></i> Currency:</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button>
                <button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-curr="AED">🇦🇪 AED</button>
                <button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
                <button class="currency-btn" data-curr="INR">🇮🇳 INR</button>
                <button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:#dc2626; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div class="menu-icon" id="menuBtn"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.2rem;">MTS SMM Services</div>
        <div class="user-info">
            <i class="fas fa-sync-alt refresh-btn" id="refreshBtn" style="cursor:pointer; margin-right:15px;"></i>
            <span id="userAvatar"><i class="fas fa-user-circle"></i></span>
            <span id="userNameDisplay">Guest</span>
        </div>
    </div>
    <div id="pageContent">Loading...</div>
</div>

<div id="successModal" class="modal">
    <div style="text-align:center;">
        <i class="fas fa-check-circle" style="font-size: 60px; color: #10b981;"></i>
        <h2>Success!</h2>
        <p id="successMessage"></p>
        <button onclick="closeSuccessModal()" class="btn">OK</button>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXvgaj06YviIbHlKvM7FmLH6y_FvYG6kcBv9TgVuelbNp6sjm187ABRnXFTlPM4e_-Jg/exec"; // Replace with your Apps Script URL
    
    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR: 1, USD: 0.0036, AED: 0.0132, SAR: 0.0135, INR: 0.30, EUR: 0.0033 };
    let currencySymbols = { PKR: "Rs", USD: "$", AED: "د.إ", SAR: "﷼", INR: "₹", EUR: "€" };
    let allServices = [];
    let selectedService = null;
    let joinApplication = null;
    let paymentMethods = [];
    let selectedPaymentMethod = null;
    
    const platforms = [
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F" },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#000000" },
        { name: "Facebook", icon: "fab fa-facebook", color: "#1877F2" },
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000" },
        { name: "Twitter", icon: "fab fa-twitter", color: "#1DA1F2" },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366" },
        { name: "Snapchat", icon: "fab fa-snapchat", color: "#FFFC00" },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4" },
        { name: "LinkedIn", icon: "fab fa-linkedin", color: "#0A66C2" },
        { name: "Pinterest", icon: "fab fa-pinterest", color: "#BD081C" },
        { name: "Discord", icon: "fab fa-discord", color: "#5865F2" },
        { name: "Twitch", icon: "fab fa-twitch", color: "#9146FF" },
        { name: "Spotify", icon: "fab fa-spotify", color: "#1DB954" },
        { name: "Google", icon: "fab fa-google", color: "#4285F4" },
        { name: "Threads", icon: "fab fa-threads", color: "#000000" },
        { name: "Netflix", icon: "fas fa-film", color: "#E50914" },
        { name: "Canva", icon: "fas fa-palette", color: "#00C4CC" },
        { name: "CapCut", icon: "fas fa-cut", color: "#00D4FF" },
        { name: "ChatGPT", icon: "fas fa-comment-dots", color: "#10A37F" },
        { name: "Gemini", icon: "fas fa-brain", color: "#4285F4" },
        { name: "Website Traffic", icon: "fas fa-globe", color: "#3b82f6" },
        { name: "PUBG UC", icon: "fas fa-gamepad", color: "#FFA500" }
    ];
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function closeSuccessModal() { document.getElementById('successModal').style.display = 'none'; if (currentUser) navigate("home"); }
    
    function convertPrice(amountPKR) { return amountPKR * exchangeRates[activeCurrency]; }
    function formatCurrency(amountPKR) { 
        let converted = convertPrice(amountPKR);
        let symbol = currencySymbols[activeCurrency];
        if (activeCurrency === 'PKR') return `${symbol} ${converted.toFixed(2)} PKR`;
        return `${symbol} ${converted.toFixed(2)}`;
    }
    
    function updateCurrencyDisplay() {
        document.querySelectorAll('.currency-btn').forEach(btn => {
            if (btn.dataset.curr === activeCurrency) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (currentUser && document.getElementById("pageContent")) {
            let currentPage = window.location.hash.replace('#', '') || "home";
            navigate(currentPage);
        }
    }
    
    async function apiCall(action, data = {}) {
        const payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            return await res.json();
        } catch(err) { return { success: false, error: err.message }; }
    }
    
    async function loadServices() { 
        let res = await apiCall("getServices"); 
        if(res.success) allServices = res.services; 
    }
    
    async function loadPaymentMethods() {
        let res = await apiCall("getPaymentMethods");
        if(res.success && res.methods) {
            paymentMethods = res.methods;
        } else {
            // Default payment methods if none exist
            paymentMethods = [
                { id: "PM001", name: "Easypaisa", account: "03198595421", holder: "Muhammad Ramzan Al Sami", icon: "fas fa-mobile-alt", active: true },
                { id: "PM002", name: "Sadapay", account: "03198595421", holder: "Muhammad Ramzan Ul Sami", icon: "fas fa-credit-card", active: true }
            ];
        }
    }
    
    async function checkAuth() { 
        let token = localStorage.getItem("mts_token"); 
        if(!token) { showAuthScreen(); return false; } 
        let res = await apiCall("verifySession", { token }); 
        if(res.success) { 
            currentUser = res.user; 
            document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; 
            await loadJoinApplication();
            return true; 
        } else { 
            localStorage.removeItem("mts_token"); 
            showAuthScreen(); 
            return false; 
        } 
    }
    
    async function loadJoinApplication() {
        try {
            let res = await apiCall("getMyJoinStatus");
            if(res.success && res.application) {
                joinApplication = res.application;
            } else {
                joinApplication = null;
            }
        } catch(e) {
            console.error("Error loading join status:", e);
            joinApplication = null;
        }
    }
    
    function showAuthScreen() { 
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card" style="max-width:450px;margin:50px auto;">
                <h2><i class="fas fa-rocket"></i> Welcome to MTS SMM</h2>
                <div id="loginForm">
                    <input type="text" id="loginEmail" placeholder="Email or Username">
                    <input type="password" id="loginPass" placeholder="Password">
                    <button id="doLogin" class="btn" style="width:100%">Login</button>
                    <button id="showSignupBtn" style="background:transparent; border:1px solid #2b6ef0; width:100%; margin-top:10px;">Create Account</button>
                </div>
                <div id="signupForm" style="display:none;">
                    <input id="fullName" placeholder="Full Name"><input id="username" placeholder="Username">
                    <input id="gmail" placeholder="Gmail"><input id="phoneNum" placeholder="Phone">
                    <select id="userType"><option>Commission Based</option><option>Salary Based</option></select>
                    <input id="pass" type="password" placeholder="Password"><input id="confirmPass" type="password" placeholder="Confirm">
                    <button id="doSignup" class="btn" style="width:100%">Register</button>
                    <button id="backLogin" style="background:transparent; border:1px solid #475569; width:100%; margin-top:10px;">Back</button>
                </div>
            </div>
        `; 
        attachAuthEvents(); 
    }
    
    function attachAuthEvents() { 
        document.getElementById("doLogin")?.addEventListener("click", async () => {
            let res = await apiCall("login", { email: document.getElementById("loginEmail").value, pass: document.getElementById("loginPass").value });
            if(res.success) { localStorage.setItem("mts_token", res.token); location.reload(); }
            else showToast(res.error, true);
        });
        document.getElementById("showSignupBtn")?.addEventListener("click", () => { document.getElementById("loginForm").style.display = "none"; document.getElementById("signupForm").style.display = "block"; });
        document.getElementById("backLogin")?.addEventListener("click", () => { document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; });
        document.getElementById("doSignup")?.addEventListener("click", async () => {
            let pass = document.getElementById("pass").value, confirm = document.getElementById("confirmPass").value;
            if(pass !== confirm) { showToast("Passwords don't match", true); return; }
            let res = await apiCall("signup", {
                fullName: document.getElementById("fullName").value, username: document.getElementById("username").value,
                gmail: document.getElementById("gmail").value, phone: document.getElementById("phoneNum").value,
                userType: document.getElementById("userType").value, password: pass
            });
            if(res.success) { showToast("Account created! Please login."); document.getElementById("loginForm").style.display = "block"; document.getElementById("signupForm").style.display = "none"; }
            else showToast(res.error, true);
        });
    }
    
    async function renderProfile() {
        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h2><i class="fas fa-user-edit"></i> Profile Settings</h2>
                <div class="form-row"><input id="profileFullName" placeholder="Full Name" value="${currentUser.fullName || ''}"></div>
                <div class="form-row"><input id="profileUsername" placeholder="Username" value="${currentUser.username || ''}"></div>
                <div class="form-row"><input id="profileGmail" placeholder="Email" value="${currentUser.gmail || ''}"></div>
                <div class="form-row"><input id="profilePhone" placeholder="Phone" value="${currentUser.phone || ''}"></div>
                <div class="form-row"><input type="password" id="newPassword" placeholder="New Password (leave blank to keep unchanged)"></div>
                <button id="updateProfileBtn" class="btn btn-success">Update Profile</button>
            </div>
        `;
        document.getElementById("updateProfileBtn").onclick = async () => {
            let res = await apiCall("updateProfile", {
                fullName: document.getElementById("profileFullName").value,
                username: document.getElementById("profileUsername").value,
                gmail: document.getElementById("profileGmail").value,
                phone: document.getElementById("profilePhone").value,
                newPassword: document.getElementById("newPassword").value
            });
            showToast(res.message);
            if(res.success) { currentUser = { ...currentUser, fullName: document.getElementById("profileFullName").value, username: document.getElementById("profileUsername").value, gmail: document.getElementById("profileGmail").value, phone: document.getElementById("profilePhone").value }; document.getElementById("userNameDisplay").innerText = currentUser.fullName?.split(" ")[0] || currentUser.username; }
        };
    }
    
    async function renderHome() { 
        await loadServices();
        let html = `
            <div class="glass-card"><h3><i class="fas fa-coins"></i> Wallet Balance: ${formatCurrency(currentUser.wallet)}</h3></div>
            <div class="glass-card">
                <div class="platform-icons" id="homePlatformIcons" style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px;">${platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}" style="background:rgba(30,41,59,0.6); border-radius:50px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:8px;"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('')}</div>
                <select id="platformSelect"><option value="">Select Platform</option>${platforms.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}</select>
                <select id="serviceSelect"><option value="">Select Service</option></select>
                <input type="number" id="quantity" placeholder="Quantity" min="1">
                <div id="dynamicFields"></div>
                <div id="serviceDetails" style="display:none;"></div>
                <div class="order-summary" id="orderSummary" style="display:none;"><h4>Order Summary</h4><p>Price per unit: <span id="servicePrice">0</span></p><p>Total Amount: <span id="totalAmount">0</span></p></div>
                <div style="display:flex; gap:10px;"><button id="placeOrderBtn" class="btn">Place Order</button><button id="clearFormBtn" class="btn btn-secondary">Clear</button></div>
            </div>
        `;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('#homePlatformIcons .platform-icon-item').forEach(el => el.addEventListener('click', () => { 
            document.getElementById('platformSelect').value = el.dataset.platform; 
            updateServiceDropdown(); 
        }));
        document.getElementById("platformSelect").addEventListener("change", updateServiceDropdown);
        document.getElementById("serviceSelect").addEventListener("change", showServiceDetails);
        document.getElementById("quantity").addEventListener("input", calculateTotal);
        document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);
        document.getElementById("clearFormBtn").addEventListener("click", () => { selectedService = null; document.getElementById("serviceDetails").style.display = "none"; document.getElementById("orderSummary").style.display = "none"; document.getElementById("dynamicFields").innerHTML = ""; document.getElementById("quantity").value = ""; });
        updateServiceDropdown();
    }
    
    function updateServiceDropdown() {
        let platform = document.getElementById("platformSelect").value;
        let filtered = platform ? allServices.filter(s => s.Platform === platform) : [];
        let select = document.getElementById("serviceSelect");
        select.innerHTML = '<option value="">Select a service</option>';
        filtered.forEach(s => { 
            let rateDisplay = s.Per1k ? `${formatCurrency(s.Rate)} per 1000` : `${formatCurrency(s.Rate)} per unit`;
            select.innerHTML += `<option value="${s.ServiceId}">${s.Name} - ${rateDisplay}</option>`; 
        });
        selectedService = null;
        document.getElementById("serviceDetails").style.display = "none";
        document.getElementById("orderSummary").style.display = "none";
    }
    
    function showServiceDetails() {
        let serviceId = document.getElementById("serviceSelect").value;
        if (!serviceId) return;
        selectedService = allServices.find(s => s.ServiceId === serviceId);
        
        let rateDisplay = selectedService.Per1k ? `${formatCurrency(selectedService.Rate)} per 1000` : `${formatCurrency(selectedService.Rate)} per unit`;
        let detailsHtml = `
            <div style="background:rgba(0,0,0,0.3); border-radius:20px; padding:15px; margin:15px 0;">
                <h4>${selectedService.Name}</h4>
                <p><strong>Rate:</strong> ${rateDisplay}</p>
                <p><strong>Min Order:</strong> ${selectedService.MinQty} | <strong>Max Order:</strong> ${selectedService.MaxQty}</p>
                <p><strong>Delivery Time:</strong> ${selectedService.DeliveryTime || '1-2 hours'}</p>
                <p>${selectedService.Description || 'High quality service'}</p>
            </div>
        `;
        document.getElementById("serviceDetails").innerHTML = detailsHtml;
        document.getElementById("serviceDetails").style.display = "block";
        
        let dynamicHtml = '';
        if (selectedService.IsAccount === true || selectedService.IsAccount === "TRUE") {
            dynamicHtml = `<div><label>Email Address</label><input type="email" id="emailField" placeholder="Enter email for account"></div>`;
        } else {
            dynamicHtml = `<div><label>Profile/Post Link</label><input type="url" id="linkField" placeholder="Enter your profile/post link"></div>`;
        }
        if (selectedService.CustomComments === true || selectedService.CustomComments === "TRUE") {
            dynamicHtml += `<div><label>Custom Comments</label><textarea id="commentsField" placeholder="Enter comments separated by commas"></textarea></div>`;
        }
        document.getElementById("dynamicFields").innerHTML = dynamicHtml;
        calculateTotal();
    }
    
    function calculateTotal() {
        if (!selectedService) return;
        let qty = parseInt(document.getElementById("quantity").value) || 0;
        let minQty = parseInt(selectedService.MinQty) || 1;
        let maxQty = parseInt(selectedService.MaxQty) || 10000;
        
        if (qty > 0 && qty < minQty) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Minimum quantity is ${minQty}`, true);
            return;
        }
        if (qty > maxQty) {
            document.getElementById("orderSummary").style.display = "none";
            showToast(`Maximum quantity is ${maxQty}`, true);
            return;
        }
        if (qty === 0) {
            document.getElementById("orderSummary").style.display = "none";
            return;
        }
        
        let totalPKR;
        let pricePerUnitPKR;
        if (selectedService.Per1k === true || selectedService.Per1k === "TRUE") {
            pricePerUnitPKR = selectedService.Rate / 1000;
            totalPKR = pricePerUnitPKR * qty;
        } else {
            pricePerUnitPKR = selectedService.Rate;
            totalPKR = selectedService.Rate * qty;
        }
        
        document.getElementById("servicePrice").innerHTML = formatCurrency(pricePerUnitPKR);
        document.getElementById("totalAmount").innerHTML = formatCurrency(totalPKR);
        document.getElementById("orderSummary").style.display = "block";
        selectedService.calculatedTotal = totalPKR;
    }
    
    async function placeOrder() {
        if (!selectedService) { showToast("Select a service first", true); return; }
        let qty = parseInt(document.getElementById("quantity").value);
        if (!qty || qty < selectedService.MinQty) { showToast(`Minimum quantity: ${selectedService.MinQty}`, true); return; }
        if (currentUser.wallet < selectedService.calculatedTotal) { showToast(`Insufficient balance! Need ${formatCurrency(selectedService.calculatedTotal)}`, true); return; }
        
        let extraFields = {};
        if (document.getElementById("emailField")) extraFields.email = document.getElementById("emailField").value;
        if (document.getElementById("linkField")) extraFields.link = document.getElementById("linkField").value;
        if (document.getElementById("commentsField")) extraFields.comments = document.getElementById("commentsField").value;
        
        let res = await apiCall("createOrder", { serviceId: selectedService.ServiceId, quantity: qty, totalAmount: selectedService.calculatedTotal, extraFields });
        if (res.success) { 
            document.getElementById("successMessage").innerHTML = `<strong>Order ID:</strong> ${res.orderId}<br>Service: ${selectedService.Name}<br>Quantity: ${qty}<br>Amount: ${formatCurrency(selectedService.calculatedTotal)}`; 
            document.getElementById("successModal").style.display = "block"; 
        } else showToast(res.error, true);
    }
    
    async function renderServices() { 
        await loadServices();
        let html = `<div class="glass-card"><div class="platform-icons" id="servicePlatformIcons" style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px;"><div class="platform-icon-item active" data-platform="all" style="background:#2b6ef0; border-radius:50px; padding:10px 18px; cursor:pointer;"><i class="fas fa-th-large"></i><span>All</span></div>${platforms.map(p => `<div class="platform-icon-item" data-platform="${p.name}" style="background:rgba(30,41,59,0.6); border-radius:50px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:8px;"><i class="${p.icon}" style="color:${p.color}"></i><span>${p.name}</span></div>`).join('')}</div><input id="searchInput" placeholder="🔍 Search services..."></div><div id="servicesGrid" class="service-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:20px; margin-top:20px;"></div>`;
        document.getElementById("pageContent").innerHTML = html;
        document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(el => el.addEventListener('click', () => { document.querySelectorAll('#servicePlatformIcons .platform-icon-item').forEach(i => i.style.background = 'rgba(30,41,59,0.6)'); el.style.background = '#2b6ef0'; filterServices(); }));
        document.getElementById("searchInput").addEventListener("input", filterServices);
        filterServices();
    }
    
    function filterServices() {
        let platform = document.querySelector('#servicePlatformIcons .platform-icon-item[style*="#2b6ef0"]')?.dataset.platform || 'all';
        let search = document.getElementById("searchInput")?.value.toLowerCase() || "";
        let filtered = allServices.filter(s => (platform === 'all' || s.Platform === platform) && (s.Name.toLowerCase().includes(search) || s.ServiceId.includes(search)));
        document.getElementById("servicesGrid").innerHTML = filtered.map(s => {
            let rateDisplay = s.Per1k ? `${formatCurrency(s.Rate)} per 1000` : `${formatCurrency(s.Rate)} per unit`;
            return `<div class="glass-card" style="cursor:pointer;" onclick="navigateTo('home'); setTimeout(()=>selectService('${s.Platform}', '${s.ServiceId}'), 100)"><div style="display:flex; align-items:center; gap:10px;"><i class="fab fa-${s.Platform.toLowerCase()}" style="font-size:24px;"></i><strong>${s.Name}</strong></div><hr><p>Rate: ${rateDisplay}</p><p>Min: ${s.MinQty} | Max: ${s.MaxQty}</p><button class="btn" style="margin-top:10px; width:100%;" onclick="event.stopPropagation(); navigateTo('home'); setTimeout(()=>selectService('${s.Platform}', '${s.ServiceId}'), 100)">Order Now</button></div>`;
        }).join('');
    }
    
    function selectService(platform, serviceId) {
        let platformSelect = document.getElementById("platformSelect");
        if(platformSelect) { 
            platformSelect.value = platform; 
            updateServiceDropdown(); 
            setTimeout(() => { 
                document.getElementById("serviceSelect").value = serviceId; 
                showServiceDetails(); 
            }, 100); 
        }
    }
    
    async function renderDashboard() { 
        let stats = await apiCall("userStats"); 
        let orders = await apiCall("getUserOrders"); 
        document.getElementById("pageContent").innerHTML = `<div class="grid-cards" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:20px; margin:25px 0;"><div class="glass-card"><i class="fas fa-wallet fa-2x"></i><br><h3>${formatCurrency(currentUser.wallet)}</h3><p>Balance</p></div><div class="glass-card"><i class="fas fa-shopping-cart fa-2x"></i><br><h3>${stats.totalOrders || 0}</h3><p>Total Orders</p></div><div class="glass-card"><i class="fas fa-clock fa-2x"></i><br><h3>${stats.pendingOrders || 0}</h3><p>Pending Orders</p></div></div><div class="glass-card"><h3>Order History</h3>${orders.orders?.length ? '<div style="overflow-x:auto;"><table style="width:100%"><tr><th>Order ID</th><th>Service</th><th>Qty</th><th>Amount</th><th>Status</th></tr>' + orders.orders.map(o => `<tr><td>${o.id}</td><td>${o.serviceName}</td><td>${o.qty}</td><td>${formatCurrency(o.amount)}</td><td>${o.status}</td></tr>`).join('') + '</table></div>' : '<p>No orders yet</p>'}</div>`;
    }
    
    // ADD FUNDS PAGE WITH PAYMENT METHOD SELECTION
    async function renderAddFunds() {
        await loadPaymentMethods();
        
        let methodsHtml = paymentMethods.filter(m => m.active !== false).map((method, index) => `
            <div class="payment-method-card" data-method-id="${method.id}" data-method-name="${method.name}" data-method-account="${method.account}" data-method-holder="${method.holder}">
                <div style="display:flex; align-items:center; gap:15px;">
                    <i class="${method.icon || 'fas fa-university'}" style="font-size:32px; color:#10b981;"></i>
                    <div style="flex:1">
                        <h3>${method.name}</h3>
                        <p><strong>Account:</strong> ${method.account}</p>
                        <p><strong>Account Holder:</strong> ${method.holder}</p>
                    </div>
                    <div class="selected-check" style="display:none;">
                        <i class="fas fa-check-circle" style="color:#10b981; font-size:24px;"></i>
                    </div>
                </div>
            </div>
        `).join('');
        
        let html = `
            <div class="glass-card">
                <h3><i class="fas fa-university"></i> Add Funds to Wallet</h3>
                <p style="margin:15px 0; color:#94a3b8;">Select a payment method and send the exact amount. After payment, submit proof for verification.</p>
                
                <h4 style="margin:20px 0 10px 0;">Select Payment Method:</h4>
                <div id="paymentMethodsList">
                    ${methodsHtml || '<p>No payment methods available. Please contact admin.</p>'}
                </div>
                
                <button id="sentProofBtn" class="btn btn-success" style="width:100%; margin-top:20px;" disabled>
                    <i class="fas fa-check-circle"></i> I Have Sent Payment
                </button>
                
                <div id="proofFormSection" style="display:none; margin-top:25px; padding-top:20px; border-top:1px solid #2d3a5e;">
                    <h4>Submit Payment Proof</h4>
                    <div class="form-row">
                        <div style="flex:1"><label>Amount (PKR)</label><input type="number" id="amountFund" placeholder="Enter amount you sent"></div>
                        <div style="flex:1"><label>Transaction ID</label><input id="transId" placeholder="Transaction/Reference ID"></div>
                    </div>
                    <div class="form-row">
                        <div style="flex:1"><label>Your Email</label><input id="fundEmail" placeholder="Email for confirmation" value="${currentUser?.gmail || ''}"></div>
                    </div>
                    <div class="form-row">
                        <div style="flex:1"><label>Screenshot (Payment Proof)</label><input type="file" id="screenshot" accept="image/*"><small style="color:#94a3b8;">Upload screenshot of transaction</small></div>
                    </div>
                    <div class="form-row">
                        <button id="submitProofBtn" class="btn" style="flex:1;"><i class="fas fa-paper-plane"></i> Submit Proof</button>
                        <button id="cancelProofBtn" class="btn btn-secondary" style="flex:1;"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById("pageContent").innerHTML = html;
        
        let selectedMethod = null;
        let sentProofBtn = document.getElementById("sentProofBtn");
        let proofSection = document.getElementById("proofFormSection");
        
        // Add click handlers for payment methods
        document.querySelectorAll('.payment-method-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.payment-method-card').forEach(c => {
                    c.classList.remove('selected');
                    c.querySelector('.selected-check').style.display = 'none';
                });
                card.classList.add('selected');
                card.querySelector('.selected-check').style.display = 'block';
                selectedMethod = {
                    id: card.dataset.methodId,
                    name: card.dataset.methodName,
                    account: card.dataset.methodAccount,
                    holder: card.dataset.methodHolder
                };
                sentProofBtn.disabled = false;
                sentProofBtn.style.opacity = '1';
            });
        });
        
        sentProofBtn.addEventListener('click', () => {
            if (!selectedMethod) {
                showToast("Please select a payment method first", true);
                return;
            }
            proofSection.style.display = 'block';
            sentProofBtn.disabled = true;
        });
        
        document.getElementById("cancelProofBtn")?.addEventListener('click', () => {
            proofSection.style.display = 'none';
            sentProofBtn.disabled = false;
        });
        
        document.getElementById("submitProofBtn")?.addEventListener('click', async () => {
            let amount = document.getElementById("amountFund").value;
            let transId = document.getElementById("transId").value;
            let email = document.getElementById("fundEmail").value;
            let file = document.getElementById("screenshot").files[0];
            
            if (!amount || !transId || !email) {
                showToast("Please fill all fields", true);
                return;
            }
            
            if (!file) {
                showToast("Please upload screenshot", true);
                return;
            }
            
            if (!selectedMethod) {
                showToast("Please select a payment method", true);
                return;
            }
            
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", {
                    amount: amount,
                    transactionId: transId,
                    email: email,
                    screenshotBase64: reader.result,
                    paymentMethod: selectedMethod.name,
                    paymentAccount: selectedMethod.account,
                    paymentHolder: selectedMethod.holder
                });
                showToast(res.message || "Fund request submitted! Admin will review and add funds to your wallet.");
                if (res.success) {
                    proofSection.style.display = 'none';
                    sentProofBtn.disabled = false;
                    document.getElementById("amountFund").value = "";
                    document.getElementById("transId").value = "";
                    document.getElementById("screenshot").value = "";
                    selectedMethod = null;
                    document.querySelectorAll('.payment-method-card').forEach(c => {
                        c.classList.remove('selected');
                        c.querySelector('.selected-check').style.display = 'none';
                    });
                }
            };
            reader.readAsDataURL(file);
        });
    }
    
    async function renderRecommendations() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Share Your Experience</h3><input id="recEmail" placeholder="Email"><input id="recWhatsapp" placeholder="WhatsApp"><input id="recPhone" placeholder="Phone"><textarea id="recText" placeholder="Your Recommendation" rows="4"></textarea><button id="submitRec" class="btn">Submit Recommendation</button></div>`;
        document.getElementById("submitRec").onclick = async () => { let res = await apiCall("submitRecommendation", { email: document.getElementById("recEmail").value, whatsapp: document.getElementById("recWhatsapp").value, phone: document.getElementById("recPhone").value, text: document.getElementById("recText").value }); showToast(res.message); };
    }
    
    async function renderJoinUs() {
        await loadJoinApplication();
        
        let statusHtml = '';
        let applicationFormHtml = '';
        let attendanceFormHtml = '';
        let jobsFormHtml = '';
        let historyHtml = '';
        
        const hasApplied = joinApplication && joinApplication.requestId;
        let applicationStatus = joinApplication?.status || 'none';
        const normalizedStatus = applicationStatus.toLowerCase();
        
        if (!hasApplied || normalizedStatus === 'none') {
            applicationFormHtml = `
                <h3>📝 Application Form</h3>
                <div class="form-row"><input id="appName" placeholder="Full Name" value="${currentUser?.fullName || ''}"><input id="appUsername" placeholder="Username" value="${currentUser?.username || ''}"></div>
                <div class="form-row"><input id="appPhone" placeholder="Phone Number"><input id="appWhatsapp" placeholder="WhatsApp Number"></div>
                <div class="form-row"><input id="appEmail" placeholder="Email" value="${currentUser?.gmail || ''}"><select id="appSalaryType"><option>Commission Based</option><option>Salary Based</option></select></div>
                <div class="form-row"><select id="appHours"><option>4 hours</option><option>5 hours</option><option>6 hours</option><option>Custom</option></select><select id="appShift"><option>Day</option><option>Night</option></select></div>
                <textarea id="appAbout" placeholder="About Yourself (Experience, Skills, Why you want to join?)" rows="4"></textarea>
                <input type="file" id="appPhoto" accept="image/*">
                <button id="submitApplication" class="btn btn-success">Submit Application</button>
            `;
        } else if (normalizedStatus === 'pending') {
            statusHtml = `<div class="info-note"><i class="fas fa-clock"></i> <strong>Application Status: Pending Review</strong><br>Your application has been submitted and is being reviewed by admin.</div>`;
        } else if (normalizedStatus === 'approved') {
            statusHtml = `<div class="success-note"><i class="fas fa-check-circle"></i> <strong>Application Approved!</strong><br>Salary: ${joinApplication.salary ? formatCurrency(parseFloat(joinApplication.salary)) : 'To be set by admin'} per month<br>Welcome to the team!</div>`;
            
            attendanceFormHtml = `
                <h3>📋 Daily Attendance</h3>
                <div class="form-row"><input id="attName" placeholder="Full Name" value="${currentUser?.fullName || ''}"><input id="attEmail" placeholder="Email" value="${currentUser?.gmail || ''}"></div>
                <div class="form-row"><input id="attPhone" placeholder="Contact Number"><input type="time" id="attLoginTime" placeholder="Login Time"></div>
                <div class="form-row"><input type="number" id="attWorkingHours" placeholder="Working Hours"><input type="time" id="attLogoutTime" placeholder="Logout Time"></div>
                <textarea id="attWorkDetail" placeholder="Work Detail" rows="3"></textarea>
                <button id="submitAttendance" class="btn btn-success">✅ Mark Attendance</button>
            `;
            
            jobsFormHtml = `
                <h3>💼 Job Details</h3>
                <div class="form-row"><input id="jobName" placeholder="Job/Service Name"><input id="jobOrderId" placeholder="Order ID"></div>
                <div class="form-row"><input id="jobPlatform" placeholder="Platform"><input id="jobAmount" placeholder="Amount Spent (PKR)" type="number"></div>
                <textarea id="jobFullDetails" placeholder="Full Details" rows="3"></textarea>
                <button id="submitJob" class="btn btn-success">📌 Submit Job</button>
            `;
            
            historyHtml = `<h3>📜 My History</h3><div id="historyData">Loading...</div>`;
        } else if (normalizedStatus === 'rejected') {
            statusHtml = `<div class="info-note"><i class="fas fa-times-circle"></i> <strong>Application Status: Not Selected</strong><br>Thank you for your interest.</div>`;
        }
        
        let defaultTab = normalizedStatus === 'approved' ? 'attendance' : 'application';
        
        let mainTabsHtml = `
            <div class="join-main-tabs" style="display:flex; gap:10px; margin:20px 0; flex-wrap:wrap;">
                <button class="join-main-tab-btn ${defaultTab === 'application' ? 'active' : ''}" data-join-tab="application" style="background:#1e293b; padding:12px 24px; border-radius:40px; cursor:pointer;">📝 Application Form</button>
                <button class="join-main-tab-btn ${defaultTab === 'attendance' ? 'active' : ''}" data-join-tab="attendance" style="background:#1e293b; padding:12px 24px; border-radius:40px; cursor:pointer;">📋 Daily Attendance</button>
                <button class="join-main-tab-btn" data-join-tab="jobs" style="background:#1e293b; padding:12px 24px; border-radius:40px; cursor:pointer;">💼 Daily Job Detail</button>
                <button class="join-main-tab-btn" data-join-tab="history" style="background:#1e293b; padding:12px 24px; border-radius:40px; cursor:pointer;">📜 History</button>
            </div>
            <div id="applicationTab" class="join-tab-content ${defaultTab === 'application' ? 'active' : ''}" style="${defaultTab !== 'application' ? 'display:none;' : ''}">${applicationFormHtml || '<p>Status: ' + applicationStatus + '</p>'}</div>
            <div id="attendanceTab" class="join-tab-content ${defaultTab === 'attendance' ? 'active' : ''}" style="${defaultTab !== 'attendance' ? 'display:none;' : ''}">${attendanceFormHtml || '<p>Attendance section available after approval.</p>'}</div>
            <div id="jobsTab" class="join-tab-content">${jobsFormHtml || '<p>Job section available after approval.</p>'}</div>
            <div id="historyTab" class="join-tab-content">${historyHtml || '<p>History section available after approval.</p>'}</div>
        `;
        
        let html = `<div class="glass-card"><h2><i class="fas fa-user-plus"></i> Join Us & Earn</h2>${statusHtml}${mainTabsHtml}</div>`;
        document.getElementById("pageContent").innerHTML = html;
        
        document.querySelectorAll('.join-main-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.join-main-tab-btn').forEach(b => b.style.background = '#1e293b');
                document.querySelectorAll('.join-tab-content').forEach(c => c.style.display = 'none');
                btn.style.background = '#2b6ef0';
                document.getElementById(btn.dataset.joinTab + 'Tab').style.display = 'block';
            });
        });
        
        if (document.getElementById("submitApplication") && !hasApplied) {
            document.getElementById("submitApplication").onclick = async () => {
                let file = document.getElementById("appPhoto").files[0];
                let reader = new FileReader();
                reader.onload = async () => {
                    let res = await apiCall("submitJoinRequest", {
                        name: document.getElementById("appName").value, username: document.getElementById("appUsername").value,
                        phone: document.getElementById("appPhone").value, whatsapp: document.getElementById("appWhatsapp").value,
                        email: document.getElementById("appEmail").value, salaryType: document.getElementById("appSalaryType").value,
                        hours: document.getElementById("appHours").value, shift: document.getElementById("appShift").value,
                        about: document.getElementById("appAbout").value, photo: reader.result
                    });
                    showToast(res.message);
                    if(res.success) setTimeout(() => renderJoinUs(), 1500);
                };
                if(file) reader.readAsDataURL(file);
                else showToast("Please upload photo", true);
            };
        }
        
        if (document.getElementById("submitAttendance")) {
            document.getElementById("submitAttendance").onclick = async () => {
                let res = await apiCall("submitAttendance", {
                    name: document.getElementById("attName").value, email: document.getElementById("attEmail").value,
                    phone: document.getElementById("attPhone").value, loginTime: document.getElementById("attLoginTime").value,
                    workingHours: document.getElementById("attWorkingHours").value, logoutTime: document.getElementById("attLogoutTime").value,
                    workDetail: document.getElementById("attWorkDetail").value
                });
                showToast(res.message);
            };
        }
        
        if (document.getElementById("submitJob")) {
            document.getElementById("submitJob").onclick = async () => {
                let res = await apiCall("submitJobDetail", {
                    jobName: document.getElementById("jobName").value, orderId: document.getElementById("jobOrderId").value,
                    platform: document.getElementById("jobPlatform").value, amount: document.getElementById("jobAmount").value,
                    details: document.getElementById("jobFullDetails").value
                });
                showToast(res.message);
            };
        }
        
        if (document.getElementById("historyData") && normalizedStatus === 'approved') {
            let attendanceHistory = await apiCall("getMyAttendance");
            let jobsHistory = await apiCall("getMyJobs");
            document.getElementById("historyData").innerHTML = `
                <h4>Attendance Records</h4>${attendanceHistory.attendance?.length ? '<table style="width:100%"><tr><th>Date</th><th>Login Time</th><th>Logout Time</th><th>Hours</th></tr>' + attendanceHistory.attendance.map(a => `<tr><td>${a.date || a.Date}</td><td>${a.loginTime || a.LoginTime}</td><td>${a.logoutTime || a.LogoutTime}</td><td>${a.workingHours || a.WorkingHours}</td></tr>`).join('') + '</table>' : '<p>No records</p>'}
                <h4>Job Records</h4>${jobsHistory.jobs?.length ? '<table style="width:100%"><tr><th>Date</th><th>Job Name</th><th>Order ID</th><th>Amount</th></tr>' + jobsHistory.jobs.map(j => `<tr><td>${j.date || j.Date}</td><td>${j.jobName || j.JobName}</td><td>${j.orderId || j.OrderId || '-'}</td><td>${j.amount || j.Amount}</td></tr>`).join('') + '</table>' : '<p>No records</p>'}
            `;
        }
    }
    
    async function renderHelp() { 
        document.getElementById("pageContent").innerHTML = `<div class="glass-card"><h3>Need Help?</h3><input id="helpEmail" placeholder="Email"><input id="helpPhone" placeholder="Phone/WhatsApp"><textarea id="helpMsg" placeholder="Your Message" rows="4"></textarea><button id="submitHelp" class="btn">Send Message</button></div>`;
        document.getElementById("submitHelp").onclick = async () => { let res = await apiCall("submitHelp", { email: document.getElementById("helpEmail").value, phone: document.getElementById("helpPhone").value, message: document.getElementById("helpMsg").value }); showToast(res.message); };
    }
    
    function navigate(page) { 
        if(page === "home") renderHome(); 
        else if(page === "dashboard") renderDashboard(); 
        else if(page === "services") renderServices(); 
        else if(page === "addfunds") renderAddFunds(); 
        else if(page === "profile") renderProfile();
        else if(page === "recommendations") renderRecommendations(); 
        else if(page === "joinus") renderJoinUs(); 
        else if(page === "help") renderHelp(); 
    }
    
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => { e.preventDefault(); navigate(el.getAttribute("data-page")); document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; }));
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate("home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => { if(e.target.dataset.curr) { activeCurrency = e.target.dataset.curr; updateCurrencyDisplay(); } });
    
    window.navigateTo = navigate;
    window.selectService = selectService;
    
    (async function init() { if(await checkAuth()) { await loadServices(); navigate("home"); } })();
</script>
</body>
</html>
