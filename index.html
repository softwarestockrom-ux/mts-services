<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MTS SMM Services - Premium Social Media Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0b1120 0%, #111827 100%); color: #eef2ff; min-height: 100vh; }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(12px); border-radius: 28px; border: 1px solid rgba(72, 187, 255, 0.2); padding: 24px; transition: all 0.2s ease; margin-bottom: 20px; }
        .glass-card:hover { border-color: rgba(0, 200, 255, 0.4); }
        button, .btn { background: linear-gradient(90deg, #2b6ef0, #1a4fc1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover, .btn:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-success { background: linear-gradient(90deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(90deg, #dc2626, #b91c1c); }
        .btn-secondary { background: linear-gradient(90deg, #475569, #334155); }
        .btn-warning { background: linear-gradient(90deg, #f59e0b, #d97706); }
        input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid #2d3a5e; padding: 12px 16px; border-radius: 14px; color: white; width: 100%; outline: none; margin: 6px 0; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
        select option { background: #1e293b; color: white; }
        label { font-size: 13px; color: #94a3b8; display: block; margin-top: 10px; margin-bottom: 2px; font-weight: 500; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8, 12, 25, 0.97); backdrop-filter: blur(20px); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; }
        .main-content { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.3); border-radius: 60px; margin-bottom: 25px; }
        .platform-icons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; margin-bottom: 20px; padding: 4px; }
        .platform-icon-item { background: rgba(30, 41, 59, 0.7); border-radius: 50px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
        .platform-icon-item:hover { background: rgba(43,110,240,0.5); transform: translateY(-2px); }
        .platform-icon-item.active { background: #2b6ef0; border-color: #60a5fa; transform: translateY(-2px); }
        .currency-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .currency-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s; color: white; font-size: 13px; }
        .currency-btn.active { background: #2b6ef0; border-color: #60a5fa; }

        /* Order Form Specific */
        .order-section { margin-bottom: 16px; }
        .section-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .section-label i { color: #3b82f6; }

        .categories-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 12px; }
        .cat-chip { background: rgba(30,41,59,0.8); border: 1px solid #334155; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-size: 13px; transition: all 0.2s; color: #cbd5e1; }
        .cat-chip:hover { background: rgba(43,110,240,0.4); border-color: #3b82f6; }
        .cat-chip.active { background: #2b6ef0; border-color: #60a5fa; color: white; font-weight: 600; }

        /* Service description box */
        .service-desc-box { background: rgba(0,0,0,0.3); border: 1px solid #2d3a5e; border-radius: 16px; padding: 16px; margin: 10px 0; font-size: 14px; line-height: 1.7; color: #cbd5e1; }
        .service-desc-box .desc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .service-desc-box .desc-item { background: rgba(43,110,240,0.08); border-radius: 10px; padding: 10px 14px; }
        .service-desc-box .desc-item .di-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
        .service-desc-box .desc-item .di-val { font-size: 15px; font-weight: 600; color: #e2e8f0; margin-top: 2px; }
        .rate-highlight { color: #34d399; font-weight: 700; font-size: 16px; }

        /* Order Summary */
        .order-summary { background: linear-gradient(135deg, rgba(43,110,240,0.12), rgba(16,185,129,0.08)); border: 1px solid rgba(43,110,240,0.3); border-radius: 20px; padding: 20px; margin: 14px 0; }
        .order-summary h4 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .summary-row:last-child { border-bottom: none; padding-top: 12px; margin-top: 4px; }
        .summary-row .sr-label { color: #94a3b8; }
        .summary-row .sr-val { color: #e2e8f0; font-weight: 500; }
        .summary-total { font-size: 20px !important; color: #34d399 !important; font-weight: 700 !important; }

        /* Country dropdown */
        .country-select-wrap { position: relative; }

        /* Payment method cards */
        .payment-methods { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin: 16px 0; }
        .payment-card { background: rgba(30,41,59,0.6); border: 2px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .payment-card:hover { border-color: #3b82f6; transform: translateY(-3px); }
        .payment-card.selected { border-color: #2b6ef0; background: rgba(43,110,240,0.15); }
        .payment-card i { font-size: 28px; margin-bottom: 10px; display: block; }
        .payment-card .pm-name { font-weight: 700; font-size: 15px; }
        .payment-card .pm-num { font-size: 13px; color: #94a3b8; margin-top: 4px; }

        .payment-detail-box { background: rgba(0,0,0,0.35); border: 1px solid #2d3a5e; border-radius: 16px; padding: 18px; margin: 12px 0; }
        .detail-row { display: flex; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .detail-row:last-child { border-bottom: none; }
        .detail-row i { font-size: 18px; width: 24px; text-align: center; }
        .detail-row .dr-info { flex: 1; }
        .detail-row .dr-label { font-size: 11px; color: #64748b; text-transform: uppercase; }
        .detail-row .dr-val { font-weight: 600; font-size: 15px; }
        .copy-btn { background: rgba(43,110,240,0.2); border: 1px solid #3b82f6; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: 0.2s; color: #60a5fa; }
        .copy-btn:hover { background: rgba(43,110,240,0.4); }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172ae6; backdrop-filter: blur(20px); border-radius: 32px; padding: 30px; width: 92%; max-width: 480px; z-index: 1100; display: none; border: 1px solid rgba(0,200,255,0.4); max-height: 90vh; overflow-y: auto; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 40px; z-index: 9999; border-left: 4px solid #2b6ef0; max-width: 350px; font-size: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .form-row { display: flex; gap: 14px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 140px; }
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .service-card { cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; }
        .loading-spinner { text-align: center; padding: 50px; }
        .loading-spinner i { font-size: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-note { background: rgba(245, 158, 11, 0.15); border-left: 4px solid #f59e0b; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 14px; }
        .success-note { background: rgba(16, 185, 129, 0.15); border-left: 4px solid #10b981; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 14px; }
        .join-main-tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .join-main-tab-btn { background: #1e293b; padding: 10px 20px; border-radius: 40px; cursor: pointer; transition: all 0.2s; font-weight: 600; font-size: 14px; }
        .join-main-tab-btn.active { background: #2b6ef0; }
        .join-tab-content { display: none; }
        .join-tab-content.active { display: block; }
        .category-selector { background: rgba(30, 41, 59, 0.4); border-radius: 20px; padding: 15px; margin: 15px 0; }
        .history-table { overflow-x: auto; margin-top: 15px; }
        .history-table table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 10px; text-align: left; border-bottom: 1px solid #2d3a5e; font-size: 13px; }
        .history-table th { background: rgba(43, 110, 240, 0.3); }

        /* Success modal order detail */
        .order-detail-grid { display: grid; gap: 10px; margin: 16px 0; text-align: left; }
        .od-row { display: flex; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.04); border-radius: 12px; font-size: 14px; gap: 10px; }
        .od-row .od-key { color: #94a3b8; flex-shrink: 0; }
        .od-row .od-val { color: #e2e8f0; font-weight: 500; text-align: right; word-break: break-all; }

        @media (max-width: 768px) { .form-row { flex-direction: column; } .service-desc-box .desc-grid { grid-template-columns: 1fr; } .payment-methods { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="sidebar" class="sidebar">
    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center;">
        <h3 style="display:flex;align-items:center;gap:8px;"><i class="fas fa-chart-line" style="color:#3b82f6"></i> MTS SMM</h3>
        <i class="fas fa-times" id="closeSidebar" style="cursor:pointer; font-size:18px;"></i>
    </div>
    <div class="sidebar-menu" style="display: flex; flex-direction: column; gap: 5px;">
        <a href="#" data-page="home" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;color:#cbd5e1;text-decoration:none;transition:0.2s;" onmouseover="this.style.background='rgba(43,110,240,0.2)'" onmouseout="this.style.background='transparent'"><i class="fas fa-home" style="color:#3b82f6;width:18px;"></i> Home</a>
        <a href="#" data-page="dashboard" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;color:#cbd5e1;text-decoration:none;transition:0.2s;" onmouseover="this.style.background='rgba(43,110,240,0.2)'" onmouseout="this.style.background='transparent'"><i class="fas fa-tachometer-alt" style="color:#3b82f6;width:18px;"></i> Dashboard</a>
        <a href="#" data-page="services" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;color:#cbd5e1;text-decoration:none;transition:0.2s;" onmouseover="this.style.background='rgba(43,110,240,0.2)'" onmouseout="this.style.background='transparent'"><i class="fas fa-box" style="color:#3b82f6;width:18px;"></i> Services</a>
        <a href="#" data-page="addfunds" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;color:#cbd5e1;text-decoration:none;transition:0.2s;" onmouseover="this.style.background='rgba(43,110,240,0.2)'" onmouseout="this.style.background='transparent'"><i class="fas fa-wallet" style="color:#3b82f6;width:18px;"></i> Add Funds</a>

        <a href="#" data-page="recommendations" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;color:#cbd5e1;text-decoration:none;transition:0.2s;" onmouseover="this.style.background='rgba(43,110,240,0.2)'" onmouseout="this.style.background='transparent'"><i class="fas fa-star" style="color:#3b82f6;width:18px;"></i> Recommendations</a>

        <div style="margin-top: 20px; padding: 16px; background: rgba(30,41,59,0.5); border-radius: 16px;">
            <label style="color:#64748b; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; display:block;"><i class="fas fa-exchange-alt"></i> Currency</label>
            <div class="currency-btn-group" id="currencyGroup">
                <button class="currency-btn" data-curr="PKR">🇵🇰 PKR</button>
                <button class="currency-btn" data-curr="USD">🇺🇸 USD</button>
                <button class="currency-btn" data-curr="AED">🇦🇪 AED</button>
                <button class="currency-btn" data-curr="SAR">🇸🇦 SAR</button>
                <button class="currency-btn" data-curr="INR">🇮🇳 INR</button>
                <button class="currency-btn" data-curr="EUR">🇪🇺 EUR</button>
            </div>
        </div>
        <button id="logoutBtn" style="background:linear-gradient(90deg,#dc2626,#b91c1c); margin-top:20px; width:100%;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <div id="menuBtn" style="cursor:pointer; padding:6px 10px; border-radius:10px; background:rgba(255,255,255,0.05);"><i class="fas fa-bars"></i></div>
        <div style="font-weight:700; font-size:1.1rem; letter-spacing:0.02em;">⚡ MTS SMM Services</div>
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-sync-alt" id="refreshBtn" style="cursor:pointer; opacity:0.7;"></i>
            <span id="userNameDisplay" style="font-weight:600; font-size:14px;"><i class="fas fa-user-circle"></i> Guest</span>
        </div>
    </div>
    <div id="pageContent"><div class="loading-spinner"><i class="fas fa-spinner"></i><br>Loading...</div></div>
</div>

<!-- Success Modal -->
<div id="successModal" class="modal">
    <div style="text-align:center;">
        <div style="width:70px;height:70px;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i class="fas fa-check" style="font-size:32px;"></i>
        </div>
        <h2 style="font-size:22px;margin-bottom:6px;">Order Placed!</h2>
        <p style="color:#64748b;font-size:14px;margin-bottom:16px;">Your order has been successfully submitted</p>
        <div class="order-detail-grid" id="successOrderDetails"></div>
        <button onclick="closeSuccessModal()" class="btn btn-success" style="width:100%;margin-top:10px;">OK, Got it!</button>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwd4Sh48j--YZYD4ErvlVDS9n5iy2dFdE_bUvIZhNf4vCyy4t2zWtQksX4PKVaQc_bZAA/exec";

    let currentUser = null;
    let activeCurrency = "PKR";
    let exchangeRates = { PKR: 1, USD: 0.0036, AED: 0.0132, SAR: 0.0135, INR: 0.30, EUR: 0.0033 };
    let currencySymbols = { PKR: "Rs", USD: "$", AED: "د.إ", SAR: "﷼", INR: "₹", EUR: "€" };
    let allServices = [];
    let selectedService = null;
    let joinApplication = null;
    let selectedPlatform = "";
    let selectedCategory = "all";

    const COUNTRIES = ["Worldwide","Pakistan","India","United States","United Kingdom","United Arab Emirates","Saudi Arabia","Bangladesh","Nigeria","Indonesia","Philippines","Brazil","Turkey","Egypt","Germany","France","Canada","Australia","Malaysia","Thailand","Vietnam","South Africa","Mexico","Argentina","Kenya","Ethiopia","Ghana","Tanzania","Uganda","Morocco","Algeria","Sudan","Tunisia","Senegal","Côte d'Ivoire","Cameroon","Zambia","Zimbabwe","Rwanda","Sri Lanka","Nepal","Myanmar","Cambodia","Laos","Afghanistan","Iran","Iraq","Syria","Jordan","Lebanon","Kuwait","Qatar","Bahrain","Oman","Yemen","Libya","Somalia","Mozambique","Madagascar","Malawi","Botswana","Namibia","Lesotho","Eswatini","Mauritius","Seychelles","Comoros","Djibouti","Eritrea","Burundi","DRC","Congo","Gabon","CAR","Chad","Niger","Mali","Burkina Faso","Guinea","Sierra Leone","Liberia","Togo","Benin","Gambia","Guinea-Bissau","Cape Verde","Equatorial Guinea","São Tomé and Príncipe"];

    const platforms = [
        { name: "Instagram", icon: "fab fa-instagram", color: "#E4405F", categories: ["Followers","Likes","Views","Comments","Saves","Shares","Story Views","Reels Views"] },
        { name: "TikTok", icon: "fab fa-tiktok", color: "#69C9D0", categories: ["Followers","Likes","Views","Comments","Shares","Live Views"] },
        { name: "Facebook", icon: "fab fa-facebook", color: "#1877F2", categories: ["Page Likes","Post Likes","Views","Followers","Comments","Shares","Group Members"] },
        { name: "YouTube", icon: "fab fa-youtube", color: "#FF0000", categories: ["Subscribers","Likes","Views","Watchtime","Comments","Shares"] },
        { name: "Twitter", icon: "fab fa-twitter", color: "#1DA1F2", categories: ["Followers","Likes","Retweets","Views","Impressions"] },
        { name: "WhatsApp", icon: "fab fa-whatsapp", color: "#25D366", categories: ["Traffic","Channel Members","Status Views"] },
        { name: "Snapchat", icon: "fab fa-snapchat", color: "#FFFC00", categories: ["Views","Followers","Story Views"] },
        { name: "Telegram", icon: "fab fa-telegram", color: "#26A5E4", categories: ["Channel Members","Group Members","Post Views","Reactions"] },
        { name: "LinkedIn", icon: "fab fa-linkedin", color: "#0A66C2", categories: ["Followers","Likes","Views","Connections"] },
        { name: "Pinterest", icon: "fab fa-pinterest", color: "#BD081C", categories: ["Followers","Repins","Likes","Views"] },
        { name: "Discord", icon: "fab fa-discord", color: "#5865F2", categories: ["Server Members","Online Members"] },
        { name: "Twitch", icon: "fab fa-twitch", color: "#9146FF", categories: ["Followers","Live Views","Clip Views"] },
        { name: "Spotify", icon: "fab fa-spotify", color: "#1DB954", categories: ["Followers","Plays","Monthly Listeners"] },
        { name: "Google", icon: "fab fa-google", color: "#4285F4", categories: ["Traffic","Reviews","Map Views"] },
        { name: "Threads", icon: "fas fa-at", color: "#CCCCCC", categories: ["Followers","Likes","Views","Reposts"] },
        { name: "Website Traffic", icon: "fas fa-globe", color: "#3b82f6", categories: ["Traffic","Visitors","Page Views"] },
        { name: "PUBG UC", icon: "fas fa-gamepad", color: "#FFA500", categories: ["UC","Elite Pass","Points"] },
        { name: "Netflix", icon: "fas fa-film", color: "#E50914", categories: ["Premium Accounts"] },
        { name: "Canva", icon: "fas fa-palette", color: "#00C4CC", categories: ["Pro Accounts","Templates"] },
        { name: "ChatGPT", icon: "fas fa-comment-dots", color: "#10A37F", categories: ["Plus Accounts","API Credits"] },
    ];

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-triangle' : 'check-circle'}" style="margin-right:8px;color:${isError?'#dc2626':'#10b981'}"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity='0'; toast.style.transition='0.3s'; setTimeout(()=>toast.remove(), 300); }, 3000);
    }

    function closeSuccessModal() {
        document.getElementById('successModal').style.display = 'none';
        if (currentUser) navigate("home");
    }

    function convertPrice(amountPKR) { return amountPKR * exchangeRates[activeCurrency]; }
    function formatCurrency(amountPKR) {
        let converted = convertPrice(amountPKR);
        let symbol = currencySymbols[activeCurrency];
        if (activeCurrency === 'PKR') return `${symbol} ${converted.toFixed(2)} PKR`;
        return `${symbol} ${converted.toFixed(2)}`;
    }

    function formatRateDisplay(service) {
        if (service.Per1k === true || service.Per1k === "TRUE") {
            let converted = convertPrice(service.Rate);
            let symbol = currencySymbols[activeCurrency];
            let amt = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${amt} / 1000`;
        } else {
            let converted = convertPrice(service.Rate);
            let symbol = currencySymbols[activeCurrency];
            let amt = activeCurrency === 'PKR' ? `${symbol} ${converted.toFixed(2)} PKR` : `${symbol} ${converted.toFixed(2)}`;
            return `${amt} / unit`;
        }
    }

    async function apiCall(action, data = {}) {
        const payload = { action, ...data, sessionToken: localStorage.getItem("mts_token") };
        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));
        try {
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: formData });
            return JSON.parse(await res.text());
        } catch(err) {
            console.error("API Error:", err);
            return { success: false, error: err.message };
        }
    }

            currentUser = res.user;
            document.getElementById("userNameDisplay").innerHTML = `<i class="fas fa-user-circle" style="color:#3b82f6"></i> ${currentUser.fullName?.split(" ")[0] || currentUser.username}`;
            await loadJoinApplication();

        } else {
            localStorage.removeItem("mts_token");
            currentUser = null;
            showAuthScreen();
            return false;
        }
    }

    function calculateTotal() {
        if (!selectedService) return;
        let qty = parseInt(document.getElementById("quantity").value) || 0;
        let minQty = parseInt(selectedService.MinQty) || 1;
        let maxQty = parseInt(selectedService.MaxQty) || 1000000;

        if (qty <= 0) { document.getElementById("orderSummary").style.display = "none"; return; }
        if (qty < minQty) { showToast(`Minimum quantity is ${minQty}`, true); document.getElementById("orderSummary").style.display = "none"; return; }
        if (qty > maxQty) { showToast(`Maximum quantity is ${maxQty}`, true); document.getElementById("orderSummary").style.display = "none"; return; }

        let isPer1k = selectedService.Per1k === true || selectedService.Per1k === "TRUE";
        let totalPKR;
        if (isPer1k) {
            totalPKR = (selectedService.Rate / 1000) * qty;
        } else {
            totalPKR = selectedService.Rate * qty;
        }
        selectedService.calculatedTotal = totalPKR;

        // Update summary fields
        document.getElementById("sumPlatform").textContent = selectedPlatform;
        document.getElementById("sumService").textContent = selectedService.Name;
        document.getElementById("sumServiceId").textContent = selectedService.ServiceId;
        document.getElementById("sumQty").textContent = qty.toLocaleString();
        document.getElementById("sumRate").textContent = formatRateDisplay(selectedService);
        document.getElementById("sumTotal").textContent = formatCurrency(totalPKR);
        document.getElementById("orderSummary").style.display = "block";
    }

    async function placeOrder() {
        if (!selectedService) { showToast("Please select a service first", true); return; }
        let qty = parseInt(document.getElementById("quantity").value);
        if (!qty || qty < parseInt(selectedService.MinQty)) { showToast(`Minimum quantity is ${selectedService.MinQty}`, true); return; }
        if (qty > parseInt(selectedService.MaxQty)) { showToast(`Maximum quantity is ${selectedService.MaxQty}`, true); return; }
        if ((currentUser?.wallet || 0) < selectedService.calculatedTotal) { showToast(`Insufficient balance! Need ${formatCurrency(selectedService.calculatedTotal)}`, true); return; }

        let extraFields = {};
        let linkVal = document.getElementById("linkField")?.value || "";
        let emailVal = document.getElementById("emailField")?.value || "";
        let commentsVal = document.getElementById("commentsField")?.value || "";
        let countryVal = document.getElementById("countrySelect")?.value || "";
        if (emailVal) extraFields.email = emailVal;
        if (linkVal) extraFields.link = linkVal;
        if (commentsVal) extraFields.comments = commentsVal;
        if (countryVal) extraFields.targetCountry = countryVal;

        showToast("Placing order...");
        let res = await apiCall("createOrder", { serviceId: selectedService.ServiceId, quantity: qty, totalAmount: selectedService.calculatedTotal, extraFields });

        if (res.success) {
            // Deduct from local wallet
            if (currentUser) currentUser.wallet = (currentUser.wallet || 0) - selectedService.calculatedTotal;

            // Build success modal detail
            let detailRows = [
                { k: "Order ID", v: res.orderId || "—" },
                { k: "Platform", v: selectedPlatform },
                { k: "Service", v: selectedService.Name },
                { k: "Service ID", v: selectedService.ServiceId },
                { k: "Quantity", v: qty.toLocaleString() },
                { k: "Amount Spent", v: formatCurrency(selectedService.calculatedTotal) },
            ];
            if (linkVal) detailRows.push({ k: "Link", v: linkVal });
            if (emailVal) detailRows.push({ k: "Email", v: emailVal });
            if (countryVal) detailRows.push({ k: "Target Country", v: countryVal });

            document.getElementById("successOrderDetails").innerHTML = detailRows.map(r =>
                `<div class="od-row"><span class="od-key">${r.k}</span><span class="od-val">${r.v}</span></div>`
            ).join('');
            document.getElementById("successModal").style.display = "block";
        } else {
            showToast(res.error || "Order failed", true);
        }
    }

    async function renderAddFunds() {

            { id: "sadapay", name: "Sadapay", icon: "fas fa-credit-card", color: "#FF4B4B", number: "03198595421", title: "Muhammad Ramzan Ul Sami" },
        ];

        document.getElementById("pageContent").innerHTML = `
            <div class="glass-card">
                <h3 style="margin-bottom:6px;"><i class="fas fa-university" style="color:#3b82f6;"></i> Add Funds</h3>
                <p style="color:#64748b;font-size:14px;margin-bottom:20px;">Select your payment method to view account details</p>

                <!-- Step 1: Choose payment method -->
                <div class="section-label"><i class="fas fa-wallet"></i> Step 1 — Choose Payment Method</div>
                <div class="payment-methods">
                    ${paymentMethods.map(pm => `
                        <div class="payment-card" data-pm="${pm.id}" onclick="selectPaymentMethod('${pm.id}')">
                            <i class="${pm.icon}" style="color:${pm.color};"></i>
                            <div class="pm-name">${pm.name}</div>
                            <div class="pm-num">${pm.number}</div>
                        </div>
                    `).join('')}
                </div>

                <!-- Step 2: Account Details (shown after selection) -->
                <div id="paymentDetailBox" style="display:none;">
                    <div class="section-label"><i class="fas fa-info-circle"></i> Step 2 — Send Payment to This Account</div>
                    <div class="payment-detail-box" id="paymentDetailContent"></div>
                    <div class="info-note"><i class="fas fa-exclamation-triangle"></i> <strong>Important:</strong> Please take a screenshot of your payment confirmation before submitting proof.</div>

                    <!-- Step 3: Submit proof -->
                    <div class="section-label" style="margin-top:16px;"><i class="fas fa-receipt"></i> Step 3 — Submit Payment Proof</div>
                    <div class="form-row">
                        <div><label>Amount Sent (PKR)</label><input id="amountFund" placeholder="e.g. 500" type="number" min="1"></div>
                        <div><label>Transaction ID</label><input id="transId" placeholder="Transaction/Reference ID"></div>
                    </div>
                    <label>Your Email</label>
                    <input id="fundEmail" placeholder="Your registered email" value="${currentUser?.gmail || ''}">
                    <label>Payment Screenshot</label>
                    <input type="file" id="screenshot" accept="image/*" style="border-radius:10px;padding:10px;">
                    <button id="submitProof" class="btn btn-success" style="width:100%;margin-top:16px;"><i class="fas fa-paper-plane"></i> Submit Proof</button>
                </div>
            </div>
        `;

        window.paymentMethodsData = paymentMethods;

        document.getElementById("submitProof")?.addEventListener("click", async () => {
            let file = document.getElementById("screenshot").files[0];
            let amount = document.getElementById("amountFund").value;
            let transId = document.getElementById("transId").value;
            let email = document.getElementById("fundEmail").value;
            if (!file) { showToast("Please upload payment screenshot", true); return; }
            if (!amount || amount <= 0) { showToast("Please enter valid amount", true); return; }
            if (!transId) { showToast("Please enter transaction ID", true); return; }
            showToast("Submitting proof...");
            let reader = new FileReader();
            reader.onload = async () => {
                let res = await apiCall("addFundsRequest", { amount, transactionId: transId, email, screenshotBase64: reader.result, paymentMethod: window.selectedPaymentMethod || "" });
                showToast(res.message || (res.success ? "Submitted successfully!" : "Submission failed"), !res.success);
                if (res.success) { document.getElementById("amountFund").value = ""; document.getElementById("transId").value = ""; document.getElementById("screenshot").value = ""; }
            };
            reader.readAsDataURL(file);
        });
    }

    window.selectPaymentMethod = function(pmId) {
        window.selectedPaymentMethod = pmId;
        document.querySelectorAll('.payment-card').forEach(c => c.classList.toggle('selected', c.dataset.pm === pmId));
        let pm = window.paymentMethodsData?.find(p => p.id === pmId);
        if (!pm) return;
        document.getElementById("paymentDetailContent").innerHTML = `
            <div class="detail-row">
                <i class="${pm.icon}" style="color:${pm.color};"></i>
                <div class="dr-info"><div class="dr-label">Payment Method</div><div class="dr-val">${pm.name}</div></div>
            </div>
            <div class="detail-row">
                <i class="fas fa-phone" style="color:#3b82f6;"></i>
                <div class="dr-info"><div class="dr-label">Account Number</div><div class="dr-val">${pm.number}</div></div>
                <button class="copy-btn" onclick="navigator.clipboard.writeText('${pm.number}');showToast('Number copied!')"><i class="fas fa-copy"></i> Copy</button>
            </div>
            <div class="detail-row">
                <i class="fas fa-user" style="color:#3b82f6;"></i>
                <div class="dr-info"><div class="dr-label">Account Name</div><div class="dr-val">${pm.title}</div></div>
            </div>
        `;
        document.getElementById("paymentDetailBox").style.display = "block";
    };

    // ============ JOIN US ============
    async function renderJoinUs() {
        window.currentPage = "joinus";
        await loadJoinApplication();

        let appStatus = (joinApplication?.status || 'none').toLowerCase();
        let hasApplied = joinApplication && joinApplication.requestId;

        let applicationFormHtml = '', attendanceFormHtml = '', jobsFormHtml = '', historyHtml = '', statusHtml = '';

        if (!hasApplied || appStatus === 'none') {
            applicationFormHtml = `
                <h3 style="margin-bottom:16px;">📝 Application Form</h3>
                <div class="form-row"><div><label>Full Name</label><input id="appName" value="${currentUser?.fullName || ''}"></div><div><label>Username</label><input id="appUsername" value="${currentUser?.username || ''}"></div></div>
                <div class="form-row"><div><label>Phone</label><input id="appPhone" placeholder="Phone number"></div><div><label>WhatsApp</label><input id="appWhatsapp" placeholder="WhatsApp number"></div></div>
                <div class="form-row"><div><label>Email</label><input id="appEmail" value="${currentUser?.gmail || ''}"></div><div><label>Salary Type</label><select id="appSalaryType"><option>Commission Based</option><option>Salary Based</option></select></div></div>
                <div class="form-row"><div><label>Hours Per Day</label><select id="appHours"><option>4 hours</option><option>5 hours</option><option>6 hours</option><option>Custom</option></select></div><div><label>Shift</label><select id="appShift"><option>Day</option><option>Night</option></select></div></div>
                <label>About Yourself</label><textarea id="appAbout" placeholder="Your experience, skills, and why you want to join..." rows="4"></textarea>
                <label>Your Photo</label><input type="file" id="appPhoto" accept="image/*" style="border-radius:10px;padding:10px;">
                <button id="submitApplication" class="btn btn-success" style="margin-top:14px;width:100%;"><i class="fas fa-paper-plane"></i> Submit Application</button>
            `;
        } else if (appStatus === 'pending') {
            statusHtml = `<div class="info-note"><i class="fas fa-clock"></i> <strong>Status: Pending Review</strong><br>Your application is being reviewed by admin.</div>`;
        } else if (appStatus === 'approved') {
            statusHtml = `<div class="success-note"><i class="fas fa-check-circle"></i> <strong>Application Approved!</strong><br>Salary: ${joinApplication.salary ? formatCurrency(parseFloat(joinApplication.salary)) : 'Set by admin'} / month</div>`;
            attendanceFormHtml = `
                <h3 style="margin-bottom:16px;">📋 Daily Attendance</h3>
                <div class="form-row"><div><label>Full Name</label><input id="attName" value="${currentUser?.fullName || ''}"></div><div><label>Email</label><input id="attEmail" value="${currentUser?.gmail || ''}"></div></div>
                <div class="form-row"><div><label>Login Time</label><input type="time" id="attLoginTime"></div><div><label>Logout Time</label><input type="time" id="attLogoutTime"></div></div>
                <div class="form-row"><div><label>Working Hours</label><input type="number" id="attWorkingHours" placeholder="e.g. 5"></div><div><label>Phone</label><input id="attPhone" placeholder="Contact number"></div></div>
                <div class="form-row"><div><label>Work Type</label><select id="attWorkType"><option>Sharing Posts</option><option>Designed Posts</option><option>Platform Management</option><option>Client Support</option></select></div><div><label>Client Contacts</label><input type="number" id="attClientCount"></div></div>
                <div class="form-row"><div><label>Boosted?</label><select id="attBoosted"><option>No</option><option>Yes</option></select></div><div><label>Shared On</label><select id="attSharedPlatforms"><option>Instagram</option><option>Facebook</option><option>Twitter</option><option>All Platforms</option></select></div></div>
                <label>Work Detail</label><textarea id="attWorkDetail" placeholder="What did you work on today?" rows="3"></textarea>
                <button id="submitAttendance" class="btn btn-success" style="margin-top:10px;">✅ Mark Attendance</button>
            `;
            jobsFormHtml = `
                <h3 style="margin-bottom:16px;">💼 Job Details</h3>
                <div class="form-row"><div><label>Job / Service Name</label><input id="jobName" placeholder="e.g. Instagram Followers"></div><div><label>Order ID</label><input id="jobOrderId" placeholder="If placed"></div></div>
                <div class="form-row"><div><label>Platform</label><input id="jobPlatform" placeholder="e.g. Instagram"></div><div><label>Amount Spent (PKR)</label><input type="number" id="jobAmount"></div></div>
                <label>Link</label><input id="jobLink" placeholder="Platform / Order link">
                <label>Full Details</label><textarea id="jobFullDetails" placeholder="Full details about work done..." rows="3"></textarea>
                <button id="submitJob" class="btn btn-success" style="margin-top:10px;">📌 Submit Job</button>
            `;

        } else if (appStatus === 'rejected') {
            statusHtml = `<div class="info-note" style="background:rgba(220,38,38,0.15);border-left-color:#dc2626;"><i class="fas fa-times-circle"></i> <strong>Not Selected</strong><br>Thank you for your interest.</div>`;
        }

        let defaultTab = appStatus === 'approved' ? 'attendance' : 'application';

                    <button class="join-main-tab-btn ${defaultTab==='application'?'active':''}" data-join-tab="application">📝 Application</button>
                    <button class="join-main-tab-btn ${defaultTab==='attendance'?'active':''}" data-join-tab="attendance">📋 Attendance</button>
                    <button class="join-main-tab-btn" data-join-tab="jobs">💼 Job Detail</button>

            let file = document.getElementById("appPhoto").files[0];

                let res = await apiCall("submitJoinRequest", { name: document.getElementById("appName").value, username: document.getElementById("appUsername").value, phone: document.getElementById("appPhone").value, whatsapp: document.getElementById("appWhatsapp").value, email: document.getElementById("appEmail").value, salaryType: document.getElementById("appSalaryType").value, hours: document.getElementById("appHours").value, shift: document.getElementById("appShift").value, about: document.getElementById("appAbout").value, photo: reader.result });

        });

            let [attRes, jobsRes] = await Promise.all([apiCall("getMyAttendance"), apiCall("getMyJobs")]);

                <h4 style="margin-bottom:10px;">📊 Attendance Records</h4>
                ${attRes.attendance?.length ? `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><tr style="background:rgba(43,110,240,0.2);"><th style="padding:8px;font-size:12px;">Date</th><th style="padding:8px;font-size:12px;">Login</th><th style="padding:8px;font-size:12px;">Logout</th><th style="padding:8px;font-size:12px;">Hours</th></tr>${attRes.attendance.map(a=>`<tr style="border-bottom:1px solid #1e293b;"><td style="padding:8px;font-size:12px;">${a.date||a.Date}</td><td style="padding:8px;font-size:12px;">${a.loginTime||a.LoginTime}</td><td style="padding:8px;font-size:12px;">${a.logoutTime||a.LogoutTime}</td><td style="padding:8px;font-size:12px;">${a.workingHours||a.WorkingHours}</td></tr>`).join('')}</table></div>` : '<p style="color:#64748b;font-size:13px;">No records</p>'}
                <h4 style="margin:20px 0 10px;">📌 Job Records</h4>
                ${jobsRes.jobs?.length ? `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><tr style="background:rgba(43,110,240,0.2);"><th style="padding:8px;font-size:12px;">Date</th><th style="padding:8px;font-size:12px;">Job</th><th style="padding:8px;font-size:12px;">Order ID</th><th style="padding:8px;font-size:12px;">Amount</th></tr>${jobsRes.jobs.map(j=>`<tr style="border-bottom:1px solid #1e293b;"><td style="padding:8px;font-size:12px;">${j.date||j.Date}</td><td style="padding:8px;font-size:12px;">${j.jobName||j.JobName}</td><td style="padding:8px;font-size:12px;">${j.orderId||j.OrderId||'—'}</td><td style="padding:8px;font-size:12px;">${j.amount||j.Amount}</td></tr>`).join('')}</table></div>` : '<p style="color:#64748b;font-size:13px;">No records</p>'}
            `;
        }
    }

    // ============ NAVIGATION ============
    function navigate(page) {
        window.currentPage = page;
        if (page === "home") renderHome();
        else if (page === "dashboard") renderDashboard();
        else if (page === "services") renderServices();
        else if (page === "addfunds") renderAddFunds();
        else if (page === "profile") renderProfile();
        else if (page === "recommendations") renderRecommendations();
        else if (page === "joinus") renderJoinUs();
        else if (page === "help") renderHelp();
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").style.display = "none";
    }

    // Events
    document.querySelectorAll("[data-page]").forEach(el => el.addEventListener("click", (e) => { e.preventDefault(); navigate(el.getAttribute("data-page")); }));
    document.getElementById("menuBtn").onclick = () => { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
    document.getElementById("closeSidebar").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("overlay").onclick = () => { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };
    document.getElementById("refreshBtn").onclick = () => { if(currentUser) navigate(window.currentPage || "home"); else showAuthScreen(); };
    document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("mts_token"); location.reload(); };
    document.getElementById("currencyGroup")?.addEventListener("click", (e) => { if(e.target.closest('.currency-btn')?.dataset.curr) { activeCurrency = e.target.closest('.currency-btn').dataset.curr; updateCurrencyDisplay(); } });

    window.navigateTo = navigate;
    window.selectService = selectService;

    (async function init() {
        try {
            if (await checkAuth()) {
                await loadServices();
                navigate("home");
            }
        } catch(e) {
            console.error("Init error:", e);
            showAuthScreen();
        }
    })();
</script>
</body>
</html>
